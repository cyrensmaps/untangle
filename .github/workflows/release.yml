name: Release Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Build module.zip
        run: zip -r module.zip module.json scripts styles app

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" module.zip --clobber
          else
            gh release create "$TAG" module.zip --title "$TAG" --generate-notes
          fi
