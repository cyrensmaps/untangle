name: Release Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Build module.zip
        run: zip -r module.zip module.json scripts styles app

      - name: Extract changelog section
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            index($0, "## [") == 1 {
              if (found) exit
              if ($0 == "## [" ver "]") { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          echo "Extracted release notes:"
          cat release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          NOTES_FLAG="--generate-notes"
          if [ -s release-notes.md ]; then
            NOTES_FLAG="--notes-file release-notes.md"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" module.zip --clobber
            if [ -s release-notes.md ]; then
              gh release edit "$TAG" --notes-file release-notes.md
            fi
          else
            gh release create "$TAG" module.zip --title "$TAG" $NOTES_FLAG
          fi
