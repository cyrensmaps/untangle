<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Untangle — Quick Access</title>
  <style>
    :root {
      --bg: #1e1f22;
      --bg-card: #26272b;
      --bg-elevated: #2d2f34;
      --accent: #7c93a8;
      --accent-dim: #566878;
      --text: #d8d9dc;
      --text-dim: #8a8d94;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.22);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .qa-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .qa-tab { flex: 1; background: none; border: none; color: var(--text-dim); padding: 10px 8px; cursor: pointer; font-size: 0.8rem; font-family: var(--font); }
    .qa-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    .qa-tab:hover:not(.active) { color: var(--text); }

    .qa-campaign { font-size: 0.68rem; color: var(--text-dim); text-align: center; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .qa-campaign b { color: var(--accent); font-weight: 600; }

    .qa-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 10px; display: none; }
    .qa-panel.active { display: block; }

    textarea, input { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 0.82rem; font-family: var(--font); width: 100%; resize: vertical; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent-dim); }

    .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 500; font-family: var(--font); }
    .btn-primary { background: var(--accent); color: #12100a; width: 100%; margin-top: 6px; }
    .btn-primary:hover { background: #d4b55e; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--border-hover); }

    .qa-note { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 7px; font-size: 0.8rem; line-height: 1.5; white-space: pre-wrap; position: relative; }
    .qa-note .qa-note-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-size: 0.65rem; color: var(--text-dim); }
    .qa-note .qa-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.7rem; }
    .qa-note .qa-del:hover { color: #c0524f; }
    .qa-empty { color: var(--text-dim); font-size: 0.78rem; text-align: center; padding: 24px 8px; }

    .qa-style-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .qa-style-btn { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; }
    .qa-style-btn.active { background: var(--accent); color: #12100a; border-color: var(--accent); }
    .qa-names { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .qa-name-btn { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; padding: 7px 8px; font-size: 0.8rem; color: var(--text); cursor: pointer; text-align: left; }
    .qa-name-btn:hover { border-color: var(--accent); }
    .qa-hint { font-size: 0.68rem; color: var(--text-dim); text-align: center; margin-top: 8px; height: 14px; }
  </style>
</head>
<body>

<div class="qa-campaign"><b id="qa-camp-name">…</b></div>
<div class="qa-tabs">
  <button class="qa-tab active" id="qa-tab-notes" onclick="qaSwitch('notes')">Field Notes</button>
  <button class="qa-tab" id="qa-tab-names" onclick="qaSwitch('names')">Names</button>
</div>

<div class="qa-panel active" id="qa-panel-notes">
  <textarea id="qa-note-text" rows="3" placeholder="Capture anything mid-session…"></textarea>
  <button class="btn btn-primary" onclick="qaSaveNote()">+ Add Note</button>
  <div id="qa-notes-list" style="margin-top:12px"></div>
</div>

<div class="qa-panel" id="qa-panel-names">
  <div class="qa-style-row" id="qa-style-row"></div>
  <div class="qa-names" id="qa-names-list"></div>
  <div class="qa-hint" id="qa-name-hint">Pick a style</div>
  <button class="btn btn-ghost" style="width:100%;margin-top:6px" onclick="qaRegenerateNames()">↺ More</button>
</div>

<script src="state.js"></script>
<script src="namegen.js"></script>
<script>
document.getElementById('qa-camp-name').textContent = camp().name;

function qaSwitch(tab) {
  document.querySelectorAll('.qa-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.qa-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('qa-tab-' + tab).classList.add('active');
  document.getElementById('qa-panel-' + tab).classList.add('active');
}

// ── Field notes ──
function qaRenderNotes() {
  const c = camp();
  if (!c.quickNotes) c.quickNotes = [];
  const notes = [...c.quickNotes].reverse();
  const list = document.getElementById('qa-notes-list');
  list.innerHTML = notes.length === 0
    ? `<div class="qa-empty">No notes yet.</div>`
    : notes.map(n => `
      <div class="qa-note">
        ${esc(n.text)}
        <div class="qa-note-meta"><span>${esc(n.timestamp)}</span><button class="qa-del" onclick="qaDeleteNote('${n.id}')">✕ delete</button></div>
      </div>`).join('');
}

function qaSaveNote() {
  const ta = document.getElementById('qa-note-text');
  const text = ta.value.trim();
  if (!text) return;
  const c = camp();
  if (!c.quickNotes) c.quickNotes = [];
  c.quickNotes.push({ id: uid(), text, timestamp: new Date().toLocaleString() });
  save();
  ta.value = '';
  qaRenderNotes();
}

function qaDeleteNote(id) {
  const c = camp();
  c.quickNotes = (c.quickNotes || []).filter(n => n.id !== id);
  save();
  qaRenderNotes();
}

// ── Name generator ──
let qaStyle = 'human';

function qaRenderStyles() {
  const row = document.getElementById('qa-style-row');
  row.innerHTML = Object.entries(NAME_STYLES).map(([k, v]) =>
    `<button class="qa-style-btn ${k===qaStyle?'active':''}" data-style="${k}" onclick="qaSetStyle('${k}')">${v.label}</button>`
  ).join('');
}

function qaSetStyle(styleKey) {
  qaStyle = styleKey;
  document.querySelectorAll('.qa-style-btn').forEach(b => b.classList.toggle('active', b.dataset.style === styleKey));
  document.getElementById('qa-name-hint').textContent = NAME_STYLES[styleKey]?.label || '';
  qaRegenerateNames();
}

function qaRegenerateNames() {
  const container = document.getElementById('qa-names-list');
  const names = Array.from({ length: 8 }, () => generateStyledName(qaStyle));
  container.innerHTML = names.map(n => `<button class="qa-name-btn" onclick="qaCopyName('${esc(n)}')">${esc(n)}</button>`).join('');
}

function qaCopyName(name) {
  navigator.clipboard.writeText(name).catch(() => {});
  const hint = document.getElementById('qa-name-hint');
  const prev = hint.textContent;
  hint.textContent = `"${name}" copied!`;
  setTimeout(() => { hint.textContent = prev; }, 1200);
}

qaRenderNotes();
qaRenderStyles();
qaRegenerateNames();
</script>
</body>
</html>
