<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Untangle — Quick Access</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="components.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .qa-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .qa-tab { background: none; border: none; border-right: 1px solid var(--border); border-bottom: 1px solid transparent; color: var(--text-dim); padding: 8px 10px; cursor: pointer; font-size: 0.75rem; font-family: var(--font); flex-shrink: 0; white-space: nowrap; }
    .qa-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    .qa-tab:hover:not(.active) { color: var(--text); }

    .qa-clock-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .qa-clock-row .clock-seg { width: 14px; height: 14px; }
    .qa-callback-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }

    .qa-campaign { font-size: 0.7rem; color: var(--text-dim); text-align: center; padding: 9px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; letter-spacing: 0.02em; }
    .qa-campaign b { color: var(--accent); font-weight: 600; }

    .qa-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 14px; display: none; flex-direction: column; gap: 10px; }
    .qa-panel.active { display: flex; }

    textarea, input, select { padding: 8px 10px; font-size: 0.82rem; }
    select#qa-note-about { font-size: 0.76rem; color: var(--text-dim); }

    .btn { padding: 7px 12px; font-size: 0.78rem; }
    .btn-primary { width: 100%; }

    .qa-empty { color: var(--text-dim); font-size: 0.78rem; text-align: center; padding: 24px 8px; }

    .qa-style-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .qa-style-btn { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; }
    .qa-style-btn.active { background: var(--accent); color: #12100a; border-color: var(--accent); }
    .qa-names { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .qa-name-btn { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; padding: 7px 8px; font-size: 0.8rem; color: var(--text); cursor: pointer; text-align: left; }
    .qa-name-btn:hover { border-color: var(--accent); }
    .qa-hint { font-size: 0.68rem; color: var(--text-dim); text-align: center; height: 14px; }
  </style>
</head>
<body>

<div class="qa-campaign"><b id="qa-camp-name">…</b></div>
<div class="qa-tabs">
  <button class="qa-tab active" id="qa-tab-notes" onclick="qaSwitch('notes')">Field Notes</button>
  <button class="qa-tab" id="qa-tab-names" onclick="qaSwitch('names')">Names</button>
  <button class="qa-tab" id="qa-tab-clocks" onclick="qaSwitch('clocks')">Clocks</button>
  <button class="qa-tab" id="qa-tab-callbacks" onclick="qaSwitch('callbacks')">Callbacks</button>
</div>

<div class="qa-panel active" id="qa-panel-notes">
  <textarea id="qa-note-text" rows="4" placeholder="Capture anything mid-session…"></textarea>
  <button type="button" class="btn btn-ghost" id="qa-dictate-btn" onclick="toggleDictation('qa-note-text', this)">Dictate</button>
  <select id="qa-note-about">
    <option value="">— Not tied to anything —</option>
  </select>
  <button class="btn btn-primary" onclick="qaSaveNote()">+ Add Note</button>
  <div class="qa-hint" id="qa-note-hint"></div>
</div>

<div class="qa-panel" id="qa-panel-names">
  <div class="qa-style-row" id="qa-style-row"></div>
  <div class="qa-names" id="qa-names-list"></div>
  <div class="qa-hint" id="qa-name-hint">Pick a style</div>
  <button class="btn btn-ghost" style="width:100%" onclick="qaRegenerateNames()">↺ More</button>
</div>

<div class="qa-panel" id="qa-panel-clocks">
  <div id="qa-clocks-list"></div>
</div>

<div class="qa-panel" id="qa-panel-callbacks">
  <div id="qa-callbacks-list"></div>
</div>

<script src="state.js"></script>
<script src="namegen.js"></script>
<script>
document.getElementById('qa-camp-name').textContent = camp().name;

function qaSwitch(tab) {
  document.querySelectorAll('.qa-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.qa-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('qa-tab-' + tab).classList.add('active');
  document.getElementById('qa-panel-' + tab).classList.add('active');
  if (tab === 'clocks') qaRenderClocks();
  if (tab === 'callbacks') qaRenderCallbacks();
}

// ── Field notes ──
// Capture-only here — no room in this small window to usefully show a
// running list of saved notes (that's what the Field Notes page in the
// main window is for). Saving just gives a quick confirmation hint.
function qaRenderNoteAboutOptions() {
  const sel = document.getElementById('qa-note-about');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = `<option value="">— Not tied to anything —</option>${_noteEntityOpts('','')}`;
  if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}

function qaSaveNote() {
  const ta = document.getElementById('qa-note-text');
  const text = ta.value.trim();
  if (!text) return;
  const c = camp();
  if (!c.quickNotes) c.quickNotes = [];
  const aboutVal = document.getElementById('qa-note-about')?.value || '';
  const [aboutType, aboutId] = aboutVal ? aboutVal.split(':') : [null, null];
  c.quickNotes.push({ id: uid(), text, timestamp: new Date().toLocaleString(), aboutType: aboutType||null, aboutId: aboutId||null });
  save();
  ta.value = '';
  document.getElementById('qa-note-about').value = '';
  const hint = document.getElementById('qa-note-hint');
  if (hint) { hint.textContent = 'Saved!'; setTimeout(() => { hint.textContent = ''; }, 1500); }
}

// ── Name generator ──
let qaStyle = 'human';

function qaRenderStyles() {
  const row = document.getElementById('qa-style-row');
  row.innerHTML = Object.entries(NAME_STYLES).map(([k, v]) =>
    `<button class="qa-style-btn ${k===qaStyle?'active':''}" data-style="${k}" onclick="qaSetStyle('${k}')">${v.label}</button>`
  ).join('');
}

function qaSetStyle(styleKey) {
  qaStyle = styleKey;
  document.querySelectorAll('.qa-style-btn').forEach(b => b.classList.toggle('active', b.dataset.style === styleKey));
  document.getElementById('qa-name-hint').textContent = NAME_STYLES[styleKey]?.label || '';
  qaRegenerateNames();
}

function qaRegenerateNames() {
  const container = document.getElementById('qa-names-list');
  const names = Array.from({ length: 8 }, () => generateStyledName(qaStyle));
  container.innerHTML = names.map(n => `<button class="qa-name-btn" onclick="qaCopyName('${esc(n)}')">${esc(n)}</button>`).join('');
}

function qaCopyName(name) {
  navigator.clipboard.writeText(name).catch(() => {});
  const hint = document.getElementById('qa-name-hint');
  const prev = hint.textContent;
  hint.textContent = `"${name}" copied!`;
  setTimeout(() => { hint.textContent = prev; }, 1200);
}

// ── Clocks ──
function qaRenderClocks() {
  const c = camp();
  if (!c.clocks) c.clocks = [];
  const list = document.getElementById('qa-clocks-list');
  list.innerHTML = c.clocks.length === 0
    ? `<div class="qa-empty">No clocks yet. Add some from the full Untangle window.</div>`
    : c.clocks.map(ck => `
      <div class="qa-clock-row">
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openInPlanner('clock','${ck.id}')">${esc(ck.label)}</span>
        ${clockSegmentsHTML(ck, 'qaTickClock', true)}
      </div>`).join('');
}

function qaTickClock(id, segIndex) {
  const c = camp();
  const ck = (c.clocks||[]).find(x => x.id === id);
  if (!ck) return;
  tickClockValue(ck, segIndex);
  save();
  qaRenderClocks();
}

// ── Stale callbacks ──
function qaRenderCallbacks() {
  const stale = computeStaleEntities();
  const list = document.getElementById('qa-callbacks-list');
  list.innerHTML = stale.length === 0
    ? `<div class="qa-empty">Nothing stale right now.</div>`
    : stale.slice(0, 10).map(e => `
      <div class="qa-callback-row">
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openInPlanner('${e.type}','${e.id}')">${esc(e.name)}</span>
        <span style="flex-shrink:0;color:var(--text-dim)">${e.sessionsSince}s ago</span>
      </div>`).join('');
}

// Called by state.js's storage-event listener whenever another window (the
// main planner, or main.js's "Add to Untangle" button) writes new data.
function onExternalStateChange() {
  document.getElementById('qa-camp-name').textContent = camp().name;
  qaRenderNoteAboutOptions();
  qaRenderClocks();
  qaRenderCallbacks();
}

if (!speechRecognitionSupported()) document.getElementById('qa-dictate-btn')?.remove();

qaRenderNoteAboutOptions();
qaRenderStyles();
qaRegenerateNames();
</script>
</body>
</html>
