async function postSessionToJournal(id) {
  const pgame = window.parent?.game;
  if (!pgame?.journal) { toast('Not running inside Foundry.', 'error'); return; }
  if (!pgame.user?.isGM) { toast('Only the GM can post to the Journal.', 'error'); return; }
  const c = camp();
  const s = c.sessions.find(x => x.id === id);
  if (!s) return;

  try {
    const journalName = `Untangle — ${c.name}`;
    let journal = c.journalEntryId ? pgame.journal.get(c.journalEntryId) : null;
    if (!journal) journal = pgame.journal.find(j => j.name === journalName);
    if (!journal) journal = await pgame.journal.documentClass.create(toFoundryPlain({ name: journalName }));
    c.journalEntryId = journal.id;

    const pageName = `Session ${s.number}: ${s.title || 'Untitled Session'}`;
    const html = [
      `<p><em>${esc(s.date)}</em></p>`,
      s.summary ? `<p>${esc(s.summary)}</p>` : '',
      s.keyEvents?.length ? `<ul>${s.keyEvents.map(e => `<li>${esc(e)}</li>`).join('')}</ul>` : '',
    ].filter(Boolean).join('\n');

    let page = s.journalPageId ? journal.pages.get(s.journalPageId) : null;
    if (page) {
      await page.update(toFoundryPlain({ name: pageName, text: { content: html, format: 1 } }));
    } else {
      const [created] = await journal.createEmbeddedDocuments('JournalEntryPage', toFoundryPlain([
        { name: pageName, type: 'text', text: { content: html, format: 1 } },
      ]));
      s.journalPageId = created.id;
    }
    save();
    toast('Posted to Journal. Share visibility from Foundry’s Journal tab if you want players to see it.', 'success');
  } catch (err) {
    toast('Error posting to Journal: ' + (err.message || String(err)), 'error');
  }
}

// ── Auto-generated Roll Tables ──
// Builds real Foundry RollTable documents from the campaign's own NPCs and
// Locations, so "who's at the docks tonight" can be an actual roll in
// Foundry's Rollable Tables sidebar instead of the GM picking. Find-or-
// create + replace-results pattern, same as postSessionToJournal above.
async function syncFoundryRollTables() {
  const pgame = window.parent?.game;
  if (!pgame?.tables) { toast('Not running inside Foundry.', 'error'); return; }
  if (!pgame.user?.isGM) { toast('Only the GM can create Roll Tables.', 'error'); return; }
  const c = camp();
  if (!c.npcs.length && !c.locations.length) { toast('Add some characters or locations first.', 'error'); return; }

  try {
    let count = 0;
    if (c.npcs.length) {
      c.npcRollTableId = await _upsertRollTable(pgame, c.npcRollTableId, `Untangle — ${c.name} — All Characters`, c.npcs.map(n => n.name));
      count++;
    }
    // One table per character type group too (Player Characters, Enemies,
    // Contacts, etc — same grouping already used on the Characters page),
    // so "roll on the enemies table" is possible without pulling in PCs.
    if (!c.rollTableIdsByGroup) c.rollTableIdsByGroup = {};
    for (const group of TYPE_GROUPS) {
      const names = c.npcs.filter(n => group.types.includes(n.type || 'npc')).map(n => n.name);
      if (!names.length) continue;
      c.rollTableIdsByGroup[group.label] = await _upsertRollTable(pgame, c.rollTableIdsByGroup[group.label], `Untangle — ${c.name} — ${group.label}`, names);
      count++;
    }
    if (c.locations.length) {
      c.locationRollTableId = await _upsertRollTable(pgame, c.locationRollTableId, `Untangle — ${c.name} — Locations`, c.locations.map(l => l.name));
      count++;
    }
    save();
    toast(`Synced ${count} Roll Table${count!==1?'s':''} to Foundry — find them in the Rollable Tables sidebar.`, 'success');
  } catch (err) {
    toast('Error syncing Roll Tables: ' + (err.message || String(err)), 'error');
  }
}

async function _upsertRollTable(pgame, existingId, tableName, names) {
  let table = existingId ? pgame.tables.get(existingId) : null;
  if (!table) table = pgame.tables.find(t => t.name === tableName);

  const n = names.length;
  const resultType = window.parent.CONST?.TABLE_RESULT_TYPES?.TEXT ?? 0;
  const resultsData = names.map((name, i) => ({ type: resultType, text: name, range: [i + 1, i + 1], weight: 1 }));

  if (!table) {
    table = await pgame.tables.documentClass.create(toFoundryPlain({ name: tableName, formula: `1d${n}`, replacement: true, displayRoll: true, results: resultsData }));
  } else {
    // Replace results wholesale so the table always mirrors the current
    // campaign list rather than accumulating stale/renamed entries.
    const existingIds = table.results.map(r => r.id);
    if (existingIds.length) await table.deleteEmbeddedDocuments('TableResult', existingIds);
    if (resultsData.length) await table.createEmbeddedDocuments('TableResult', toFoundryPlain(resultsData));
    await table.update(toFoundryPlain({ formula: `1d${n}` }));
  }
  return table.id;
}

async function reanalyseSession(id) {
  if (!getClaudeKey()) { toast('Add your Claude API key in Foundry Configure Settings.', 'error'); navigate('settings'); return; }
  const s = camp().sessions.find(x => x.id === id);
  if (!s?.rawTranscript) { toast('No transcript stored for this session.', 'error'); return; }
  if (!(await confirmPaidAction(['claude'], 'Re-analysing this session with AI'))) return;

  // Close the session modal
  document.querySelector('.modal-overlay')?.remove();

  // Show a persistent loading overlay
  const loadingEl = document.createElement('div');
  loadingEl.id = 'reanalyse-loading';
  loadingEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px';
  loadingEl.innerHTML = `
    <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite"></div>
    <div style="text-align:center">
      <div style="color:#fff;font-size:1rem;font-weight:600;margin-bottom:6px">Re-analysing with Claude</div>
      <div id="reanalyse-status" style="color:rgba(255,255,255,0.5);font-size:0.82rem">${esc(s.title)}</div>
    </div>`;
  document.body.appendChild(loadingEl);

  // Cycle status messages so it's clear something is happening
  const messages = [
    'Reading transcript…',
    'Identifying characters and locations…',
    'Extracting key events…',
    'Building summary…',
    'Almost done…',
  ];
  let msgIdx = 0;
  const statusEl = document.getElementById('reanalyse-status');
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % messages.length;
    if (statusEl) statusEl.textContent = messages[msgIdx];
  }, 2800);

  window._reanalyseId = id;

  try {
    await runClaudeExtraction(s.rawTranscript, s);
  } catch (err) {
    window._reanalyseId = null;
    toast('Error: ' + (err.message || String(err)), 'error');
  } finally {
    clearInterval(msgInterval);
    document.getElementById('reanalyse-loading')?.remove();
  }
}

async function deleteSession(id) {
  if (!(await confirmModal('Delete this session?'))) return;
  const c = camp();
  c.sessions = c.sessions.filter(s => s.id !== id);
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast('Session deleted.', 'success');
  render();
}

  function buildNPCSections(filtered) {
    const sections = TYPE_GROUPS.map(g => {
      const chars = filtered.filter(n => g.types.includes(n.type||'npc'));
      if (!chars.length) return '';
      return `<div style="margin-bottom:28px">
        <h3 style="margin:0 0 12px;font-size:0.85rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim)">${g.label}</h3>
        <div class="card-grid">${chars.map(npcCard).join('')}</div>
      </div>`;
    }).join('');
    return filtered.length===0
      ? `<div class="empty-state"><h3>No results</h3><p>Try a different search.</p></div>`
      : sections;
  }

  const searchBar = c.npcs.length>4?`<div style="margin-bottom:18px"><input type="text" id="npc-search" placeholder="Search characters…" value="${esc(window._npcSearch||'')}" oninput="filterNPCCards()" style="max-width:320px"></div>`:'';

    <div class="empty-state"><h3>No characters yet</h3><p>Characters are added automatically when you process a session, pulled from your Foundry Actors, or added manually with + Add.</p></div>`;
  }

  const totalPCs = all.filter(n=>n.type==='pc').length;
  const totalNonPC = all.length - totalPCs;

  return `
    <div class="page-header">
      <div><h2>Characters</h2><p class="subtitle">${c.npcs.length} total · ${totalPCs} PC${totalPCs!==1?'s':''}, ${totalNonPC} NPC${totalNonPC!==1?'s':''}</p></div>

        ${isFeatureEnabled('pullFromFoundry')?`<button class="btn btn-ghost" onclick="openPullFromFoundryModal()">Pull from Foundry</button>`:''}
        ${c.npcs.length>=2?`<button class="btn btn-ghost" onclick="findDuplicateCharacters()">Find Duplicates</button>`:''}
        <button class="btn btn-primary" onclick="openAddNPC()">+ Add</button>

    </div>
    ${searchBar}
    <div id="npc-cards-container">${buildNPCSections(all)}</div>`;
}

function openPullFromFoundryModal() {
  const pgame = window.parent?.game;
  if (!pgame?.actors) { toast('Not running inside Foundry.', 'error'); return; }

  const c = camp();
  const linkedIds = new Set(c.npcs.map(n => n.foundryActorId).filter(Boolean));
  const actors = pgame.actors.contents
    .filter(a => !linkedIds.has(a.id))
    .sort((a, b) => a.name.localeCompare(b.name));

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

    <div class="modal" style="max-width:520px">

function _stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return (div.textContent || div.innerText || '').trim();
}

function pullSelectedActors() {
  const pgame = window.parent?.game;
  const ids = Array.from(document.querySelectorAll('.pull-foundry-cb:checked')).map(cb => cb.value);
  if (!ids.length) { toast('Select at least one Actor.', 'error'); return; }

  const c = camp();
  let imported = 0;
  ids.forEach(actorId => {
    const actor = pgame.actors.get(actorId);
    if (!actor) return;
    const bio = actor.system?.details?.biography?.value || actor.system?.details?.biography || '';
    const img = actor.img
      ? (window.parent.foundry?.utils?.getRoute ? window.parent.foundry.utils.getRoute(actor.img) : (actor.img.startsWith('http') ? actor.img : '/' + actor.img.replace(/^\/+/, '')))
      : null;
    c.npcs.push({
      id: uid(),
      name: actor.name,
      role: '',
      motivation: '',
      notes: _stripHtml(bio),
      secrets: '',
      locationId: null,
      status: 'alive',
      type: actor.type === 'character' ? 'pc' : 'npc',
      voiceDescription: '',
      sessions: [],
      events: [],
      image: img,
      imageOffsetX: 50,
      imageOffsetY: 50,
      foundryActorId: actor.id,
    });
    imported++;
  });
  save();
  document.getElementById('pull-foundry-overlay')?.remove();
  toast(`Imported ${imported} character${imported!==1?'s':''} from Foundry.`, 'success');
  render();
}

async function findDuplicateCharacters() {
  if (!getClaudeKey()) { toast('Claude API key required — add it in Foundry Configure Settings.', 'error'); navigate('settings'); return; }
  const c = camp();
  if (c.npcs.length < 2) { toast('Need at least 2 characters to compare.', 'error'); return; }
  if (!(await confirmPaidAction(['claude'], 'Finding duplicate characters with AI'))) return;

  // Loading overlay
  const loadingEl = document.createElement('div');
  loadingEl.id = 'merge-loading';
  loadingEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px';
  loadingEl.innerHTML = `
    <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite"></div>
    <div style="text-align:center">
      <div style="color:#fff;font-size:1rem;font-weight:600;margin-bottom:6px">Analysing characters with Claude</div>
      <div id="merge-status" style="color:rgba(255,255,255,0.5);font-size:0.82rem">Comparing ${c.npcs.length} characters for duplicates…</div>
    </div>`;
  document.body.appendChild(loadingEl);

  const messages = ['Looking for name variations…','Comparing roles and notes…','Checking session overlap…','Almost done…'];
  let mi = 0;
  const iv = setInterval(() => { const el = document.getElementById('merge-status'); if (el) el.textContent = messages[mi=(mi+1)%messages.length]; }, 2500);

  try {
    const charList = c.npcs.map(n =>
      `ID:${n.id} | Name:"${n.name}" | Role:"${n.role||''}" | Type:${n.type||'npc'} | Notes:"${(n.notes||'').slice(0,120)}" | Events:${(n.events||[]).map(e=>e.text.slice(0,60)).join('; ').slice(0,200)}`
    ).join('\n');

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': getClaudeKey(), 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1024,
        messages: [{ role: 'user', content: `You are helping a TTRPG GM find duplicate characters in their campaign tracker. The same NPC may have been added multiple times under different names (spelling variations, nicknames, titles added/removed, typos, etc.).

Characters:
${charList}

Return ONLY valid JSON — no markdown, no explanation. If no duplicates found, return {"merges":[]}.

Return this structure:
{
  "merges": [
    {
      "keepId": "the ID of the character with the most complete data",
      "removeIds": ["id2", "id3"],
      "suggestedName": "best name to use",
      "reason": "one sentence explaining why these are the same"
    }
  ]
}

Only flag characters that are very likely the same person. Do not merge characters that merely have similar roles.` }]
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const raw = data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Could not parse response');
    const result = JSON.parse(match[0]);

    clearInterval(iv);
    document.getElementById('merge-loading')?.remove();

    if (!result.merges?.length) {
      toast('No duplicates found — all characters look distinct.', 'success');
      return;
    }
    showMergeReviewModal(result.merges);
  } catch (err) {
    clearInterval(iv);
    document.getElementById('merge-loading')?.remove();
    toast('Error: ' + (err.message || String(err)), 'error');
  }
}

      </div>
    </div>`;

  merges.forEach((_, i) => {
    const sel = document.getElementById(`mg-name-${i}`);
    const cust = document.getElementById(`mg-custom-${i}`);
    if (sel && cust) {

      };
    }

function confirmMerges() {
  const merges = window._pendingMerges || [];
  window._pendingMerges = null;
  const c = camp();
  let count = 0;

  merges.forEach((m, i) => {
    if (!document.getElementById(`mg-${i}`)?.checked) return;

    const sel = document.getElementById(`mg-name-${i}`);
    const cust = document.getElementById(`mg-custom-${i}`);
    const chosenName = sel?.value === '__custom__' ? (cust?.value?.trim() || '') : (sel?.value || '');

    const keep = c.npcs.find(n => n.id === m.keepId);
    if (!keep) return;

    // Merge each duplicate into keep
    (m.removeIds || []).forEach(rid => {
      const dup = c.npcs.find(n => n.id === rid);
      if (!dup) return;

      // Merge sessions (union)
      const dupSessions = (dup.sessions || []).filter(sid => !(keep.sessions || []).includes(sid));
      keep.sessions = [...(keep.sessions || []), ...dupSessions];

      // Merge events (append, avoid exact text duplicates)
      const existingTexts = new Set((keep.events || []).map(e => e.text.trim()));
      (dup.events || []).forEach(ev => {
        if (!existingTexts.has(ev.text.trim())) {
          keep.events = keep.events || [];
          keep.events.push(ev);
          existingTexts.add(ev.text.trim());
        }
      });

      // Fill in blanks from duplicate if keep is missing data
      if (!keep.role && dup.role) keep.role = dup.role;
      if (!keep.motivation && dup.motivation) keep.motivation = dup.motivation;
      if (!keep.notes && dup.notes) keep.notes = dup.notes;
      if (!keep.secrets && dup.secrets) keep.secrets = dup.secrets;
      if (!keep.voiceDescription && dup.voiceDescription) keep.voiceDescription = dup.voiceDescription;
      if (keep.locationId === null && dup.locationId) keep.locationId = dup.locationId;

      // Reassign any map pins pointing to the removed NPC
      (c.maps || []).forEach(map => {
        (map.pins || []).forEach(pin => {
          if (pin.linkedType === 'npc' && pin.linkedId === rid) pin.linkedId = m.keepId;
        });
      });

      // Remove the duplicate
      c.npcs = c.npcs.filter(n => n.id !== rid);
    });

    // Apply chosen name
    if (chosenName) keep.name = chosenName;
    count++;
  });

  save();
  document.getElementById('merge-overlay')?.remove();
  toast(count > 0 ? `${count} merge${count!==1?'s':''} applied.` : 'No merges applied.', 'success');
  render();
}

function confirmLocationMerges() {
  const merges = window._pendingLocationMerges || [];
  window._pendingLocationMerges = null;
  const c = camp();
  let count = 0;
  merges.forEach((m, i) => {
    if (!document.getElementById(`mg-${i}`)?.checked) return;
    const sel = document.getElementById(`mg-name-${i}`);
    const cust = document.getElementById(`mg-custom-${i}`);
    const chosenName = sel?.value === '__custom__' ? (cust?.value?.trim() || '') : (sel?.value || '');
    const keep = c.locations.find(l => l.id === m.keepId);
    if (!keep) return;
    (m.removeIds || []).forEach(rid => {
      const dup = c.locations.find(l => l.id === rid);
      if (!dup) return;
      const dupSessions = (dup.sessionIds || []).filter(sid => !(keep.sessionIds || []).includes(sid));
      keep.sessionIds = [...(keep.sessionIds || []), ...dupSessions];
      if (!keep.description && dup.description) keep.description = dup.description;
      if (!keep.type && dup.type) keep.type = dup.type;
      c.npcs.forEach(n => { if (n.locationId === rid) n.locationId = m.keepId; });
      (c.maps || []).forEach(map => {
        (map.pins || []).forEach(pin => { if (pin.linkedType === 'location' && pin.linkedId === rid) pin.linkedId = m.keepId; });
      });
      c.locations = c.locations.filter(l => l.id !== rid);
    });
    if (chosenName) keep.name = chosenName;
    count++;
  });
  save();
  document.getElementById('merge-overlay')?.remove();
  toast(count > 0 ? `${count} merge${count!==1?'s':''} applied.` : 'No merges applied.', 'success');
  render();
}

// ── Find & merge duplicate factions ──
async function findDuplicateFactions() {
  if (!getClaudeKey()) { toast('Claude API key required — add it in Foundry Configure Settings.', 'error'); navigate('settings'); return; }
  const c = camp();
  if (c.factions.length < 2) { toast('Need at least 2 factions to compare.', 'error'); return; }
  if (!(await confirmPaidAction(['claude'], 'Finding duplicate factions with AI'))) return;

  const loadingEl = document.createElement('div');
  loadingEl.id = 'merge-loading';
  loadingEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px';
  loadingEl.innerHTML = `
    <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite"></div>
    <div style="text-align:center">
      <div style="color:#fff;font-size:1rem;font-weight:600;margin-bottom:6px">Analysing factions with Claude</div>
      <div id="merge-status" style="color:rgba(255,255,255,0.5);font-size:0.82rem">Comparing ${c.factions.length} factions for duplicates…</div>
    </div>`;
  document.body.appendChild(loadingEl);

  const messages = ['Checking name variations…','Comparing goals and descriptions…','Almost done…'];
  let mi = 0;
  const iv = setInterval(() => { const el = document.getElementById('merge-status'); if (el) el.textContent = messages[mi=(mi+1)%messages.length]; }, 2500);

  try {
    const facList = c.factions.map(f =>
      `ID:${f.id} | Name:"${f.name}" | Attitude:${f.attitude||''} | Goals:"${(f.goals||'').slice(0,120)}" | Description:"${(f.description||'').slice(0,120)}"`
    ).join('\n');

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': getClaudeKey(), 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1024,
        messages: [{ role: 'user', content: `You are helping a TTRPG GM find duplicate factions in their campaign tracker. The same faction may have been added multiple times under different names (abbreviations, formal vs. informal names, typos, etc.).

Factions:
${facList}

Return ONLY valid JSON — no markdown, no explanation. If no duplicates found, return {"merges":[]}.

Return this structure:
{
  "merges": [
    {
      "keepId": "the ID of the faction with the most complete data",
      "removeIds": ["id2"],
      "suggestedName": "best name to use",
      "reason": "one sentence explaining why these are the same faction"
    }
  ]
}

Only flag factions that are very likely the same organisation. Do not merge factions that are merely allied or similar in type.` }]
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const raw = data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Could not parse response');
    const result = JSON.parse(match[0]);

    clearInterval(iv);
    document.getElementById('merge-loading')?.remove();

    if (!result.merges?.length) { toast('No duplicates found — all factions look distinct.', 'success'); return; }
    showFactionMergeModal(result.merges);
  } catch (err) {
    clearInterval(iv);
    document.getElementById('merge-loading')?.remove();
    toast('Error: ' + (err.message || String(err)), 'error');
  }
}

function confirmFactionMerges() {

  merges.forEach((m, i) => {

function onNpcImageSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e => {
    img.onload = () => {
      // Resize to max 256px on the longest side
      const MAX = 256;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      window._npcImageData = dataUrl;
      window._npcImageOffsetX = 50;
      window._npcImageOffsetY = 50;
      // Update small upload preview
      const preview = document.getElementById('npc-img-preview');
      if (preview) preview.innerHTML = `<img src="${dataUrl}" alt="portrait" style="object-position:50% 50%">`;
      // Show & populate drag reposition circle
      const reposition = document.getElementById('npc-img-reposition');
      if (reposition) reposition.style.display = 'flex';
      const dragPreview = document.getElementById('npc-img-drag-preview');
      if (dragPreview) { dragPreview.src = dataUrl; dragPreview.style.objectPosition = '50% 50%'; }
      const removeBtn = document.getElementById('npc-img-remove');
      if (removeBtn) removeBtn.style.display = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function startNpcImageDrag(e) {
  e.preventDefault();
  const isTouch = e.type === 'touchstart';
  const startX = isTouch ? e.touches[0].clientX : e.clientX;
  const startY = isTouch ? e.touches[0].clientY : e.clientY;
  const startOffX = window._npcImageOffsetX ?? 50;
  const startOffY = window._npcImageOffsetY ?? 50;
  const circle = document.getElementById('npc-img-drag-circle');
  if (circle) circle.classList.add('dragging');

  function onMove(ev) {
    const cx = isTouch ? ev.touches[0].clientX : ev.clientX;
    const cy = isTouch ? ev.touches[0].clientY : ev.clientY;
    // 0.35% per pixel feels natural for a 256px image in a 100px circle
    const newX = Math.max(0, Math.min(100, startOffX + (cx - startX) * 0.35));
    const newY = Math.max(0, Math.min(100, startOffY + (cy - startY) * 0.35));
    window._npcImageOffsetX = newX;
    window._npcImageOffsetY = newY;
    const pos = `${newX}% ${newY}%`;
    const dragImg = document.getElementById('npc-img-drag-preview');
    if (dragImg) dragImg.style.objectPosition = pos;
    const previewImg = document.getElementById('npc-img-preview')?.querySelector('img');
    if (previewImg) previewImg.style.objectPosition = pos;
  }

  function onEnd() {
    document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
    document.removeEventListener(isTouch ? 'touchend'  : 'mouseup',   onEnd);
    if (circle) circle.classList.remove('dragging');
  }

  document.addEventListener(isTouch ? 'touchmove' : 'mousemove', onMove, { passive: false });
  document.addEventListener(isTouch ? 'touchend'  : 'mouseup',   onEnd);
}

async function generateVoiceDescription(npcId) {
  if (!getClaudeKey()) { toast('Claude API key required — add it in Foundry Configure Settings.', 'error'); return; }
  const c = camp();
  const n = c.npcs.find(x => x.id === npcId);
  if (!n) return;
  if (!(await confirmPaidAction(['claude'], 'Generating a voice description with AI'))) return;
  const btn = document.getElementById('voice-gen-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
  const context = [
    n.name ? `Name: ${n.name}` : '',
    n.role ? `Role: ${n.role}` : '',
    n.motivation ? `Motivation: ${n.motivation}` : '',
    n.notes ? `Notes: ${n.notes}` : '',
    n.secrets ? `Secrets: ${n.secrets}` : '',
    (n.events||[]).length ? `Events: ${n.events.map(e=>e.text).join('; ')}` : '',
  ].filter(Boolean).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': getClaudeKey(), 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 256,
        messages: [{ role: 'user', content: `You are helping a GM (Game Master/Dungeon Master) remember how to voice a TTRPG character at the table.

Character info:
${context}

Write a single short paragraph (2-4 sentences) describing how this character SOUNDS when they speak — their accent or dialect, speech rhythm (fast/slow/halting), vocal tone (gravelly/high/smooth), characteristic phrases or verbal tics, and overall impression. Be specific and practical so the GM can immediately use this as a performance guide. Do not repeat the character's name or role back — just describe the voice.` }]
      })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim() || '';
    if (text) {
      const ta = document.getElementById('en-voice');
      if (ta) ta.value = text;
      // Also save immediately to the data model so it survives if modal is closed without Save
      n.voiceDescription = text;
      save();
      toast('Voice description generated.', 'success');
    }
  } catch(e) {
    toast('Generation failed: ' + (e.message||e), 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Generate'; }
  }
}

const TIMELINE_GAP = 140;     // px between auto-placed nodes, top to bottom
const TIMELINE_MIN_GAP = 50;  // px minimum spacing enforced while dragging (the "stoppers")

function renderTimeline() {
  const c = camp();
  if (!c.timelineEvents) c.timelineEvents = [];

  const nodes = [
    ...c.sessions.map(s => ({ kind: 'session', id: s.id, ref: s })),
    ...c.timelineEvents.map(ev => ({ kind: 'event', id: ev.id, ref: ev })),
  ];

  if (!nodes.length) {
    return `
      <div class="page-header">
        <div><h2>Timeline</h2><p class="subtitle">When did everything happen?</p></div>
      </div>
      <div class="empty-state"><h3>Nothing here yet</h3><p>Log your first session, or click below once you have one, to start building your timeline.</p></div>`;
  }

  // Auto-assign a position to anything that doesn't have one yet (new
  // sessions, freshly-added freeform entries) — it lands at the bottom,
  // the natural place for "the newest thing" — then persists immediately
  // so the position is sticky from then on.
  let maxPos = 0;
  nodes.forEach(n => {
    const pos = n.kind === 'session' ? n.ref.timelinePosition : n.ref.position;
    if (typeof pos === 'number' && pos > maxPos) maxPos = pos;
  });
  let changed = false;
  nodes.forEach(n => {
    const hasPos = typeof (n.kind === 'session' ? n.ref.timelinePosition : n.ref.position) === 'number';
    if (!hasPos) {
      maxPos += TIMELINE_GAP;
      if (n.kind === 'session') n.ref.timelinePosition = maxPos; else n.ref.position = maxPos;
      changed = true;
    }
  });
  if (changed) save();

  nodes.forEach(n => { n.position = n.kind === 'session' ? n.ref.timelinePosition : n.ref.position; });
  nodes.sort((a, b) => a.position - b.position);

  const trackHeight = Math.max(400, maxPos + 160);

  const html = nodes.map((n, i) => {
    const side = i % 2 === 0 ? 'left' : 'right';
    const top = n.position;
    let boxContent, openFn, nodeClass = 'timeline-node';

    if (n.kind === 'session') {
      const s = n.ref;
      const npcsInSession = c.npcs.filter(x => (x.sessions||[]).includes(s.id));
      const locsInSession = c.locations.filter(x => (x.sessionIds||[]).includes(s.id));
      openFn = `openSessionModal('${s.id}')`;
      boxContent = `
        <div style="font-weight:600">${esc(s.title)}</div>
        <div class="text-xs text-dim mt-4">${esc(s.date)} · Session ${s.number}${s.inWorldDate?` · ${esc(s.inWorldDate)}`:''}</div>
        ${s.summary?`<div class="text-sm text-dim" style="margin-top:8px;line-height:1.6">${esc(s.summary.slice(0,180))}${s.summary.length>180?'…':''}</div>`:''}
        ${(npcsInSession.length||locsInSession.length)?`<div class="text-xs text-dim" style="margin-top:8px">${npcsInSession.length} NPC${npcsInSession.length!==1?'s':''} · ${locsInSession.length} location${locsInSession.length!==1?'s':''}</div>`:''}`;
    } else {
      const ev = n.ref;
      nodeClass += ' tl-node-event';
      openFn = `openTimelineEventModal('${ev.id}')`;
      boxContent = `
        <div style="font-weight:600">${esc(ev.title)}</div>

    }

    const connectorStyle = side === 'left' ? 'right:50%;width:calc(50% - 40px);' : 'left:50%;width:calc(50% - 40px);';
    const dataAttrs = `data-node-kind="${n.kind}" data-node-id="${n.id}"`;

    return `
      <div class="${nodeClass}" style="top:${top-10}px" ${dataAttrs}></div>
      <div class="timeline-connector" style="top:${top-1}px;${connectorStyle}" ${dataAttrs}></div>
      <div class="timeline-box tl-box-${side}" style="top:${top-14}px" ${dataAttrs} onclick="${openFn}">${boxContent}</div>`;
  }).join('');

  return `
    <div class="page-header">
      <div><h2>Timeline</h2><p class="subtitle">Click the spine to add an entry · drag a circle to reposition it</p></div>
    </div>
    <div class="timeline-track" id="timeline-track" style="height:${trackHeight}px">
      <div class="timeline-spine" id="timeline-spine" style="height:${trackHeight}px" onclick="handleTimelineSpineClick(event)"></div>
      ${html}
    </div>`;
}

function handleTimelineSpineClick(e) {
  const track = document.getElementById('timeline-track');
  if (!track) return;
  const rect = track.getBoundingClientRect();
  const y = Math.max(20, e.clientY - rect.top);
  openAddTimelineEventModal(y);
}

let _tlDrag = null;
let _tlMouseMoveHandler = null;
let _tlMouseUpHandler = null;

function setupTimelineEvents() {
  const track = document.getElementById('timeline-track');
  if (!track) return;

  // Clean up any listeners from a previous render of this page before
  // adding new ones, since document-level listeners otherwise pile up
  // every time the Timeline page re-renders.
  if (_tlMouseMoveHandler) document.removeEventListener('mousemove', _tlMouseMoveHandler);
  if (_tlMouseUpHandler) document.removeEventListener('mouseup', _tlMouseUpHandler);

  track.querySelectorAll('.timeline-node').forEach(node => {
    node.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      const kind = node.dataset.nodeKind;
      const id = node.dataset.nodeId;
      const c = camp();
      const ref = kind === 'session' ? c.sessions.find(s=>s.id===id) : c.timelineEvents.find(x=>x.id===id);
      if (!ref) return;
      const startPos = kind === 'session' ? ref.timelinePosition : ref.position;
      const connectorEl = track.querySelector(`.timeline-connector[data-node-kind="${kind}"][data-node-id="${id}"]`);
      const boxEl = track.querySelector(`.timeline-box[data-node-kind="${kind}"][data-node-id="${id}"]`);
      _tlDrag = { kind, id, startY: e.clientY, startPos, moved: false, nodeEl: node, connectorEl, boxEl };
    });
  });

  _tlMouseMoveHandler = e => {
    if (!_tlDrag) return;
    const dy = e.clientY - _tlDrag.startY;
    if (Math.abs(dy) > 3) _tlDrag.moved = true;
    if (!_tlDrag.moved) return;

    const c = camp();
    const nodes = [
      ...c.sessions.map(s => ({ kind:'session', id:s.id, position:s.timelinePosition })),
      ...(c.timelineEvents||[]).map(ev => ({ kind:'event', id:ev.id, position:ev.position })),
    ].sort((a,b) => a.position - b.position);
    const idx = nodes.findIndex(n => n.kind === _tlDrag.kind && n.id === _tlDrag.id);
    const prev = nodes[idx - 1];
    const next = nodes[idx + 1];
    const trackEl = document.getElementById('timeline-track');
    const trackHeight = trackEl ? trackEl.offsetHeight : 100000;

    const lowerBound = prev ? prev.position + TIMELINE_MIN_GAP : 20;
    const upperBound = next ? next.position - TIMELINE_MIN_GAP : trackHeight - 20;
    const newPos = Math.max(lowerBound, Math.min(upperBound, _tlDrag.startPos + dy));

    _tlDrag.currentPos = newPos;
    if (_tlDrag.nodeEl) _tlDrag.nodeEl.style.top = (newPos - 10) + 'px';
    if (_tlDrag.connectorEl) _tlDrag.connectorEl.style.top = (newPos - 1) + 'px';
    if (_tlDrag.boxEl) _tlDrag.boxEl.style.top = (newPos - 14) + 'px';
  };

  _tlMouseUpHandler = () => {
    if (!_tlDrag) return;
    const { kind, id, moved, currentPos } = _tlDrag;
    if (moved && typeof currentPos === 'number') {
      const c = camp();
      if (kind === 'session') {
        const s = c.sessions.find(x=>x.id===id);
        if (s) s.timelinePosition = currentPos;
      } else {
        const ev = (c.timelineEvents||[]).find(x=>x.id===id);
        if (ev) ev.position = currentPos;
      }
      save();
      render();
    } else if (!moved) {
      if (kind === 'session') openSessionModal(id); else openTimelineEventModal(id);
    }
    _tlDrag = null;
  };

  document.addEventListener('mousemove', _tlMouseMoveHandler);
  document.addEventListener('mouseup', _tlMouseUpHandler);
}

function openAddTimelineEventModal(atPosition) {
  window._tlPendingPosition = atPosition;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px">
      <div class="modal-header"><h3>Add Timeline Entry</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="form-group"><label>Title</label><input type="text" id="tl-title" placeholder="The bridge collapses…"></div>
      <div class="form-group"><label>Details <span class="text-dim text-xs">(optional)</span></label><textarea id="tl-text" rows="4" placeholder="What happened…"></textarea></div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="saveNewTimelineEvent()">Add</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

}

function saveNewTimelineEvent() {

function openTimelineEventModal(id) {

// Resolves a Foundry-relative asset path (Scene background/thumb, Actor
// portrait) into something an <img> inside this iframe can load.
function resolveFoundryImgSrc(raw) {
  if (!raw) return '';
  if (raw.startsWith('http') || raw.startsWith('data:')) return raw;
  if (window.parent.foundry?.utils?.getRoute) {
    try { return window.parent.foundry.utils.getRoute(raw); } catch { /* fall through to plain path below */ }
  }
  return '/' + raw.replace(/^\/+/, '');
}

// Used as a fallback if the primary resolution above fails to load — some
// setups (custom Foundry route prefixes, reverse proxies) behave
// differently than expected, so this tries the other strategy instead of
// leaving a permanently broken image.
function resolveFoundryImgSrcFallback(raw) {
  if (!raw || raw.startsWith('http') || raw.startsWith('data:')) return '';
  return window.parent.foundry?.utils?.getRoute ? '/' + raw.replace(/^\/+/, '') : '';
}

function handleMapImageError(imgEl) {
  const raw = window._currentMapRawImgPath || '';
  if (imgEl.dataset.fallbackTried || !raw) {
    console.warn('Untangle: could not load map image. Raw Foundry path:', raw, '— last attempted src:', imgEl.src);
    const wrap = imgEl.closest('.map-wrap');
    if (wrap) wrap.innerHTML = `<div class="empty-state"><h3>Could not load this image</h3><p>Tried: <code style="word-break:break-all">${esc(raw||imgEl.src)}</code><br>Check the browser console (F12) for the exact URL that failed — this can happen if the image format isn't served correctly by your setup, or the file has moved.</p></div>`;
    return;
  }
  imgEl.dataset.fallbackTried = '1';
  const fallback = resolveFoundryImgSrcFallback(raw);
  if (fallback) { console.warn('Untangle: primary map image path failed, retrying with a plain root-relative path for:', raw); imgEl.src = fallback; }
  else { imgEl.dispatchEvent(new Event('error')); }
}

function renderMaps() {
  const c = camp();
  if (!c.maps) c.maps = [];
  return `
    <div class="page-header">
      <div><h2>Maps</h2><p class="subtitle">${c.maps.length} map${c.maps.length!==1?'s':''} · click anywhere on a map to drop a pin</p></div>

        <label class="btn btn-primary" style="cursor:pointer">+ Add Map<input type="file" accept="image/*" style="display:none" onchange="addMap(this)"></label>
      </div>
    </div>
    ${c.maps.length===0
      ?`<div class="empty-state"><h3>No maps yet</h3><p>Upload a world map, city map, or dungeon layout, or link an existing Foundry Scene.<br>Pins link directly to NPCs and locations.</p></div>`

function openLinkSceneModal() {

           <div style="max-height:45vh;overflow-y:auto">
             ${scenes.map(s => `
               <div style="display:flex;align-items:center;gap:10px;padding:7px 4px;cursor:pointer" onclick="linkScene('${s.id}')">

function linkScene(sceneId) {
  const scene = window.parent?.game?.scenes?.get(sceneId);

  if (!c.maps) c.maps = [];
  c.maps.push({ id: uid(), name: scene.name, sceneId: scene.id, pins: [] });

function jumpToScene(sceneId) {
  try {
    const scene = window.parent?.game?.scenes?.get(sceneId);
    if (!scene) { toast('That Scene no longer exists.', 'error'); return; }
    scene.view();
    toast('Jumped to scene in Foundry.', 'success');
  } catch (err) {
    toast('Could not open scene: ' + (err.message || String(err)), 'error');
  }
}

function renderMapView() {
  const c = camp();
  if (!c.maps) c.maps = [];
  const m = c.maps.find(x=>x.id===window._currentMapId);
  if (!m) { navigate('maps'); return ''; }

  let imgSrc = m.imageDataUrl || '';
  let sceneMissing = false;
  window._currentMapRawImgPath = '';
  if (m.sceneId) {
    const scene = window.parent?.game?.scenes?.get(m.sceneId);
    if (scene) {
      window._currentMapRawImgPath = scene.background?.src || scene.img || '';
      imgSrc = resolveFoundryImgSrc(window._currentMapRawImgPath);
    } else sceneMissing = true;
  }

  const pins = (m.pins||[]).map(pin=>{
    let label = pin.label || '';
    let entity = null;
    if (pin.linkedType==='npc') entity = c.npcs.find(n=>n.id===pin.linkedId);
    if (pin.linkedType==='location') entity = c.locations.find(l=>l.id===pin.linkedId);
    if (entity) label = entity.name;
    const color = pin.linkedType==='location' ? 'var(--green)' : 'var(--accent)';
    return `<div class="map-pin" style="left:${pin.x}%;top:${pin.y}%" onclick="event.stopPropagation();openPinModal('${m.id}','${pin.id}')">
      <div class="map-pin-dot" style="background:${color}"></div>
      ${label?`<div class="map-pin-label">${esc(label)}</div>`:''}
    </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div><h2>${esc(m.name)}</h2><p class="subtitle">${(m.pins||[]).length} pin${(m.pins||[]).length!==1?'s':''}${(m.pins||[]).length===0?' — click the map to add your first pin':' — click map to add more, click a pin to edit'}</p></div>
      <div style="display:flex;gap:8px">
        ${m.sceneId&&!sceneMissing?`<button class="btn btn-ghost" onclick="jumpToScene('${m.sceneId}')">Jump to Scene</button>`:''}
        <button class="btn btn-ghost" onclick="navigate('maps')">← Maps</button>
      </div>
    </div>
    ${sceneMissing
      ? `<div class="empty-state"><h3>Scene not found</h3><p>This map was linked to a Foundry Scene that no longer exists in this world.</p></div>`
      : `<div class="map-wrap" onclick="handleMapClick(event,'${m.id}')">
          <img src="${imgSrc}" alt="${esc(m.name)}" draggable="false" onerror="handleMapImageError(this)">
          ${pins}
        </div>`}`;
}

function openMapView(mapId) {
  window._currentMapId = mapId;
  navigate('map-view');
}

async function addMap(input) {
  const file = input.files[0];
  if (!file) return;
  const c = camp();
  if (!c.maps) c.maps = [];
  try {
    const dataUrl = await resizeImage(file, 2400);
    const rawName = file.name.replace(/\.[^.]+$/, '');
    const name = prompt('Name this map:', rawName) || rawName;
    const m = { id: uid(), name, imageDataUrl: dataUrl, pins: [] };
    c.maps.push(m);
    save();
    toast('Map added.', 'success');
    openMapView(m.id);
  } catch(e) {
    toast('Could not load image: ' + e.message, 'error');
  }
}

function resizeImage(file, maxPx) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        const r = Math.min(maxPx/width, maxPx/height);
        width = Math.round(width*r); height = Math.round(height*r);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image failed to load')); };
    img.src = url;
  });
}

function handleMapClick(e, mapId) {
  const wrap = e.currentTarget;
  const rect = wrap.getBoundingClientRect();
  const x = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(2));
  const y = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(2));
  openAddPinModal(mapId, x, y);
}

function openAddPinModal(mapId, x, y) {
  const c = camp();
  const npcOpts = c.npcs.map(n=>`<option value="npc:${n.id}">${esc(n.name)} (NPC)</option>`).join('');
  const locOpts = c.locations.map(l=>`<option value="location:${l.id}">${esc(l.name)} (Location)</option>`).join('');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><h3>Add Pin</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="form-group"><label>Link to NPC or Location</label>
        <select id="pin-link"><option value="">— Unlinked —</option><optgroup label="NPCs">${npcOpts}</optgroup><optgroup label="Locations">${locOpts}</optgroup></select>
      </div>
      <div class="form-group"><label>Label (if unlinked)</label><input type="text" id="pin-label" placeholder="Custom label…"></div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="addPin('${mapId}',${x},${y})">Place Pin</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function addPin(mapId, x, y) {
  const c = camp();
  const m = c.maps.find(mp=>mp.id===mapId);
  if (!m) return;
  const linkVal = document.getElementById('pin-link').value;
  const label = document.getElementById('pin-label').value;
  let linkedType = null, linkedId = null;
  if (linkVal) { [linkedType, linkedId] = linkVal.split(':'); }
  if (!m.pins) m.pins = [];
  m.pins.push({ id: uid(), x, y, linkedType, linkedId, label });
  save();
  document.querySelector('.modal-overlay')?.remove();
  render();
}

function openPinModal(mapId, pinId) {
  const c = camp();
  const m = c.maps.find(mp=>mp.id===mapId);
  if (!m) return;
  const pin = (m.pins||[]).find(p=>p.id===pinId);
  if (!pin) return;
  let entity = null;
  if (pin.linkedType==='npc') entity = c.npcs.find(n=>n.id===pin.linkedId);
  if (pin.linkedType==='location') entity = c.locations.find(l=>l.id===pin.linkedId);
  const label = entity ? entity.name : (pin.label || 'Unlabeled pin');
  const openLink = entity
    ? `<button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove();${pin.linkedType==='npc'?`openNPCModal('${pin.linkedId}')`:`openLocationModal('${pin.linkedId}')`}">Open ${pin.linkedType==='npc'?'NPC':'Location'} →</button>`
    : '';
  // Location pins automatically list whoever's based there — no separate
  // markers, just a clickable roster right in this popup.
  const npcsHere = pin.linkedType==='location' ? c.npcs.filter(n => n.locationId === pin.linkedId) : [];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h3>${esc(label)}</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      ${entity&&(entity.description||entity.role||entity.notes)?`<p class="text-sm text-dim" style="margin-bottom:16px;line-height:1.6">${esc((entity.description||entity.role||entity.notes||'').slice(0,200))}</p>`:''}
      ${npcsHere.length?`<div class="form-group"><label>Based here</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${npcsHere.map(n=>`<span class="npc-chip" onclick="this.closest('.modal-overlay').remove();openNPCModal('${n.id}')">${esc(n.name)}</span>`).join('')}</div></div>`:''}
      <div class="flex gap-8" style="justify-content:flex-end;flex-wrap:wrap">
        <button class="btn btn-danger btn-sm" onclick="deletePin('${mapId}','${pinId}')">Delete Pin</button>
        ${openLink}
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Close</button>
      </div>
    </div>`;

function deletePin(mapId, pinId) {

  document.querySelector('.modal-overlay')?.remove();
  render();
}

async function deleteMap(mapId) {
  if (!(await confirmModal('Delete this map and all its pins?'))) return;
  const c = camp();
  c.maps = c.maps.filter(m=>m.id!==mapId);

function renderFieldNotes() {
  const c = camp();
  if (!c.quickNotes) c.quickNotes = [];
  const notes = [...c.quickNotes].reverse();
  return `
    <div class="page-header">
      <div><h2>Field Notes</h2><p class="subtitle">${c.quickNotes.length} note${c.quickNotes.length!==1?'s':''} · capture anything mid-session</p></div>
      <button class="btn btn-primary" onclick="openQuickNoteModal()">+ Add Note</button>
    </div>
    ${notes.length===0
      ?`<div class="empty-state"><h3>No field notes yet</h3><p>Use + Add Note above, or the quick-access button over the macro bar, to capture names, ideas, or anything that can't wait mid-session.<br>Notes are timestamped and stored per campaign.</p></div>`
      :notes.map(n=>{
        let aboutChip = '';
        if (n.aboutType && n.aboutId) {
          const finder = { npc: c.npcs, location: c.locations, faction: c.factions, thread: c.plotThreads }[n.aboutType];
          const nameKey = n.aboutType === 'thread' ? 'title' : 'name';
          const entity = finder?.find(x => x.id === n.aboutId);
          const openFn = { npc:'openNPCModal', location:'openLocationModal', faction:'openFactionModal', thread:'openEditThreadModal' }[n.aboutType];
          if (entity) aboutChip = `<span class="npc-chip" style="font-size:0.72rem" onclick="${openFn}('${entity.id}')">${esc(entity[nameKey])}</span>`;
        }
        return `
        <div class="note-item note-entry" data-note-id="${n.id}">
          <div class="note-text note-text-view">${esc(n.text)}</div>
          <textarea class="note-text-edit" rows="3" style="display:none;margin-top:6px">${esc(n.text)}</textarea>
          ${aboutChip?`<div style="margin-top:6px">${aboutChip}</div>`:''}
          <div class="note-meta">
            <span>${esc(n.timestamp)}</span>
            <div class="flex gap-8">
              <button class="btn btn-ghost btn-sm" onclick="toggleNoteEdit(this,'${n.id}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteQuickNote('${n.id}')">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('')}`;
}

// Shared across Field Notes, and NPC/Location/Faction/Thread modals —
// covers all four taggable types, unlike _relEntityOpts which is
// deliberately scoped to just Characters/Factions for the relationship web.
// Renders a "Field Notes" block for whatever's tagged to this entity, or ''
// if nothing is. Shared by the NPC/Location/Faction/Thread modals.
function renderTaggedNotesSection(type, id) {
  const c = camp();
  const notes = (c.quickNotes||[]).filter(n => n.aboutType === type && n.aboutId === id);
  if (!notes.length) return '';
  return `<div class="form-group">
    <label>Field Notes <span class="text-dim text-xs">(tagged to this)</span></label>
    ${notes.slice().reverse().map(n => `<div class="text-sm text-dim" style="padding:4px 0;border-bottom:1px solid var(--border)">${esc(n.text)} <span class="text-xs" style="opacity:0.7">— ${esc(n.timestamp)}</span></div>`).join('')}
  </div>`;
}

function openQuickNoteModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px">
      <div class="modal-header"><h3>Field Note</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="form-group">
        <textarea id="qn-text" rows="5" placeholder="NPC name, location idea, player action, plot twist… anything that needs capturing right now." style="font-size:0.95rem"></textarea>
        ${isFeatureEnabled('voiceDictation') && speechRecognitionSupported()?`<button type="button" class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="toggleDictation('qn-text', this)">Dictate</button>`:''}
      </div>
      <div class="form-group"><label>About <span class="text-dim text-xs">(optional)</span></label>
        <select id="qn-about"><option value="">— Not tied to anything —</option>${_noteEntityOpts('','')}</select>
      </div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="saveQuickNote()">Save Note</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('qn-text')?.focus(), 50);
}

function saveQuickNote() {
  const text = document.getElementById('qn-text')?.value?.trim();
  if (!text) { toast('Write something first.', 'error'); return; }
  const c = camp();
  if (!c.quickNotes) c.quickNotes = [];
  const now = new Date();
  const timestamp = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  const aboutVal = document.getElementById('qn-about')?.value || '';
  const [aboutType, aboutId] = aboutVal ? aboutVal.split(':') : [null, null];
  c.quickNotes.push({ id: uid(), text, timestamp, aboutType: aboutType||null, aboutId: aboutId||null });
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast('Note saved.', 'success');
  render();
}

function deleteQuickNote(id) {
  const c = camp();
  c.quickNotes = (c.quickNotes||[]).filter(n=>n.id!==id);
  save();
  render();
}

function openNameGeneratorModal() {

  overlay.className = 'modal-overlay';

  const styleButtons = Object.entries(NAME_STYLES).map(([k,v]) =>
    `<button class="btn btn-ghost btn-sm namegen-style-btn" data-style="${k}" onclick="setNameGenStyle('${k}')" style="border-radius:20px">${v.label}</button>`
  ).join('');

  overlay.innerHTML = `
    <div class="modal" style="max-width:520px">
      <div class="modal-header">

        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">${styleButtons}</div>

        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // Default to human
  setNameGenStyle('human');
}

function setNameGenStyle(styleKey) {
  window._nameGenStyle = styleKey;
  // Highlight active button
  document.querySelectorAll('.namegen-style-btn').forEach(btn => {
    btn.style.background = btn.dataset.style === styleKey ? 'var(--accent)' : '';
    btn.style.color = btn.dataset.style === styleKey ? '#000' : '';
  });
  const hint = document.getElementById('namegen-hint');
  if (hint) hint.textContent = NAME_STYLES[styleKey]?.label || '';
  document.getElementById('namegen-more-btn').style.display = '';
  regenerateNames();
}

function regenerateNames() {
  const styleKey = window._nameGenStyle || 'human';
  const container = document.getElementById('namegen-results');
  if (!container) return;
  const names = Array.from({length: 12}, () => generateStyledName(styleKey));
  container.innerHTML = names.map(n => `
    <button onclick="copyNameFromGen('${esc(n)}')" style="
      background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;
      padding:9px 12px;font-size:0.9rem;font-weight:500;cursor:pointer;
      color:var(--text);text-align:left;transition:border-color .15s
    " onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">${esc(n)}</button>
  `).join('');
}

function copyNameFromGen(name) {
  navigator.clipboard.writeText(name).catch(()=>{});
  // Flash the hint text
  const hint = document.getElementById('namegen-hint');
  if (hint) { const prev = hint.textContent; hint.textContent = `"${name}" copied!`; setTimeout(()=>{ if(hint) hint.textContent = prev; }, 1500); }
}

// "PREVIOUSLY ON…" RECAP
// ═══════════════════════════════════════════════

function openRecapModal() {
  const c = camp();
  const last = c.sessions[c.sessions.length - 1];
  const openThreads = c.plotThreads.filter(t => t.status === 'active' || t.status === 'rumor');

  const lines = [`Previously, in ${c.name}…`];
  if (last) {
    lines.push('', `Session ${last.number}${last.title ? ' — ' + last.title : ''} (${last.date}):`);
    lines.push(last.summary || '(No summary recorded.)');
    if (last.keyEvents?.length) { lines.push(''); last.keyEvents.forEach(e => lines.push('• ' + e)); }
  } else {
    lines.push('', 'No sessions logged yet.');
  }
  if (openThreads.length) {
    lines.push('', 'Open threads:');
    openThreads.forEach(t => lines.push(`• ${t.title}${t.description ? ' — ' + t.description : ''}`));
  }
  const clocksNearFull = (c.clocks||[]).filter(ck => ck.filled > 0 && ck.filled >= ck.segments - 1);
  if (clocksNearFull.length) {
    lines.push('', 'About to come to a head:');
    clocksNearFull.forEach(ck => lines.push(`• ${ck.label} (${ck.filled}/${ck.segments})`));
  }
  const staleEntities = computeStaleEntities();
  if (staleEntities.length) {
    lines.push('', "Hasn't come up in a while:");
    staleEntities.slice(0, 5).forEach(e => lines.push(`• ${e.name} (${e.sessionsSince} session${e.sessionsSince!==1?'s':''} ago)`));
  }
  window._recapText = lines.join('\n');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:560px">
      <div class="modal-header"><h3>Previously On…</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <p class="text-xs text-dim" style="margin-bottom:12px">Read aloud at the top of your next session, or copy it into your own notes.</p>
      <div style="background:var(--bg-elevated);border-radius:8px;padding:16px;font-size:0.9rem;line-height:1.8;white-space:pre-wrap;max-height:50vh;overflow-y:auto">${esc(window._recapText)}</div>
      <div class="flex gap-8" style="justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost" onclick="copyRecapText()">Copy</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function copyRecapText() {
  navigator.clipboard.writeText(window._recapText || '').then(() => toast('Recap copied.', 'success')).catch(() => {});
}

// A light-mode, print-friendly summary of the campaign's current state —
// distinct from the raw JSON export in Manage Data, this is meant to be
// read (or printed to paper/PDF via the browser's own print dialog, no

// active theme, since a dark theme printed as-is would waste ink.

function openCampaignBibleModal() {
  const c = camp();
  const activeFactions = c.factions.filter(f => (f.status||'active') !== 'defeated');
  const activeThreads = c.plotThreads.filter(t => t.status !== 'resolved' && t.status !== 'abandoned');
  const keyNpcs = c.npcs.filter(n => (n.type||'npc') !== 'pc' && n.status !== 'dead');

  const html = `
    <div id="campaign-bible-print">
      <div class="cb-toolbar">
        <button class="btn btn-primary" onclick="window.print()">Print / Save as PDF</button>
        <button class="btn btn-ghost" onclick="document.getElementById('campaign-bible-print').remove()">Close</button>
      </div>
      <div class="cb-page">
        <h1>${esc(c.name)}</h1>
        <p class="cb-sub">Campaign bible — generated ${new Date().toLocaleDateString()}</p>

        ${activeFactions.length?`
        <h2>Factions</h2>
        ${activeFactions.map(f => `
          <div class="cb-entry">
            <h3>${esc(f.name)} <span class="cb-tag">${esc((FACTION_ATTITUDES.find(a=>a.value===f.attitude)||{}).label||'')}</span></h3>
            ${f.description?`<p>${esc(f.description)}</p>`:''}
            ${f.goals?`<p><strong>Goals:</strong> ${esc(f.goals)}</p>`:''}
          </div>`).join('')}` : ''}

        ${activeThreads.length?`
        <h2>Active Plot Threads</h2>
        ${activeThreads.map(t => `
          <div class="cb-entry">
            <h3>${esc(t.title)} <span class="cb-tag">${esc((THREAD_STATUSES.find(s=>s.value===t.status)||{}).label||'')}</span></h3>
            ${t.description?`<p>${esc(t.description)}</p>`:''}
            ${t.truth?`<p><strong>GM Truth:</strong> ${esc(t.truth)}</p>`:''}
          </div>`).join('')}` : ''}

        ${keyNpcs.length?`
        <h2>Characters</h2>
        ${keyNpcs.map(n => `
          <div class="cb-entry">
            <h3>${esc(n.name)}${n.role?` <span class="cb-tag">${esc(n.role)}</span>`:''}</h3>
            ${n.motivation?`<p><strong>Wants:</strong> ${esc(n.motivation)}</p>`:''}
            ${n.notes?`<p>${esc(n.notes)}</p>`:''}
          </div>`).join('')}` : ''}

        ${c.locations.length?`
        <h2>Locations</h2>
        ${c.locations.map(l => `
          <div class="cb-entry">
            <h3>${esc(l.name)}</h3>
            ${l.description?`<p>${esc(l.description)}</p>`:''}
          </div>`).join('')}` : ''}
      </div>
    </div>`;

  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  document.body.appendChild(wrap.firstElementChild);
}

function openSearchModal() {
  document.getElementById('search-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'search-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:520px;padding-top:18px">
      <input type="text" id="search-input" placeholder="Search NPCs, locations, factions, threads, sessions…" style="font-size:1rem;margin-bottom:14px" oninput="runSearch(this.value)">
      <div id="search-results" style="max-height:60vh;overflow-y:auto"></div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('search-input')?.focus(), 50);
  runSearch('');
}

function runSearch(qRaw) {
  const q = (qRaw || '').trim().toLowerCase();
  const results = document.getElementById('search-results');
  if (!results) return;
  if (!q) { results.innerHTML = `<p class="text-xs text-dim" style="padding:8px 2px">Type to search across this campaign…</p>`; return; }

  const c = camp();
  const groups = [
    { label: 'Characters',
      items: c.npcs.filter(n => (n.name||'').toLowerCase().includes(q) || (n.role||'').toLowerCase().includes(q)),
      render: n => ({ title: n.name, sub: n.role || charTypeLabel(n.type), onClick: `openNPCModal('${n.id}')` }) },
    { label: 'Locations',
      items: c.locations.filter(l => (l.name||'').toLowerCase().includes(q) || (l.description||'').toLowerCase().includes(q)),
      render: l => ({ title: l.name, sub: (l.description||'').slice(0,70), onClick: `openLocationModal('${l.id}')` }) },
    { label: 'Factions',
      items: c.factions.filter(f => (f.name||'').toLowerCase().includes(q) || (f.notes||'').toLowerCase().includes(q)),
      render: f => ({ title: f.name, sub: (f.notes||'').slice(0,70), onClick: `openFactionModal('${f.id}')` }) },
    { label: 'Plot Threads',
      items: c.plotThreads.filter(t => (t.title||'').toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q)),
      render: t => ({ title: t.title, sub: threadStatusInfo(t.status).label, onClick: `openEditThreadModal('${t.id}')` }) },
    { label: 'Sessions',
      items: c.sessions.filter(s => (s.title||'').toLowerCase().includes(q) || (s.summary||'').toLowerCase().includes(q)),
      render: s => ({ title: s.title || 'Untitled Session', sub: `Session ${s.number} · ${s.date}`, onClick: `openSessionModal('${s.id}')` }) },
  ];

  const nonEmpty = groups.filter(g => g.items.length);
  if (!nonEmpty.length) { results.innerHTML = `<p class="text-xs text-dim" style="padding:8px 2px">No matches.</p>`; return; }

  results.innerHTML = nonEmpty.map(g => `
    <div class="text-xs text-dim" style="text-transform:uppercase;letter-spacing:0.06em;padding:8px 2px 4px">${g.label}</div>
    ${g.items.slice(0,8).map(item => {
      const r = g.render(item);
      return `<div class="search-result-item" onclick="document.getElementById('search-overlay')?.remove();${r.onClick}">
        <div style="font-weight:600;font-size:0.875rem">${esc(r.title)}</div>
        ${r.sub ? `<div class="text-xs text-dim mt-4">${esc(r.sub)}</div>` : ''}
      </div>`;
    }).join('')}
  `).join('');
}

document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName) && !document.querySelector('.modal-overlay')) {
    e.preventDefault();
    openSearchModal();
  }
});

        <label>Paste token from the login page</label>
        <div class="flex gap-8">
          <input type="text" id="patreon-token-input" placeholder="eyJhbGciOi…" style="flex:1;font-family:monospace;font-size:0.8rem">
          <button class="btn btn-primary btn-sm" onclick="savePatreonToken()">Save</button>
        </div>
      </div>
    </div>

    <div class="card" style="max-width:560px">
      <h3 style="margin-bottom:6px">Foundry World Backup</h3>
      <p class="text-sm text-dim" style="margin-bottom:16px;line-height:1.6">Untangle mirrors your campaign data into this Foundry world's settings on every change, so a cleared browser cache or a new device doesn't lose it. This is a safety net alongside — not a replacement for — the export in Foundry Configure Settings above.</p>
      ${(() => {
        let backup = null;
        try { backup = window.parent?.game?.settings?.get('untangle', 'campaignBackup'); } catch {}
        return backup?.savedAt
          ? `<p class="text-xs text-dim" style="margin-bottom:12px">Last synced: ${new Date(backup.savedAt).toLocaleString()}</p>
             <button class="btn btn-ghost" onclick="restoreFromFoundryBackup()">Restore from world backup</button>`
          : `<p class="text-xs text-dim">No backup synced yet — it'll appear here after your first change.</p>`;
      })()}
    </div>`;
}

const FEATURE_CATEGORIES = [...new Set(FEATURE_REGISTRY.map(f => f.category))];

function onToggleFeature(key, enabled) {
  setFeatureToggle(key, enabled);
  renderNavLinks();
  render();
}

function openPatreonLoginTab() {
  if (!PATREON_WORKER_URL) { toast('Patreon integration is not set up yet.', 'error'); return; }
  window.parent.open(PATREON_WORKER_URL + '/login', '_blank');
}

async function savePatreonToken() {
  const token = document.getElementById('patreon-token-input')?.value?.trim();
  if (!token) { toast('Paste the token first.', 'error'); return; }
  setPatreonToken(token);
  const ok = await verifyPatreonToken();
  render();
  renderNavLinks();
  toast(ok ? 'Linked! Premium features are now available.' : 'That token is invalid or expired.', ok ? 'success' : 'error');
}

function unlinkPatreon() {
  setPatreonToken('');
  verifyPatreonToken();
  render();
  renderNavLinks();
  toast('Unlinked.', 'success');
}

function renameCampaignModal(id) {
  const c = state.campaigns.find(x => x.id === id);
  if (!c) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px">
      <div class="modal-header"><h3>Rename Campaign</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="form-group"><label>Campaign Name</label><input type="text" id="rename-camp" value="${esc(c.name)}"></div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="renameCampaign('${id}')">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function renameCampaign(id) {
  const name = document.getElementById('rename-camp')?.value?.trim();
  if (!name) { toast('Name is required.', 'error'); return; }
  const c = state.campaigns.find(x => x.id === id);
  if (c) { c.name = name; save(); }
  document.querySelector('.modal-overlay')?.remove();
  toast('Campaign renamed.', 'success');
  render();
}

async function deleteCampaign(id) {
  if (state.campaigns.length <= 1) { toast("Can't delete the last campaign.", 'error'); return; }
  const c = state.campaigns.find(x => x.id === id);
  if (!(await confirmModal(`Delete "${c?.name}"? All its data will be lost.`))) return;
  state.campaigns = state.campaigns.filter(x => x.id !== id);
  if (state.currentCampaignId === id) state.currentCampaignId = state.campaigns[0].id;
  save();
  toast('Campaign deleted.', 'success');
  render();
}

async function restoreFromFoundryBackup() {
  let backup = null;
  try { backup = window.parent?.game?.settings?.get('untangle', 'campaignBackup'); } catch {}
  if (!backup?.state) { toast('No Foundry world backup found.', 'error'); return; }
  if (!(await confirmModal(`Restore campaign data from the Foundry world backup (saved ${new Date(backup.savedAt).toLocaleString()})? This overwrites everything currently in this browser.`, { title: 'Restore backup?', confirmLabel: 'Restore', danger: false }))) return;
  state = backup.state;
  if (!state.settings) state.settings = {};
  if (state.settings.onboarded === undefined) state.settings.onboarded = true;
  localStorage.setItem('cp_v1', JSON.stringify(state));
  toast('Restored from Foundry backup.', 'success');
  render();
}
