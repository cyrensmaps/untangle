<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untangle</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="components.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; }

    /* ── SIDEBAR ── */
    nav { width: 210px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 0 0 20px; position: fixed; height: 100vh; z-index: 10; }

    .campaign-switcher { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); margin-bottom: 12px; position: relative; }
    .campaign-switcher-btn { width: 100%; background: none; border: none; cursor: pointer; text-align: left; padding: 0; font-family: var(--font); }
    .campaign-switcher-btn .label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .campaign-switcher-btn .current-name { font-size: 0.92rem; font-weight: 600; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
    .campaign-switcher-btn .chevron { margin-left: auto; color: var(--text-dim); font-size: 0.65rem; flex-shrink: 0; transition: transform 0.2s; }
    .campaign-switcher-btn .chevron.open { transform: rotate(180deg); }
    .campaign-dropdown { position: absolute; top: calc(100% - 4px); left: 0; width: 210px; background: var(--bg-elevated); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; z-index: 50; padding: 6px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: dropDown 0.15s ease; }
    @keyframes dropDown { from { opacity: 0; transform: translateY(-6px); } }
    .campaign-option { padding: 9px 16px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .campaign-option:hover { background: rgba(255,255,255,0.05); }
    .campaign-option.active-campaign { color: var(--accent); }
    .campaign-option.active-campaign::before { content: '✓'; font-size: 0.75rem; flex-shrink: 0; }
    .campaign-option:not(.active-campaign)::before { content: ''; width: 0.75rem; flex-shrink: 0; }
    .campaign-option-add { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 10px; color: var(--accent); font-size: 0.82rem; }
    .campaign-option-add:hover { background: rgba(var(--accent-rgb),0.06); }

    nav button.nav-btn { background: none; border: none; border-right: 2px solid transparent; color: var(--text-dim); padding: 8px 20px; text-align: left; cursor: pointer; font-size: 0.84rem; display: flex; align-items: center; gap: 10px; transition: all 0.15s; width: 100%; }
    nav button.nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    nav button.nav-btn.active { color: var(--accent); background: rgba(var(--accent-rgb),0.1); border-right-color: var(--accent); }

    .nav-logo { padding: 16px 16px 0; display: flex; justify-content: center; }
    .nav-logo img { max-width: 100%; max-height: 56px; object-fit: contain; }
    .nav-spacer { flex: 1; }
    .nav-section { padding: 16px 20px 5px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); opacity: 0.45; user-select: none; }
    .nav-divider { margin: 6px 16px; border: none; border-top: 1px solid var(--border); }

    /* ── MAIN ── */
    main { margin-left: 210px; flex: 1; padding: 36px 40px; max-width: calc(100vw - 210px); min-height: 100vh; }

    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    h3 { font-size: 1rem; font-weight: 600; }
    .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 28px; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }

    /* ── CARDS ── */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

    /* ── BUTTONS (shared base in components.css; sizing here) ── */
    .btn { padding: 8px 18px; font-size: 0.85rem; }
    .btn-danger { background: transparent; border: 1px solid rgba(var(--red-rgb),0.35); color: var(--red); }
    .btn-danger:hover { background: rgba(var(--red-rgb),0.08); }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }

    /* ── FORMS (shared base in components.css; sizing here) ── */
    input, textarea, select { padding: 9px 12px; font-size: 0.875rem; transition: border-color 0.15s; }
    label { font-size: 0.78rem; color: var(--text-dim); display: block; margin-bottom: 5px; letter-spacing: 0.03em; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── INPUT MODE TABS ── */
    .mode-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .mode-tab { flex: 1; background: none; border: none; color: var(--text-dim); padding: 10px 16px; cursor: pointer; font-size: 0.85rem; font-family: var(--font); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px; }
    .mode-tab:not(:last-child) { border-right: 1px solid var(--border); }
    .mode-tab.active { background: rgba(var(--accent-rgb),0.1); color: var(--accent); }
    .mode-tab:hover:not(.active) { background: rgba(255,255,255,0.03); color: var(--text); }

    /* ── AUDIO DROP ZONE ── */
    .audio-drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .audio-drop-zone:hover, .audio-drop-zone.drag-over { border-color: var(--accent-dim); background: rgba(var(--accent-rgb),0.04); }
    .audio-drop-zone .drop-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
    .audio-drop-zone .drop-sub { font-size: 0.78rem; color: var(--text-dim); }

    .audio-file-selected { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .audio-file-selected .file-info { flex: 1; min-width: 0; }
    .audio-file-selected .file-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .audio-file-selected .file-size { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .badge-new { background: rgba(var(--accent-rgb),0.18); color: var(--accent); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; } }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp 0.2s ease; }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
    .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; line-height: 1; flex-shrink: 0; margin-left: 12px; }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    /* ── SPINNER ── */
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(var(--accent-rgb),0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATUS BOX ── */
    .status-box { display: flex; align-items: flex-start; gap: 12px; color: var(--text-dim); font-size: 0.85rem; margin-top: 16px; padding: 14px 16px; background: rgba(var(--accent-rgb),0.04); border-radius: 6px; border: 1px solid var(--border); }
    .status-body { flex: 1; min-width: 0; }
    .chunk-progress-wrap { margin-top: 10px; }
    .chunk-progress-track { background: var(--bg-elevated); border-radius: 4px; height: 5px; overflow: hidden; margin-top: 6px; }
    .chunk-progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.8s ease; border-radius: 4px; }
    .chunk-progress-bar.shimmer {
      background: linear-gradient(90deg, var(--accent) 25%, color-mix(in srgb, var(--accent) 50%, white) 50%, var(--accent) 75%);
      background-size: 200% 100%;
      animation: bar-shimmer 1.6s infinite linear;
    }
    @keyframes bar-shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
    .chunk-label { font-size: 0.75rem; color: var(--text-dim); }

    /* ── TOAST ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; font-size: 0.85rem; animation: slideIn 0.2s ease; max-width: 320px; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    @keyframes slideIn { from { transform: translateX(16px); opacity: 0; } }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 64px 20px; color: var(--text-dim); }
    .empty-state h3 { color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 0.875rem; line-height: 1.6; }

    /* ── DASHBOARD ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-card .label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── NPC / LOCATION CARDS ── */
    .npc-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .npc-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .npc-initial { width: 38px; height: 38px; background: rgba(var(--accent-rgb),0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; border: 1px solid rgba(var(--accent-rgb),0.2); overflow: hidden; flex-shrink: 0; }
    .npc-initial img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    .npc-img-upload { width: 72px; height: 72px; border-radius: 50%; background: rgba(var(--accent-rgb),0.08); border: 2px dashed rgba(var(--accent-rgb),0.35); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; overflow: hidden; flex-shrink: 0; transition: border-color 0.15s; }
    .npc-img-upload:hover { border-color: var(--accent); }
    .npc-img-upload img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    .npc-img-drag-circle { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; cursor: grab; user-select: none; border: 2px solid var(--accent-dim); flex-shrink: 0; touch-action: none; }
    .npc-img-drag-circle.dragging { cursor: grabbing; }
    .npc-img-drag-circle img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; display: block; }

    /* ── SESSION LIST ── */
    .session-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; display: flex; justify-content: space-between; align-items: center; }
    .session-item:hover { border-color: var(--border-hover); }
    .session-num { background: rgba(var(--accent-rgb),0.1); color: var(--accent); font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }

    /* ── HOOKS BOARD ── */
    .hooks-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
    .hooks-column { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .hooks-column-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .hook-card { background: var(--bg-elevated); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
    .hook-card:hover { border-color: var(--border-hover); }
    .hook-card h4 { font-size: 0.875rem; margin-bottom: 4px; }
    .hook-card p { color: var(--text-dim); font-size: 0.78rem; line-height: 1.5; }
    .hook-actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }

    /* ── REVIEW ITEMS ── */
    .review-item { background: var(--bg-elevated); border-radius: 8px; padding: 13px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; }
    .review-item input[type="checkbox"] { margin-top: 3px; width: auto; accent-color: var(--accent); }
    .review-item-content { flex: 1; }
    .review-item-content h4 { font-size: 0.9rem; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .review-item-content p { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }

    /* ── CAMPAIGN LIST ── */
    .campaign-list-item { background: var(--bg-elevated); border-radius: 8px; padding: 13px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .campaign-list-item .cname { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .campaign-list-item .active-tag { font-size: 0.7rem; color: var(--accent); background: rgba(var(--accent-rgb),0.12); padding: 2px 7px; border-radius: 4px; }

    hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }

    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-10 { gap: 10px; }
    .mt-4 { margin-top: 4px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .text-dim { color: var(--text-dim); }
    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.75rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── MAP ── */
    .map-wrap { position: relative; display: block; cursor: crosshair; user-select: none; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .map-wrap img { display: block; width: 100%; }
    .map-pin { position: absolute; transform: translate(-50%, -100%); cursor: pointer; z-index: 5; }
    .map-pin-dot { width: 22px; height: 22px; background: var(--accent); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid rgba(0,0,0,0.5); box-shadow: 0 2px 6px rgba(0,0,0,0.5); transition: transform 0.15s; }
    .map-pin:hover .map-pin-dot { transform: rotate(-45deg) scale(1.2); }
    .map-pin-label { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; white-space: nowrap; font-size: 0.72rem; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; }
    .map-pin:hover .map-pin-label { opacity: 1; }
    .map-list-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.15s; }
    .map-list-item:hover { border-color: var(--border-hover); }

    /* ── TIMELINE ── */
    .timeline-track { position: relative; margin: 20px 0 60px; }
    .timeline-spine { position: absolute; left: 50%; top: 0; bottom: 0; width: 6px; margin-left: -3px; background: var(--border); border-radius: 3px; cursor: copy; }
    .timeline-node { position: absolute; left: 50%; width: 20px; height: 20px; margin-left: -10px; border-radius: 50%; background: var(--accent); border: 3px solid var(--bg); box-shadow: 0 0 0 2px var(--accent); cursor: grab; z-index: 2; }
    .timeline-node:active { cursor: grabbing; }
    .timeline-node.tl-node-event { background: var(--bg-elevated); box-shadow: 0 0 0 2px var(--text-dim); }
    .timeline-connector { position: absolute; top: 9px; height: 2px; background: var(--border); }
    .timeline-box { position: absolute; width: calc(50% - 60px); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; cursor: pointer; transition: border-color 0.15s; }
    .timeline-box:hover { border-color: var(--border-hover); }
    .timeline-box.tl-box-left { right: calc(50% + 30px); text-align: right; }
    .timeline-box.tl-box-right { left: calc(50% + 30px); }
    .tl-chip { padding: 3px 10px; border-radius: 12px; font-size: 0.73rem; cursor: pointer; border: 1px solid; transition: opacity 0.15s; }
    .tl-chip:hover { opacity: 0.8; }
    .tl-chip-npc { background: rgba(var(--accent-rgb),0.1); border-color: rgba(var(--accent-rgb),0.25); color: var(--accent); }
    .tl-chip-loc { background: rgba(var(--green-rgb),0.12); border-color: rgba(var(--green-rgb),0.3); color: var(--green); }

    /* ── ENTITY LINKS ── */
    .session-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .session-pill { padding: 2px 8px; border-radius: 8px; font-size: 0.68rem; background: rgba(var(--accent-rgb),0.1); color: var(--accent); cursor: pointer; border: 1px solid rgba(var(--accent-rgb),0.2); transition: opacity 0.15s; }
    .session-pill:hover { opacity: 0.75; }
    .location-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 10px; font-size: 0.72rem; background: rgba(var(--green-rgb),0.1); color: var(--green); cursor: pointer; border: 1px solid rgba(var(--green-rgb),0.2); margin-top: 6px; transition: opacity 0.15s; }
    .location-chip:hover { opacity: 0.75; }
    .npc-chip { padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; background: rgba(var(--accent-rgb),0.08); color: var(--accent); cursor: pointer; border: 1px solid rgba(var(--accent-rgb),0.15); transition: opacity 0.15s; }
    .npc-chip:hover { opacity: 0.75; }

    /* ── NPC STATUS ── */
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; }
    .status-alive   { background: var(--green); }
    .status-dead    { background: var(--red); }
    .status-unknown { background: var(--text-dim); }
    .status-fled    { background: #b8935a; }
    .status-imprisoned { background: #8866cc; }

    /* ── FIELD NOTES ── */
    .note-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px; }
    .note-item .note-text { font-size: 0.875rem; line-height: 1.65; white-space: pre-wrap; }
    .note-item .note-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 6px; display: flex; justify-content: space-between; }

    /* ── FACTIONS ── */
    .faction-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .faction-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .faction-chip { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 8px; font-size: 0.67rem; font-weight: 600; border: 1px solid; }
    .fc-swatch { transition: transform 0.1s; }
    .fc-swatch:hover { transform: scale(1.15); }

    /* ── SESSION PREP ── */
    .prep-scene-done input[type=text], .prep-scene-done textarea { text-decoration: line-through; color: var(--text-dim); }

    /* ── SEARCH ── */
    .search-result-item { padding: 9px 10px; border-radius: 6px; cursor: pointer; transition: background 0.12s; }
    .search-result-item:hover { background: rgba(255,255,255,0.05); }

    /* ── CAMPAIGN BIBLE (print) ── */
    #campaign-bible-print { position: fixed; inset: 0; z-index: 9998; background: #fff; overflow-y: auto; }
    #campaign-bible-print .cb-toolbar { position: sticky; top: 0; display: flex; gap: 8px; justify-content: flex-end; padding: 12px 24px; background: #f0f0f0; border-bottom: 1px solid #ccc; }
    #campaign-bible-print .cb-page { max-width: 720px; margin: 0 auto; padding: 40px 32px 80px; color: #1a1a1a; font-family: Georgia, 'Times New Roman', serif; line-height: 1.6; }
    #campaign-bible-print h1 { font-size: 1.8rem; margin-bottom: 4px; }
    #campaign-bible-print .cb-sub { color: #666; font-size: 0.85rem; margin-bottom: 28px; font-family: var(--font); }
    #campaign-bible-print h2 { font-size: 1.15rem; border-bottom: 2px solid #1a1a1a; padding-bottom: 4px; margin: 32px 0 14px; }
    #campaign-bible-print .cb-entry { margin-bottom: 16px; }
    #campaign-bible-print .cb-entry h3 { font-size: 1rem; margin-bottom: 3px; }
    #campaign-bible-print .cb-entry p { font-size: 0.92rem; margin: 2px 0; }
    #campaign-bible-print .cb-tag { font-family: var(--font); font-size: 0.7rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.03em; }

<script>
// ═══════════════════════════════════════════════
// STATE (see state.js for uid/esc/save/camp — shared with widget.html)
// ═══════════════════════════════════════════════

function fmtBytes(b) { return b < 1024*1024 ? (b/1024).toFixed(0)+' KB' : (b/1024/1024).toFixed(1)+' MB'; }

// Migrate existing campaigns
state.campaigns.forEach(c => {
  if (!c.maps) c.maps = [];
  if (!c.quickNotes) c.quickNotes = [];
  if (!c.relationships) c.relationships = [];
  if (!c.npcPositions) c.npcPositions = {};
  if (!c.plotThreads) c.plotThreads = [];
  if (!c.hooks) c.hooks = [];
  if (!c.factions) c.factions = [];
  if (!c.factionPositions) c.factionPositions = {};
  if (!c.clocks) c.clocks = [];
  if (!c.timelineEvents) c.timelineEvents = [];
  if (!c.sessionPrep) c.sessionPrep = { notes: '', scenes: [], questions: [] };
  // Migrate hooks → plotThreads
  if (c.hooks.length) {
    c.hooks.forEach(h => {
      if (!c.plotThreads.find(t => t.id === h.id)) {
        c.plotThreads.push({ id: h.id, title: h.title, description: h.description||'', truth: '', status: h.status === 'resolved' ? 'resolved' : h.status === 'rumor' ? 'rumor' : 'active', npcIds: [], locationIds: [], clues: [] });
      }
    });
    c.hooks = [];
  }
  c.npcs.forEach(n => {
    if (!n.sessions) n.sessions = [];
    if (n.locationId === undefined) n.locationId = null;
    if (!n.status) n.status = 'alive';
    if (!n.events) n.events = [];
    if (!n.type) n.type = 'npc';
    if (n.voiceDescription === undefined) n.voiceDescription = '';
  });
  c.locations.forEach(l => { if (!l.sessionIds) l.sessionIds = []; });
});

save();

// ═══════════════════════════════════════════════
// PAID ACTION CONFIRMATION
// Every call site that spends the user's Claude/OpenAI balance shows this
// first. Add new paid actions by calling
// `if (!(await confirmPaidAction(['claude'], 'Doing the thing'))) return;`
// ═══════════════════════════════════════════════

const BALANCE_LINKS = {
  claude: { label: 'Anthropic (Claude)', url: 'https://console.anthropic.com/settings/billing' },
  openai: { label: 'OpenAI (Whisper)', url: 'https://platform.openai.com/settings/organization/billing/overview' },
};

function confirmPaidAction(serviceKeys, actionLabel) {
  return new Promise(resolve => {
    const services = serviceKeys.map(k => BALANCE_LINKS[k]).filter(Boolean);
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="max-width:460px">
        <div class="modal-header"><h3>This costs money</h3></div>
        <p class="text-sm" style="line-height:1.7;margin-bottom:12px">${esc(actionLabel)} uses ${services.length>1?'API keys that draw':'an API key that draws'} from your own account balance${services.length>1?'s':''} — this module never charges you directly, but the provider${services.length>1?'s':''} will:</p>
        <ul class="text-sm" style="line-height:2;margin:0 0 18px 18px">
          ${services.map(s => `<li>${esc(s.label)} — <a href="${s.url}" target="_blank">check your balance</a></li>`).join('')}
        </ul>
        <div class="flex gap-8" style="justify-content:flex-end">
          <button class="btn btn-ghost" data-act="cancel">Cancel</button>
          <button class="btn btn-primary" data-act="confirm">Yes, continue</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('[data-act="cancel"]').addEventListener('click', () => { overlay.remove(); resolve(false); });
    overlay.querySelector('[data-act="confirm"]').addEventListener('click', () => { overlay.remove(); resolve(true); });
  });
}

// In-window replacement for the browser's native confirm() — used for
// deletes and other irreversible actions so the prompt matches the rest of
// the app's look instead of the OS-styled confirm() dialog.
function confirmModal(message, opts) {
  opts = opts || {};
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="max-width:420px">
        <div class="modal-header"><h3>${esc(opts.title || 'Are you sure?')}</h3></div>
        <p class="text-sm" style="line-height:1.7;margin-bottom:18px">${esc(message)}</p>
        <div class="flex gap-8" style="justify-content:flex-end">
          <button class="btn btn-ghost" data-act="cancel">Cancel</button>
          <button class="btn ${opts.danger===false?'btn-primary':'btn-danger'}" data-act="confirm">${esc(opts.confirmLabel || 'Delete')}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('[data-act="cancel"]').addEventListener('click', () => { overlay.remove(); resolve(false); });
    overlay.querySelector('[data-act="confirm"]').addEventListener('click', () => { overlay.remove(); resolve(true); });
  });
}

// Drag an NPC/Location/Thread card onto Foundry's macro bar to create a
// one-click "jump straight here" macro (handled by the hotbarDrop hook in
// main.js). Looks the name up here rather than embedding it in the inline
// ondragstart attribute, since embedding arbitrary text risks breaking the
// attribute if a name ever contains a quote.
function onEntityDragStart(event, type, id) {
  event.stopPropagation();
  const c = camp();
  const finder = { npc: c.npcs, location: c.locations, thread: c.plotThreads, faction: c.factions }[type];
  const entity = finder?.find(x => x.id === id);
  const name = entity ? (entity.name || entity.title || '') : '';
  const image = (type === 'npc' && entity?.image) ? entity.image : '';
  event.dataTransfer.effectAllowed = 'copy';
  event.dataTransfer.setData('text/plain', JSON.stringify({ type: 'untangle-entity', entityType: type, entityId: id, name, image }));
}

// ═══════════════════════════════════════════════
// CAMPAIGN SWITCHER
// ═══════════════════════════════════════════════

let dropdownOpen = false;

function toggleCampaignDropdown(e) {
  e.stopPropagation();
  dropdownOpen = !dropdownOpen;
  document.getElementById('campaign-dropdown').style.display = dropdownOpen ? 'block' : 'none';
  document.getElementById('dropdown-chevron').classList.toggle('open', dropdownOpen);
  if (dropdownOpen) {
    document.getElementById('campaign-dropdown-list').innerHTML = state.campaigns.map(c => `
      <div class="campaign-option ${c.id === state.currentCampaignId ? 'active-campaign' : ''}" onclick="switchCampaign('${c.id}')">
        ${esc(c.name)}
      </div>`).join('');
  }
}

function switchCampaign(id) {
  state.currentCampaignId = id;
  save();
  closeDropdown();
  navigate('dashboard');
}

function closeDropdown() {
  dropdownOpen = false;
  document.getElementById('campaign-dropdown').style.display = 'none';
  document.getElementById('dropdown-chevron').classList.remove('open');
}

document.addEventListener('click', closeDropdown);

function openNewCampaignModal() {
  closeDropdown();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h3>New Campaign</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="form-group">
        <label>Campaign Name</label>
        <input type="text" id="new-camp-name" placeholder="The Shattered Crown…">
      </div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createCampaign()">Create</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('new-camp-name')?.focus(), 50);
}

function createCampaign() {
  const name = document.getElementById('new-camp-name')?.value?.trim();
  if (!name) { toast('Give it a name.', 'error'); return; }
  const c = blankCampaign(name);
  state.campaigns.push(c);
  state.currentCampaignId = c.id;
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast(`"${name}" created.`, 'success');
  navigate('dashboard');
}

let view = 'dashboard';

// Nav entries that aren't core (Dashboard/Sessions/Characters/Factions/

// FEATURE_REGISTRY key in state.js so isFeatureEnabled() can hide it.

// one core item.
const NAV_LINKS = [
  { id: 'search',     feature: 'globalSearch',    html: `<button class="nav-btn" onclick="openSearchModal()" id="nav-search">Search <span class="text-dim" style="margin-left:auto;font-size:0.65rem">/</span></button>` },

function renderNavLinks() {
  const parts = NAV_LINKS
    .filter(entry => entry.section || isFeatureEnabled(entry.feature))
    .map((entry, i, arr) => entry.section ? `<div class="nav-section">${esc(entry.section)}</div>` : entry.html);
  parts.push(`<div class="nav-spacer"></div><hr class="nav-divider"><button class="nav-btn" onclick="navigate('settings')" id="nav-settings">Settings</button>`);
  document.getElementById('nav-links').innerHTML = parts.join('');
  const btn = document.getElementById('nav-' + view);
  if (btn) btn.classList.add('active');
}

// If a view was navigated to (or left active from before a feature was
// toggled off) while its feature is now disabled, fall back to the dashboard
// rather than rendering a page whose nav entry no longer exists.
const VIEW_FEATURE = { prep: 'sessionPrep', timeline: 'timeline', maps: 'maps', 'map-view': 'maps', clocks: 'clocks', web: 'relationshipWeb', fieldnotes: 'fieldNotes' };

function navigate(v) {
  if (VIEW_FEATURE[v] && !isFeatureEnabled(VIEW_FEATURE[v])) v = 'dashboard';
  view = v;
  window._audioFile = null; // clear audio selection on navigation
  renderNavLinks();
  render();
}

function render() {
  const main = document.getElementById('main-content');
  document.getElementById('nav-campaign-name').textContent = camp().name;
  const views = { dashboard: renderDashboard, sessions: renderSessions, 'session-new': renderNewSession, npcs: renderNPCs, locations: renderLocations, maps: renderMaps, 'map-view': renderMapView, timeline: renderTimeline, fieldnotes: renderFieldNotes, web: renderRelationshipWeb, threads: renderPlotThreads, factions: renderFactions, clocks: renderClocks, prep: renderSessionPrep, settings: renderSettings };
  if (VIEW_FEATURE[view] && !isFeatureEnabled(VIEW_FEATURE[view])) { view = 'dashboard'; renderNavLinks(); }
  if (view === 'prep') {
    window._prepScenes = JSON.parse(JSON.stringify(camp().sessionPrep?.scenes || []));
    window._prepQuestions = JSON.parse(JSON.stringify(camp().sessionPrep?.questions || []));
  }
  main.innerHTML = (views[view] || renderDashboard)();
  if (view === 'session-new') { bindAudioDrop(); bindLocalDrop(); }
  if (view === 'web') setupRelationshipWebEvents();
  if (view === 'timeline') setupTimelineEvents();
}

function renderDashboard() {
  const c = camp();

      </div>
      <div class="card">
        <div class="flex-between" style="margin-bottom:16px">
          <h3>Last Session</h3>
          <div class="flex gap-8">
            ${last && isFeatureEnabled('recap') ? `<button class="btn btn-ghost btn-sm" onclick="openRecapModal()">Recap</button>` : ''}

        </div>
        ${last ? (() => {

// ── Input mode state ──
let inputMode = 'audio'; // 'audio' | 'paste' | 'local'
window._audioFile = null;

// ── Simple Calendar integration ──
// Best-effort: Simple Calendar's API shape has changed across versions and
// can't be verified without a live install, so every call here is
// defensive and fails quietly (hiding the button) rather than breaking
// session logging if the API doesn't match what's expected.
function simpleCalendarActive() {
  // Checks for the global API surface rather than a specific module ID, so
  // this works with both the original Simple Calendar and forks like
  // Simple Calendar Reborn (Foundry v13) that use a different module ID
  // but keep the same window.SimpleCalendar.api for compatibility.
  try { return !!window.parent?.SimpleCalendar?.api; }
  catch { return false; }
}

function pullSimpleCalendarDate(inputId) {
  try {
    const api = window.parent.SimpleCalendar.api;
    const d = typeof api.currentDateTimeDisplay === 'function' ? api.currentDateTimeDisplay() : null;
    const text = d?.date || null;
    if (!text) { toast('Could not read the date from Simple Calendar.', 'error'); return; }
    const input = document.getElementById(inputId);
    if (input) input.value = text;
  } catch (err) {
    toast('Could not read Simple Calendar: ' + (err.message || String(err)), 'error');
  }
}

function renderNewSession() {
  return `
    <div class="page-header">

          <input type="text" id="s-inworld-date" placeholder="e.g. 21st of Winterheart, Year 998" style="flex:1">
          ${isFeatureEnabled('simpleCalendar') && simpleCalendarActive()?`<button type="button" class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="pullSimpleCalendarDate('s-inworld-date')">Pull from Calendar</button>`:''}
        </div>
      </div>

      <div class="mode-tabs">
        <button class="mode-tab ${inputMode==='audio'?'active':''}" onclick="setMode('audio')">Whisper (OpenAI)</button>
        <button class="mode-tab ${inputMode==='local'?'active':''}" onclick="setMode('local')">Local Whisper (Free)</button>
        <button class="mode-tab ${inputMode==='paste'?'active':''}" onclick="setMode('paste')">Paste Transcript</button>

function setMode(mode) {

function bindLocalDrop() {
  const zone = document.getElementById('local-drop-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) onLocalAudioSelected({ files: [file] });
  });
  if (window._localAudioFile) onLocalAudioSelected({ files: [window._localAudioFile] });
}

function bindAudioDrop() {
  const zone = document.getElementById('audio-drop-zone');
  if (!zone) return;

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setAudioFile(file);
  });

  // Restore selected file indicator if one was already chosen
  if (window._audioFile) showAudioSelected(window._audioFile);
}

function onAudioSelected(input) {
  const file = input.files[0];
  if (file) setAudioFile(file);
}

function setAudioFile(file) {
  window._audioFile = file;
  showAudioSelected(file);
}

function showAudioSelected(file) {
  const zone = document.getElementById('audio-drop-zone');
  const selected = document.getElementById('audio-selected');
  const btn = document.getElementById('transcribe-btn');
  if (!zone || !selected) return;
  zone.style.display = 'none';
  selected.style.display = 'flex';
  document.getElementById('audio-file-name').textContent = file.name;
  document.getElementById('audio-file-size').textContent = fmtBytes(file.size);
  if (btn) btn.disabled = false;
}

function clearAudio() {
  window._audioFile = null;
  document.getElementById('audio-drop-zone').style.display = 'block';
  document.getElementById('audio-selected').style.display = 'none';
  document.getElementById('transcribe-btn').disabled = true;
  document.getElementById('audio-file-input').value = '';
}

function onLocalAudioSelected(input) {
  const file = input.files[0];
  if (!file) return;
  window._localAudioFile = file;
  document.getElementById('local-drop-zone').style.display = 'none';
  document.getElementById('local-selected').style.display = 'flex';
  document.getElementById('local-file-name').textContent = file.name;
  document.getElementById('local-file-size').textContent = fmtBytes(file.size);
  document.getElementById('local-transcribe-btn').disabled = false;
  // Drop zone also needs drag support
  const zone = document.getElementById('local-drop-zone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) { window._localAudioFile = f; onLocalAudioSelected({ files: [f] }); }
    });
  }
}

function clearLocalAudio() {
  window._localAudioFile = null;
  document.getElementById('local-drop-zone').style.display = 'block';
  document.getElementById('local-selected').style.display = 'none';
  document.getElementById('local-transcribe-btn').disabled = true;
  document.getElementById('local-file-input').value = '';
}

let _whisperPipeline = null;
let _whisperPipelineModel = null;

async function transcribeLocal() {
  const file = window._localAudioFile;
  if (!file) { toast('Choose an audio file first.', 'error'); return; }

  lockUI(true);
  setStatus('Loading Whisper model…');

  const modelId = document.getElementById('local-model')?.value || 'Xenova/whisper-small';
  let elapsedTicker = null;

  try {
    // Lazy-load transformers.js — only downloads the library on first use
    if (!_whisperPipeline || _whisperPipelineModel !== modelId) {
      setStatus('Importing Whisper engine (one-time download)…');
      const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
      env.allowLocalModels = false;
      env.allowRemoteModels = true;

      // Use WebGPU if the browser supports it, otherwise fall back to WASM (CPU)
      const hasWebGPU = typeof navigator !== 'undefined' && !!navigator.gpu;
      const device = hasWebGPU ? 'webgpu' : 'wasm';
      const dtype  = hasWebGPU ? 'fp16' : 'q8';
      window._whisperDevice = device; // store for status display

      setStatus(`Downloading model "${modelId}" (${hasWebGPU ? 'GPU' : 'CPU'} mode) — this only happens once…`);
      _whisperPipeline = await pipeline('automatic-speech-recognition', modelId, {
        device,
        dtype,
        progress_callback: prog => {
          if (prog.status === 'downloading' && prog.total) {
            const pct = Math.round(prog.progress);
            const mb  = (prog.total / 1048576).toFixed(0);
            setStatus(`Downloading model: ${pct}% of ${mb} MB — cached after this`);
          } else if (prog.status === 'loading') {
            setStatus('Loading model into memory…');
          }
        },
      });
      _whisperPipelineModel = modelId;
    }

    // Estimate total chunks from audio duration for progress bar
    let totalChunks = 0;
    try {
      const tmpBuf = await file.arrayBuffer();
      const tmpCtx = new AudioContext();
      const tmpAudio = await tmpCtx.decodeAudioData(tmpBuf);
      totalChunks = Math.max(1, Math.ceil(tmpAudio.duration / 30));
      await tmpCtx.close();
    } catch (_) { /* ignore — progress bar just won't have a denominator */ }

    const durationMin = totalChunks > 0 ? Math.round(totalChunks * 30 / 60) : '?';

    // Estimate processing time with a 2× buffer so finish always feels early.
    // GPU: ~10s/chunk padded (real is ~3-5s after warmup, but warmup skews chunk 1).
    // CPU: ~360s/chunk padded (real is ~180s but variance is high).
    const usingGPU = window._whisperDevice === 'webgpu';
    const secPerChunk = usingGPU ? 15 : 540;
    const estTotalSec = totalChunks * secPerChunk; // deliberately conservative
    const estMin = totalChunks > 0 ? Math.round(estTotalSec / 60) : null;
    const deviceLabel = usingGPU ? 'GPU' : 'CPU';
    const timeWarning = estMin
      ? (estMin >= 60
          ? ` (up to ${(estMin / 60).toFixed(1)}h on ${deviceLabel})`
          : ` (up to ${estMin}m on ${deviceLabel})`)
      : '';
    setStatus(`Transcribing audio (≈${durationMin} min)${timeWarning} — please wait…`);
    if (totalChunks > 1) showChunkProgress(0, totalChunks);

    const audioUrl = URL.createObjectURL(file);
    let chunksDone = 0;
    const transcribeStartTime = Date.now();

    // Start the progress bar shimmer immediately
    const progressBar = document.getElementById('chunk-progress-bar');
    if (progressBar) progressBar.classList.add('shimmer');

    // Tick every second.
    // Bar uses an asymptotic curve: pct = 88 * t / (t + halflife)
    // where halflife = estTotalSec * 0.6
    // This means at t=estimate the bar is at ~60%, always crawling forward, never freezing.
    // Real finish always arrives before the bar "runs out".
    const halflife = estTotalSec * 0.6;
    elapsedTicker = setInterval(() => {
      const elapsedSec = (Date.now() - transcribeStartTime) / 1000;
      const elapsedMin = Math.floor(elapsedSec / 60);
      const elapsedLabel = elapsedMin > 0
        ? `${elapsedMin}m ${Math.floor(elapsedSec) % 60}s`
        : `${Math.floor(elapsedSec)}s`;

      // Asymptotic time-based progress (approaches 88%, never reaches it)
      const timePct = 88 * elapsedSec / (elapsedSec + halflife);
      // If real chunk callbacks fired, use whichever is further along
      const chunkPct = totalChunks > 0 ? (chunksDone / totalChunks) * 88 : 0;
      const pct = Math.max(timePct, chunkPct);
      if (progressBar) progressBar.style.width = pct + '%';

      // Show elapsed only — no countdown that can hit zero and freeze
      const progressLabel = document.getElementById('chunk-label');
      if (progressLabel) progressLabel.textContent = `${elapsedLabel} elapsed`;

      const gpuNote = (usingGPU && chunksDone === 0 && elapsedSec > 30)
        ? ' — GPU warming up, hang tight' : '';
      setStatus(`Transcribing audio${gpuNote}`);
    }, 1000);

    const langVal = document.getElementById('local-lang')?.value || '';
    const whisperOpts = {
      chunk_length_s: 30,
      stride_length_s: 5,
      task: 'transcribe',
      return_timestamps: false,
      callback_function: () => {
        chunksDone++;
        if (totalChunks > 1) showChunkProgress(chunksDone, totalChunks);
        const secsProcessed = chunksDone * 30;
        const minDone = Math.floor(secsProcessed / 60);
        const label = minDone > 0 ? `${minDone}m ${secsProcessed % 60}s` : `${secsProcessed}s`;
        setStatus(`Transcribing… ${label} of audio done`);
      },
    };
    if (langVal) whisperOpts.language = langVal;

    const result = await _whisperPipeline(audioUrl, whisperOpts);
    clearInterval(elapsedTicker);
    if (progressBar) { progressBar.classList.remove('shimmer'); progressBar.style.width = '100%'; }
    if (totalChunks > 1) showChunkProgress(totalChunks, totalChunks);

    URL.revokeObjectURL(audioUrl);

    const transcript = (result.text || '').trim();
    if (!transcript) throw new Error('Transcription returned empty text.');

    if (!getClaudeKey()) {
      // No Claude key — put transcript in paste mode so user can still save/use it
      setMode('paste');
      const ta = document.getElementById('s-transcript');
      if (ta) ta.value = transcript;
      hideChunkProgress();
      setStatus(null);
      lockUI(false);
      toast('Transcription done — add your Claude key to extract NPCs, or save manually.', 'success');
      return;
    }

    setStatus('Analysing with Claude…');
    hideChunkProgress();
    await runClaudeExtraction(transcript);

  } catch (err) {
    const msg = err?.message || String(err);
    toast('Local transcription failed: ' + msg, 'error');
    console.error('[transcribeLocal]', err);
    if (elapsedTicker) clearInterval(elapsedTicker);
    if (progressBar) progressBar.classList.remove('shimmer');
    hideChunkProgress();
    lockUI(false);
    setStatus(null);
  }
}

function setStatus(msg) {
  const box = document.getElementById('status-box');
  const txt = document.getElementById('status-text');
  if (!box) return;
  if (msg) { box.style.display = 'flex'; if (txt) txt.textContent = msg; }
  else { box.style.display = 'none'; }

  ['transcribe-btn','process-btn','local-transcribe-btn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = locked;
  });
}

// ── Transcribe Craig audio then process ──
async function transcribeAndProcess() {
  if (!getOpenAIKey()) {
    toast('Add your OpenAI API key in Foundry Configure Settings.', 'error');
    navigate('settings');
    return;
  }
  if (!window._audioFile) { toast('Choose an audio file first.', 'error'); return; }
  if (!(await confirmPaidAction(['openai', 'claude'], 'Transcribing and analysing this session'))) return;

  lockUI(true);

  try {
    const transcript = await transcribeChunked(window._audioFile);
    if (!transcript) throw new Error('Transcription returned empty text');
    setStatus('Analyzing with Claude…');
    hideChunkProgress();
    await runClaudeExtraction(transcript);
  } catch (err) {
    console.error('[transcribeAndProcess] caught:', err);
    const msg = err?.message || err?.name || String(err) || 'Unknown error — check the browser console (F12) for details.';
    toast('Error: ' + msg, 'error');
    lockUI(false);
    setStatus(null);
    hideChunkProgress();
  }
}

// ── Decode audio → split PCM → encode valid WAV chunks → transcribe ──
async function transcribeChunked(file) {
  console.log('[Transcribe] Starting. File:', file.name, file.size, 'bytes', file.type);

  // Step 1: read the file into memory
  setStatus('Reading audio file…');
  let arrayBuffer;
  try {
    arrayBuffer = await file.arrayBuffer();
    console.log('[Transcribe] arrayBuffer loaded:', arrayBuffer.byteLength, 'bytes');
  } catch (e) {
    console.error('[Transcribe] arrayBuffer failed:', e);
    throw new Error('Could not read file: ' + (e.message || String(e)));
  }

  // Step 2: decode to PCM. We ask for 16 kHz (Whisper's native rate)
  // but use audioBuffer.sampleRate below in case the browser ignores the hint.
  setStatus('Decoding audio…');
  let audioCtx;
  try {
    audioCtx = new AudioContext();
    console.log('[Transcribe] AudioContext created. sampleRate:', audioCtx.sampleRate);
  } catch (e) {
    console.error('[Transcribe] AudioContext creation failed:', e);
    throw new Error('Browser could not create audio context: ' + (e.message || String(e)));
  }

  let audioBuffer;
  try {
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    console.log('[Transcribe] Decoded. duration:', audioBuffer.duration.toFixed(1), 's  sampleRate:', audioBuffer.sampleRate, '  channels:', audioBuffer.numberOfChannels);
  } catch (e) {
    console.warn('[Transcribe] decodeAudioData failed, falling back to raw byte-chunking:', e);
    audioCtx.close();
    arrayBuffer = null;
    return await transcribeRawChunked(file);
  } finally {
    audioCtx.close().catch(() => {});
    arrayBuffer = null;
  }

  // Step 3: mix to mono
  const SAMPLE_RATE = audioBuffer.sampleRate; // use the actual rate, not the hint
  const numSamples = audioBuffer.length;
  const numChannels = audioBuffer.numberOfChannels;
  console.log('[Transcribe] Mixing', numChannels, 'channels to mono…');

  const monoFloat = new Float32Array(numSamples);
  for (let ch = 0; ch < numChannels; ch++) {
    const data = audioBuffer.getChannelData(ch);
    for (let s = 0; s < numSamples; s++) monoFloat[s] += data[s] / numChannels;
  }

  // Convert to 16-bit integers
  const pcm16 = new Int16Array(numSamples);
  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, monoFloat[i]));
    pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  console.log('[Transcribe] PCM ready. Total samples:', numSamples);

  // Step 4: split into ≤15 MB WAV chunks and send each to Whisper
  // 15 MB of 16-bit samples = 15*1024*1024/2 samples
  const SAMPLES_PER_CHUNK = Math.floor((15 * 1024 * 1024) / 2);
  const numChunks = Math.ceil(numSamples / SAMPLES_PER_CHUNK);
  const durationMin = Math.round(numSamples / SAMPLE_RATE / 60);

  console.log('[Transcribe] Will send', numChunks, 'chunk(s). Detected duration:', durationMin, 'min');
  setStatus(`Audio decoded (${durationMin} min) — transcribing${numChunks > 1 ? ` in ${numChunks} parts` : ''}…`);
  if (numChunks > 1) showChunkProgress(0, numChunks);

  let fullTranscript = '';

  for (let i = 0; i < numChunks; i++) {
    if (numChunks > 1) {
      setStatus(`Transcribing part ${i + 1} of ${numChunks}…`);
      showChunkProgress(i, numChunks);
    }

    const start = i * SAMPLES_PER_CHUNK;
    const end = Math.min(start + SAMPLES_PER_CHUNK, numSamples);
    const wavFile = encodeWAV(pcm16.subarray(start, end), SAMPLE_RATE);
    console.log(`[Transcribe] Chunk ${i + 1}/${numChunks}: samples ${start}–${end}, WAV size ${wavFile.size} bytes`);

    // Retry up to 3 times
    let lastErr;
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        if (attempt > 1) {
          setStatus(`Part ${i + 1} of ${numChunks} — retrying (${attempt}/3)…`);
          await sleep(2000 * attempt);
        }

        const formData = new FormData();
        formData.append('file', wavFile);
        formData.append('model', 'whisper-1');
        if (fullTranscript) {
          formData.append('prompt', fullTranscript.split(/\s+/).slice(-60).join(' '));
        }

        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 7 * 60 * 1000);

        const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${getOpenAIKey()}` },
          body: formData,
          signal: controller.signal,
        });
        clearTimeout(timer);

        console.log(`[Transcribe] Chunk ${i + 1} response: HTTP ${res.status}`);

        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const msg = errBody.error?.message || `HTTP ${res.status}`;
          console.error(`[Transcribe] Chunk ${i + 1} error:`, msg, errBody);
          if (res.status === 429) { lastErr = new Error(`Rate limited on part ${i + 1}: ${msg}`); await sleep(8000); continue; }
          throw new Error(`Part ${i + 1} failed: ${msg}`);
        }

        const data = await res.json();
        console.log(`[Transcribe] Chunk ${i + 1} text length:`, data.text?.length);
        if (data.text) fullTranscript += (fullTranscript ? ' ' : '') + data.text.trim();
        lastErr = null;
        break;

      } catch (err) {
        console.error(`[Transcribe] Chunk ${i + 1} attempt ${attempt} error:`, err);
        lastErr = err.name === 'AbortError'
          ? new Error(`Part ${i + 1} timed out after 7 minutes.`)
          : err;
        if (attempt === 3) throw lastErr;
      }
    }
  }

  showChunkProgress(numChunks, numChunks);
  console.log('[Transcribe] Done. Total transcript length:', fullTranscript.length);
  return fullTranscript;
}

// Fallback: slice the original file into ≤23 MB chunks and send raw.
// MP3/AAC frames are self-contained so Whisper finds the first valid frame even
// if a chunk starts mid-file. Avoids needing Web Audio API decode.
async function transcribeRawChunked(file) {
  const CHUNK_BYTES = 23 * 1024 * 1024;
  const numChunks = Math.ceil(file.size / CHUNK_BYTES);
  const mime = file.type || 'audio/mpeg';
  const ext = (file.name.split('.').pop() || 'mp3').toLowerCase();

  console.log(`[RawChunk] ${numChunks} chunk(s), mime: ${mime}, ext: .${ext}`);
  setStatus(`Transcribing${numChunks > 1 ? ` in ${numChunks} parts` : ''}…`);
  if (numChunks > 1) showChunkProgress(0, numChunks);

  let fullTranscript = '';

  for (let i = 0; i < numChunks; i++) {
    if (numChunks > 1) {
      setStatus(`Transcribing part ${i + 1} of ${numChunks}…`);
      showChunkProgress(i, numChunks);
    }

    const start = i * CHUNK_BYTES;
    const end = Math.min(start + CHUNK_BYTES, file.size);
    const chunkFile = new File([file.slice(start, end, mime)], `chunk_${i + 1}.${ext}`, { type: mime });
    console.log(`[RawChunk] Chunk ${i + 1}/${numChunks}: bytes ${start}–${end} (${chunkFile.size} bytes)`);

    let lastErr;
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        if (attempt > 1) {
          setStatus(`Part ${i + 1} of ${numChunks} — retrying (${attempt}/3)…`);
          await sleep(2000 * attempt);
        }

        const formData = new FormData();
        formData.append('file', chunkFile);
        formData.append('model', 'whisper-1');
        if (fullTranscript) {
          formData.append('prompt', fullTranscript.split(/\s+/).slice(-60).join(' '));
        }

        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 7 * 60 * 1000);

        const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${getOpenAIKey()}` },
          body: formData,
          signal: controller.signal,
        });
        clearTimeout(timer);

        console.log(`[RawChunk] Chunk ${i + 1} response: HTTP ${res.status}`);

        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const msg = errBody.error?.message || `HTTP ${res.status}`;
          console.error(`[RawChunk] Chunk ${i + 1} error:`, msg);
          if (res.status === 429) { lastErr = new Error(`Rate limited on part ${i + 1}: ${msg}`); await sleep(8000); continue; }
          throw new Error(`Part ${i + 1} failed: ${msg}`);
        }

        const data = await res.json();
        console.log(`[RawChunk] Chunk ${i + 1} text length:`, data.text?.length);
        if (data.text) fullTranscript += (fullTranscript ? ' ' : '') + data.text.trim();
        lastErr = null;
        break;

      } catch (err) {
        console.error(`[RawChunk] Chunk ${i + 1} attempt ${attempt} error:`, err);
        lastErr = err.name === 'AbortError'
          ? new Error(`Part ${i + 1} timed out after 7 minutes.`)
          : err;
        if (attempt === 3) throw lastErr;
      }
    }
  }

  showChunkProgress(numChunks, numChunks);
  console.log('[RawChunk] Done. Total transcript length:', fullTranscript.length);
  return fullTranscript;
}

// Build a minimal valid WAV file from 16-bit mono PCM.
function encodeWAV(pcm16, sampleRate) {
  const dataBytes = pcm16.length * 2;
  const buf = new ArrayBuffer(44 + dataBytes);
  const v = new DataView(buf);
  const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };

  str(0, 'RIFF'); v.setUint32(4, 36 + dataBytes, true);
  str(8, 'WAVE');
  str(12, 'fmt ');  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);                      // PCM
  v.setUint16(22, 1, true);                      // mono
  v.setUint32(24, sampleRate, true);
  v.setUint32(28, sampleRate * 2, true);          // byte rate
  v.setUint16(32, 2, true);                      // block align
  v.setUint16(34, 16, true);                     // bits per sample
  str(36, 'data'); v.setUint32(40, dataBytes, true);
  new Int16Array(buf, 44).set(pcm16);

  return new File([buf], 'chunk.wav', { type: 'audio/wav' });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showChunkProgress(done, total) {
  const wrap = document.getElementById('chunk-progress-wrap');

// ── Speaker label detection & mapping ──
function detectSpeakerLabels(text) {
  // Line-by-line. Strips leading timestamps first, then looks for:
  //   A) [LABEL] text   — bracketed label, no colon (e.g. [SPEAKER_00] Hello)
  //   B) LABEL: text    — bare label with colon   (e.g. SPEAKER_00: Hello)
  // Keeps only labels that appear ≥2 times — real speakers always repeat.

  // Timestamps to strip: [3362.9s -> 3363.3s], [00:01:23], 00:01:23 --> 00:02:00, etc.
  const STAMP = /^[\[\(][\d\s.\->,sS:]+[\]\)]\s*|^\d[\d:.,s]+\s*(--?>?\s*\d[\d:.,s]+)?\s*/;

  const counts  = new Map();
  const examples = new Map();

  for (const rawLine of text.split('\n')) {
    // Strip up to two leading timestamps (some tools stack them)
    let line = rawLine.trim().replace(STAMP, '').replace(STAMP, '').trim();
    if (!line) continue;

    let label, rest;

    // Format A: [LABEL] text  or  [LABEL]: text
    const bm = line.match(/^\[([^\]]{1,40})\][ \t]*:?[ \t]*(.+)/);
    if (bm) {
      label = bm[1].trim();
      rest  = bm[2].trim();
    } else {
      // Format B: LABEL: text
      const ci = line.indexOf(':');
      if (ci < 1 || ci > 40) continue;
      label = line.slice(0, ci).trim();
      rest  = line.slice(ci + 1).trim();
      if (label.includes(':')) continue;  // timestamp slipped through
    }

    if (!label || !rest) continue;
    if (/^\d+$/.test(label)) continue;            // bare number
    if (/^\d[\d.,]+s?$/.test(label)) continue;    // time value like "3362.9s"
    if (label.length > 40) continue;

    const key = label.toLowerCase();
    counts.set(key, (counts.get(key) || 0) + 1);
    if (!examples.has(key)) examples.set(key, { label, quotes: [] });
    const entry = examples.get(key);
    // Collect up to 10 quotes of at least 10 chars (longer = more meaningful)
    if (entry.quotes.length < 10 && rest.length >= 10) entry.quotes.push(rest);
  }

  const result = [];
  for (const [key, info] of examples) {
    if (counts.get(key) >= 2) {
      // Sort quotes longest-first so the most substantial one shows by default
      info.quotes.sort((a, b) => b.length - a.length);
      result.push(info);
    }
  }
  return result.sort((a, b) => a.label.localeCompare(b.label));
}

function applySpeakerMapping(text, mapping) {
  // mapping: { rawLabel: realName }
  // Handles three formats:
  //   [LABEL] text       (bracketed, no colon)
  //   [LABEL]: text      (bracketed, with colon)
  //   LABEL: text        (bare, with colon)
  let result = text;
  for (const [label, name] of Object.entries(mapping)) {
    if (!name) continue;
    const inner = label.replace(/^\[|\]$/g, '');
    const esc2  = inner.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(
      new RegExp(`\\[${esc2}\\][ \\t]*:?|${esc2}[ \\t]*:`, 'gi'),
      `${name}: `
    );
  }
  return result;
}

function showSpeakerMappingModal(speakerObjs) {
  // Normalise: accept [{label, quotes}], [{label, example}], or plain strings
  const speakers = speakerObjs.map(s => {
    if (typeof s === 'string') return { label: s, quotes: [] };
    if (s.quotes) return s;
    return { label: s.label, quotes: s.example ? [s.example] : [] };
  });

  // Store per-speaker quote index globally so cycle buttons can update the DOM
  window._spData   = speakers.map(s => ({ quotes: s.quotes, idx: 0 }));
  window._spLabels = speakers.map(s => s.label);

  window._spCycleQuote = function(i, dir) {
    const d = window._spData[i];
    if (!d.quotes.length) return;
    d.idx = (d.idx + dir + d.quotes.length) % d.quotes.length;
    const q = d.quotes[d.idx];
    const el = document.getElementById(`spquote-${i}`);
    if (el) el.textContent = '“' + q.slice(0, 140) + (q.length > 140 ? '…' : '') + '”';
    const ctr = document.getElementById(`spqctr-${i}`);
    if (ctr) ctr.textContent = `${d.idx + 1}/${d.quotes.length}`;
  };

  return new Promise(resolve => {
    window._spResolve = resolve;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="max-width:520px">
        <div class="modal-header">
          <h3>Who is speaking?</h3>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove();window._spResolve(null)">✕</button>
        </div>
        <p class="text-sm text-dim" style="margin-bottom:20px">Your transcript uses speaker labels. Enter the real name for each. Use the arrows to browse sample quotes.</p>
        ${speakers.map((s, i) => {
          const q0 = s.quotes[0] || '';
          const hasMulti = s.quotes.length > 1;
          return `
          <div class="form-group" style="margin-bottom:18px">
            <label style="margin-bottom:6px;display:block;font-weight:600;font-size:0.875rem;letter-spacing:.04em">${esc(s.label)}</label>
            ${s.quotes.length ? `
            <div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:8px">
              <button ${hasMulti ? `onclick="_spCycleQuote(${i},-1)"` : 'disabled'} style="flex-shrink:0;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);padding:2px 6px;cursor:${hasMulti?'pointer':'default'};opacity:${hasMulti?1:.3}">‹</button>
              <div style="flex:1;font-size:0.8rem;color:var(--text-dim);font-style:italic;padding:6px 10px;background:var(--bg-2);border-radius:4px;border-left:3px solid var(--border);line-height:1.5">
                <span id="spquote-${i}">“${esc(q0.slice(0,140))}${q0.length>140?'…':''}”</span>
              </div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
                <button ${hasMulti ? `onclick="_spCycleQuote(${i},1)"` : 'disabled'} style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);padding:2px 6px;cursor:${hasMulti?'pointer':'default'};opacity:${hasMulti?1:.3}">›</button>
                ${hasMulti ? `<span id="spqctr-${i}" style="font-size:0.7rem;color:var(--text-dim)">1/${s.quotes.length}</span>` : ''}
              </div>
            </div>` : ''}
            <input type="text" id="spmap-${i}" placeholder="Name…" autocomplete="off">
          </div>`;
        }).join('')}
        <div class="flex gap-8" style="justify-content:flex-end;margin-top:8px">
          <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove();window._spResolve({})">Skip</button>
          <button class="btn btn-primary" onclick="
            const m={};
            document.querySelectorAll('[id^=spmap-]').forEach((el,i)=>{ if(el.value.trim()) m[window._spLabels[i]]=el.value.trim(); });
            this.closest('.modal-overlay').remove();
            window._spResolve(m);
          ">Continue →</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('input')?.focus();
  });
}

async function openSpeakerMappingManual() {
  const ta = document.getElementById('s-transcript');
  const text = ta?.value?.trim();
  if (!text) { toast('Paste a transcript first.', 'error'); return; }

  let speakers = detectSpeakerLabels(text);

  // If auto-detect found nothing, show a generic form to enter labels manually
  if (speakers.length === 0) {

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="max-width:460px">
        <div class="modal-header"><h3>Enter speaker labels</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>

        <div class="form-group"><label>Labels in your transcript</label><textarea id="sp-manual-labels" rows="5" placeholder="SPEAKER_00&#10;SPEAKER_01&#10;Speaker 1&#10;Speaker 2"></textarea></div>
        <div class="flex gap-8" style="justify-content:flex-end">

async function openSpeakerMappingManualStep2(speakers) {
  const ta = document.getElementById('s-transcript');

    ta.value = applySpeakerMapping(ta.value, mapping);
    toast('Speaker labels replaced in transcript.', 'success');
  }
}

// ── Paste mode: process existing transcript ──
async function processWithAI() {
  if (!getClaudeKey()) {
    toast('Add your Claude API key in Foundry Configure Settings.', 'error');
    navigate('settings');
    return;
  }
  let transcript = document.getElementById('s-transcript')?.value?.trim();
  if (!transcript) { toast('Add some notes or a transcript first.', 'error'); return; }

  // Detect diarization speaker labels and map to real names
  const speakers = detectSpeakerLabels(transcript);
  let playerNames = [];
  if (speakers.length > 0) {
    const mapping = await showSpeakerMappingModal(speakers);
    if (mapping && Object.keys(mapping).length > 0) {
      playerNames = Object.values(mapping);
      transcript = applySpeakerMapping(transcript, mapping);
    }
  }

  if (!(await confirmPaidAction(['claude'], 'Processing this session with AI'))) return;

  lockUI(true);
  setStatus('Analyzing with Claude…');

  try {
    await runClaudeExtraction(transcript, undefined, playerNames);
  } catch (err) {
    toast('Error: ' + err.message, 'error');
    lockUI(false);
    setStatus(null);
  }
}

// ── Shared Claude extraction logic ──
async function runClaudeExtraction(transcript, existingSession, playerNames = []) {
  if (!getClaudeKey()) throw new Error('Claude API key missing — add it in Foundry Configure Settings.');

  const c = camp();
  // Short detail per entity (not just names) so Claude has enough to spot a
  // contradiction (e.g. a restated name/role/description that conflicts with
  // what's already logged) — capped per category so prompt size stays
  // bounded on large campaigns.
  function trimmedList(items, cap, detailFn) {
    const list = items.slice(0, cap).map(it => {
      const d = (detailFn(it) || '').slice(0, 100).trim();
      return d ? `${it.name} (${d})` : it.name;
    });
    return list.length ? list.join('; ') : 'none';
  }
  const existingNPCs     = trimmedList(c.npcs, 40, n => [n.role, n.notes].filter(Boolean).join(' — '));
  const existingLocs     = trimmedList(c.locations, 40, l => l.description);
  const existingFactions = trimmedList(c.factions, 40, f => f.description);

  // Claude has a context limit and the extraction task doesn't need every word.
  // Take the first 20k chars (opening), middle 10k, and last 10k to cover the full arc.
  const MAX = 40000;
  let condensed = transcript;
  if (transcript.length > MAX) {
    const head = transcript.slice(0, 20000);
    const mid  = transcript.slice(Math.floor(transcript.length / 2) - 5000, Math.floor(transcript.length / 2) + 5000);
    const tail = transcript.slice(-10000);
    condensed = head + '\n\n[...middle of session...]\n\n' + mid + '\n\n[...later in session...]\n\n' + tail;
  }

  const playerNote = playerNames.length
    ? `\nThese are the REAL PLAYERS (GM and players at the table) — do NOT include them as NPCs: ${playerNames.join(', ')}.`
    : '';

  const prompt = `You are a TTRPG campaign assistant helping a GM organize session notes. Analyze the transcript below and return structured data as valid JSON only — no markdown, no explanation, just the JSON object.

IMPORTANT: Write all text values (summary, keyEvents, role, notes, descriptions, hook titles and descriptions) in the same language as the transcript. Do not translate to English.

Known NPCs already in campaign (with what's already known about them): ${existingNPCs}
Known locations already in campaign: ${existingLocs}
Known factions already in campaign: ${existingFactions}${playerNote}

Return exactly this structure:
{
  "suggestedTitle": "short evocative session title",
  "summary": "2-3 sentence summary of what happened",
  "keyEvents": ["event 1", "event 2", "event 3"],
  "npcs": [
    { "name": "Name", "role": "brief role", "notes": "what happened with them", "isNew": true }
  ],
  "locations": [
    { "name": "Name", "description": "brief description", "isNew": true }
  ],
  "hooks": [
    { "title": "Hook title", "description": "what the thread is about" }
  ],
  "factions": [
    { "name": "Faction name", "notes": "what they did or were mentioned doing this session", "isNew": true }
  ],
  "contradictions": [
    { "entityType": "npc", "name": "Name as already known", "existingDetail": "what was already known", "newDetail": "what this transcript says instead", "note": "one sentence on the conflict" }
  ],
  "openQuestions": ["a question raised in the transcript that was never answered or resolved"]
}

Set isNew to false if the name matches something already in the campaign. For factions: only include factions explicitly named or clearly active this session — not every group in passing. Empty array if nothing fits a category.

For contradictions: entityType is "npc", "location", or "faction". Only flag it if the transcript actually conflicts with something already known (a different name, role, description, or fact) — not just when it adds new information. Empty array if nothing conflicts.

For openQuestions: things the party asked about, wondered about, or that were left hanging in this transcript and never got resolved by the end of it. Keep each one short and concrete. Empty array if nothing fits.

Transcript:
${condensed}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': getClaudeKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({ model: 'claude-opus-4-8', max_tokens: 4096, messages: [{ role: 'user', content: prompt }] }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Claude API error ${res.status}`);
  }

  const data = await res.json();
  const raw = data.content[0].text;
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse AI response');
  const extracted = JSON.parse(match[0]);

  const session = existingSession ? {
    ...existingSession,
    summary: extracted.summary || existingSession.summary,
    keyEvents: extracted.keyEvents || existingSession.keyEvents,
  } : {
    id: uid(),
    number: c.sessions.length + 1,
    title: document.getElementById('s-title')?.value?.trim() || extracted.suggestedTitle || 'Untitled Session',
    date: document.getElementById('s-date')?.value || new Date().toISOString().split('T')[0],
    inWorldDate: document.getElementById('s-inworld-date')?.value?.trim() || '',
    rawTranscript: transcript,
    summary: extracted.summary || '',
    keyEvents: extracted.keyEvents || [],
  };

  // When re-analysing, use the AI suggested title only if user hasn't set one already
  if (existingSession && extracted.suggestedTitle && session.title === 'Untitled Session') {
    session.title = extracted.suggestedTitle;
  }

  setStatus(null);
  lockUI(false);
  showReviewModal(session, extracted);
}

// Called whenever a session actually gets logged — clears out Planned
// Scenes/Open Questions already marked done (presumably resolved by the
// session just logged), leaving unfinished ones to carry into next prep.
function cleanupSessionPrep(c) {
  if (!c.sessionPrep) return;
  if (c.sessionPrep.scenes) c.sessionPrep.scenes = c.sessionPrep.scenes.filter(s => !s.done);
  if (c.sessionPrep.questions) c.sessionPrep.questions = c.sessionPrep.questions.filter(q => !q.done);
}

function saveManual() {
  const c = camp();
  const title = document.getElementById('s-title')?.value?.trim() || 'Untitled Session';
  const date = document.getElementById('s-date')?.value;
  const inWorldDate = document.getElementById('s-inworld-date')?.value?.trim() || '';
  const transcript = document.getElementById('s-transcript')?.value?.trim() || '';
  c.sessions.push({ id: uid(), number: c.sessions.length + 1, title, date, inWorldDate, rawTranscript: transcript, summary: '', keyEvents: [] });
  cleanupSessionPrep(c);
  save();
  toast('Session saved.', 'success');
  navigate('sessions');
}

function reviewContradiction(i) {
  const ct = (window._pe?.contradictions || [])[i];
  if (!ct) return;
  const c = camp();
  const finder = { npc: c.npcs, location: c.locations, faction: c.factions }[ct.entityType];
  const entity = finder?.find(x => x.name.toLowerCase() === (ct.name||'').toLowerCase());
  closeReview();
  if (!entity) { toast('Could not find that entry — it may already have been renamed.', 'error'); return; }
  const openFn = { npc: 'openNPCModal', location: 'openLocationModal', faction: 'openFactionModal' }[ct.entityType];
  if (openFn && typeof window[openFn] === 'function') window[openFn](entity.id);
}

function confirmSave() {
  const c = camp();
  const session = window._ps;
  const extracted = window._pe;
  const npcs = extracted.npcs || [];
  const locs = extracted.locations || [];
  const hooks = extracted.hooks || [];

  session.title = document.getElementById('r-title').value || session.title;
  session.summary = document.getElementById('r-summary').value;

  npcs.forEach((npc, i) => {
    if (!document.getElementById(`nc-${i}`)?.checked) return;
    const existing = c.npcs.find(n => n.name.toLowerCase() === npc.name.toLowerCase());
    if (existing) {
      if (!existing.sessions) existing.sessions = [];
      if (!existing.events) existing.events = [];
      if (!existing.sessions.includes(session.id)) existing.sessions.push(session.id);
      if (npc.notes) existing.events.push({ id: uid(), sessionId: session.id, text: npc.notes });
    } else {
      const ev = npc.notes ? [{ id: uid(), sessionId: session.id, text: npc.notes }] : [];
      c.npcs.push({ id: uid(), name: npc.name, role: npc.role||'', notes: '', motivation: '', secrets: '', locationId: null, status: 'alive', type: 'npc', voiceDescription: '', sessions: [session.id], events: ev });
    }
  });

  locs.forEach((loc, i) => {
    if (!document.getElementById(`lc-${i}`)?.checked) return;
    const existing = c.locations.find(l => l.name.toLowerCase() === loc.name.toLowerCase());
    if (existing) {
      if (!existing.sessionIds) existing.sessionIds = [];
      if (!existing.sessionIds.includes(session.id)) existing.sessionIds.push(session.id);
    } else {
      c.locations.push({ id: uid(), name: loc.name, description: loc.description||'', notes: '', sessionIds: [session.id] });
    }
  });

  hooks.forEach((hook, i) => {
    if (!document.getElementById(`hc-${i}`)?.checked) return;
    c.plotThreads.push({ id: uid(), title: hook.title, description: hook.description||'', truth: '', status: 'active', npcIds: [], locationIds: [], clues: [] });
  });

  const extractedFactions = (window._pe.factions || []);
  let fChk = 0;
  extractedFactions.forEach((f, i) => {
    if (!document.getElementById(`fc-r-${i}`)?.checked) return;
    fChk++;
    const existing = c.factions.find(x => x.name.toLowerCase() === f.name.toLowerCase());
    if (existing) {
      // Append session note to the faction description if it adds new info
      if (f.notes && !existing.description.includes(f.notes.slice(0, 30))) {
        existing.description = (existing.description ? existing.description + '\n\n' : '') + `[Session ${session.number}] ${f.notes}`;
      }
    } else {
      c.factions.push({ id: uid(), name: f.name, description: f.notes||'', goals: '', secrets: '', attitude: 'unknown', status: 'active', color: FACTION_COLORS[c.factions.length % FACTION_COLORS.length], memberIds: [], threadIds: [] });
    }
  });

  const openQuestions = extracted.openQuestions || [];
  if (!c.sessionPrep) c.sessionPrep = { notes: '', scenes: [], questions: [] };
  if (!c.sessionPrep.questions) c.sessionPrep.questions = [];
  const existingQuestionTexts = new Set(c.sessionPrep.questions.map(q => q.text.trim().toLowerCase()));
  let oqChk = 0;
  openQuestions.forEach((q, i) => {
    if (!document.getElementById(`oq-${i}`)?.checked) return;
    const text = (q||'').trim();
    if (!text || existingQuestionTexts.has(text.toLowerCase())) return;
    c.sessionPrep.questions.push({ id: uid(), text, done: false });
    existingQuestionTexts.add(text.toLowerCase());
    oqChk++;
  });

  const reanalyseId = window._reanalyseId;
  window._reanalyseId = null;
  if (reanalyseId) {
    // Update existing session in-place
    const idx = c.sessions.findIndex(x => x.id === session.id);
    if (idx >= 0) c.sessions[idx] = session;
  } else {
    c.sessions.push(session);
  }
  cleanupSessionPrep(c);
  save();

  const nChk = npcs.filter((_,i) => document.getElementById(`nc-${i}`)?.checked).length;
  const lChk = locs.filter((_,i) => document.getElementById(`lc-${i}`)?.checked).length;
  const hChk = hooks.filter((_,i) => document.getElementById(`hc-${i}`)?.checked).length;
  const parts = [`${nChk} NPCs`, `${lChk} locations`, `${hChk} hooks`];
  if (fChk) parts.push(`${fChk} faction${fChk!==1?'s':''}`);
  if (oqChk) parts.push(`${oqChk} loose end${oqChk!==1?'s':''}`);

  document.getElementById('review-overlay')?.remove();
  toast((reanalyseId ? 'Session updated' : 'Session saved') + ' · ' + parts.join(' · '), 'success');
  navigate('sessions');
}
