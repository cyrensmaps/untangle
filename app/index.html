const REL_TYPES = [
  { value: 'ally',     label: 'Ally',     color: '#4a9966', dash: '' },
  { value: 'enemy',    label: 'Enemy',    color: '#cc4444', dash: '' },
  { value: 'rival',    label: 'Rival',    color: '#dd8800', dash: '6,3' },
  { value: 'family',   label: 'Family',   color: '#4488cc', dash: '' },
  { value: 'romantic', label: 'Romantic', color: '#cc88aa', dash: '3,3' },
  { value: 'minion',   label: 'Minion',   color: '#8888aa', dash: '8,3' },
  { value: 'member',   label: 'Member',   color: 'var(--accent)', dash: '5,3' },
  { value: 'unknown',  label: 'Unknown',  color: '#666666', dash: '4,4' },
  { value: 'neutral',  label: 'Neutral',  color: '#888888', dash: '' },
];

function relTypeInfo(value) { return REL_TYPES.find(r => r.value === value) || REL_TYPES[6]; }

function renderRelationshipWeb() {
  const c = camp();
  if (c.npcs.length === 0) return `
    <div class="page-header"><div><h2>Relationship Web</h2><p class="subtitle">Visual map of NPC connections</p></div></div>
    <div class="empty-state"><h3>No characters yet</h3><p>Add characters first, then come back to map their relationships.</p></div>`;

  const W = 900, H = 560, cx = W/2, cy = H/2;
  const hasFactions = c.factions && c.factions.length > 0;
  const npcR = hasFactions ? Math.min(cx, cy) - 55 : Math.min(cx, cy) - 80;
  const facR = 110;

  // Auto-layout: position any un-positioned NPCs in outer ring
  c.npcs.forEach((n, i) => {
    if (!c.npcPositions[n.id]) {
      const angle = (2 * Math.PI * i / c.npcs.length) - Math.PI/2;
      c.npcPositions[n.id] = { x: Math.round(cx + npcR * Math.cos(angle)), y: Math.round(cy + npcR * Math.sin(angle)) };
    }
  });
  // Auto-layout: position any un-positioned factions in inner ring
  if (hasFactions) {
    c.factions.forEach((f, i) => {
      if (!c.factionPositions[f.id]) {
        const angle = (2 * Math.PI * i / c.factions.length) - Math.PI/2;
        c.factionPositions[f.id] = { x: Math.round(cx + facR * Math.cos(angle)), y: Math.round(cy + facR * Math.sin(angle)) };
      }
    });
  }
  save();

  // Faction member edges (dashed, faction-coloured)
  const factionEdgeSvg = hasFactions ? c.factions.map(f => {
    const fp = c.factionPositions[f.id] || {x:cx,y:cy};
    return (f.memberIds || []).map(nid => {
      const np = c.npcPositions[nid] || {x:cx,y:cy};
      return `<line class="rel-member-edge" id="rel-fm-${f.id}-${nid}" x1="${fp.x}" y1="${fp.y}" x2="${np.x}" y2="${np.y}" stroke="${f.color||'#888'}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.45"/>`;
    }).join('');
  }).join('') : '';

  // Relationship edges (NPC↔NPC, NPC↔Faction, Faction↔Faction)
  const _relPos = (id, type) => type === 'faction' ? (c.factionPositions[id] || {x:cx,y:cy}) : (c.npcPositions[id] || {x:100,y:100});
  const _relExists = (id, type) => type === 'faction' ? c.factions.find(f => f.id === id) : c.npcs.find(n => n.id === id);
  const edgeSvg = c.relationships.map(rel => {
    const ft = rel.fromType || 'npc', tt = rel.toType || 'npc';
    if (!_relExists(rel.fromId, ft) || !_relExists(rel.toId, tt)) return '';
    const pa = _relPos(rel.fromId, ft);
    const pb = _relPos(rel.toId, tt);
    const mx = (pa.x + pb.x) / 2, my = (pa.y + pb.y) / 2;
    const rt = relTypeInfo(rel.type);
    return `<g class="rel-edge" data-rel-id="${rel.id}" onclick="openEditRelModal('${rel.id}')" style="cursor:pointer">
      <line id="rel-line-${rel.id}" x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${rt.color}" stroke-width="2" ${rt.dash?`stroke-dasharray="${rt.dash}"`:''} opacity="0.7"/>
      <line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="transparent" stroke-width="14"/>
      <text id="rel-label-${rel.id}" x="${mx}" y="${my}" text-anchor="middle" font-size="10" fill="${rt.color}" font-family="var(--font)" dy="-5" pointer-events="none">${esc(rel.label || rt.label)}</text>
    </g>`;
  }).join('');

  // Faction nodes (rounded rectangles, inner ring)
  const factionNodeSvg = hasFactions ? c.factions.map(f => {
    const pos = c.factionPositions[f.id] || {x:cx,y:cy};
    const color = f.color || '#888';
    const shortName = f.name.length > 14 ? f.name.slice(0, 13) + '…' : f.name;
    return `<g class="rel-faction-node" data-faction-id="${f.id}" transform="translate(${pos.x},${pos.y})" style="cursor:grab">
      <rect x="-43" y="-14" width="86" height="28" rx="7" fill="rgba(22,22,22,1)" pointer-events="none"/>
      <rect x="-42" y="-13" width="84" height="26" rx="6" fill="${color}22" stroke="${color}" stroke-width="1.5" pointer-events="none"/>
      <text text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="${color}" font-family="var(--font)" pointer-events="none">${esc(shortName)}</text>
      <rect x="-43" y="-14" width="86" height="28" rx="7" fill="transparent"/>
    </g>`;
  }).join('') : '';

  // NPC nodes (circles, outer ring)
  const nodeSvg = c.npcs.map(n => {
    const pos = c.npcPositions[n.id] || {x:100,y:100};
    const letter = esc((n.name[0]||'?').toUpperCase());
    const imgEl = n.image
      ? `<image href="${n.image}" x="-26" y="-26" width="52" height="52" clip-path="url(#rclip-${n.id})" preserveAspectRatio="xMidYMid slice"/>`
      : `<text text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="var(--accent)" pointer-events="none">${letter}</text>`;
    const ringColor = n.status === 'dead' ? '#666' : 'rgba(var(--accent-rgb),0.5)';
    const bgFill = n.image ? 'rgba(40,40,40,1)' : 'rgba(28,28,28,1)';
    return `<g class="rel-node" data-npc-id="${n.id}" transform="translate(${pos.x},${pos.y})" style="cursor:grab">
      <defs>${n.image?`<clipPath id="rclip-${n.id}"><circle r="26"/></clipPath>`:''}</defs>
      <circle r="27" fill="${bgFill}" pointer-events="none"/>
      ${imgEl}
      ${!n.image?`<circle r="26" fill="rgba(var(--accent-rgb),0.1)" stroke="rgba(var(--accent-rgb),0.35)" stroke-width="1.5" pointer-events="none"/>`:''}
      <circle r="26" fill="none" stroke="${ringColor}" stroke-width="1.5" pointer-events="none" ${n.status==='dead'?'opacity="0.4"':''}/>
      <text y="40" text-anchor="middle" font-size="11" fill="var(--text)" font-family="var(--font)" pointer-events="none">${esc(n.name)}</text>
      <circle r="30" fill="transparent"/>
    </g>`;
  }).join('');

  const legend = REL_TYPES.map(rt => `<span style="display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;color:${rt.color}">
    <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="${rt.color}" stroke-width="2" ${rt.dash?`stroke-dasharray="${rt.dash}"`:''}/></svg>${rt.label}</span>`).join('');

  return `
    <div class="page-header">
      <div><h2>Relationship Web</h2><p class="subtitle">${c.npcs.length} characters · ${c.relationships.length} relationship${c.relationships.length!==1?'s':''}${hasFactions?' · '+c.factions.length+' faction'+(c.factions.length!==1?'s':''):''}</p></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="autoLayoutWeb()">↺ Auto-arrange</button>
        <button class="btn btn-ghost" onclick="openSparkModal()">Spark</button>
        <button class="btn btn-primary" onclick="openAddRelModal()">+ Add Relationship</button>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px">${legend}</div>
    <div style="position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg-elevated)">
      <svg id="rel-web-svg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block;min-height:400px;max-height:65vh;cursor:grab">
        <g id="rel-viewport">
          <g id="rel-faction-edges">${factionEdgeSvg}</g>
          <g id="rel-edges">${edgeSvg}</g>
          <g id="rel-faction-nodes">${factionNodeSvg}</g>
          <g id="rel-nodes">${nodeSvg}</g>
        </g>
      </svg>
      <div style="position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px">
        <button onclick="relZoom(1.25)" style="width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button>
        <button onclick="centerRelWeb()" title="Reset view" style="width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center">⌖</button>
        <button onclick="relZoom(0.8)" style="width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button>
      </div>
    </div>
    <p class="text-xs text-dim" style="margin-top:8px">Drag background to pan · Scroll to zoom · Drag characters or factions to reposition · Click a line to edit</p>`;
}

let _relDrag = null;
let _relPan  = null;
let _webTransform = { tx: 0, ty: 0, scale: 1 };

function _svgPoint(svg, clientX, clientY) {
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function _screenToViewport(clientX, clientY, svg) {
  const sp = _svgPoint(svg, clientX, clientY);
  const { tx, ty, scale } = _webTransform;
  return { x: (sp.x - tx) / scale, y: (sp.y - ty) / scale };
}
function _applyWebTransform() {
  const vp = document.getElementById('rel-viewport');
  if (vp) vp.setAttribute('transform', `translate(${_webTransform.tx},${_webTransform.ty}) scale(${_webTransform.scale})`);
}
function centerRelWeb() {
  _webTransform = { tx: 0, ty: 0, scale: 1 };
  _applyWebTransform();
}
function relZoom(factor) {
  const svg = document.getElementById('rel-web-svg');
  if (!svg) return;
  const bb = svg.getBoundingClientRect();
  const cx = bb.left + bb.width / 2, cy = bb.top + bb.height / 2;
  const sp = _svgPoint(svg, cx, cy);
  const { tx, ty, scale } = _webTransform;
  const ns = Math.max(0.15, Math.min(4, scale * factor));
  _webTransform = { tx: sp.x + (tx - sp.x) * (ns / scale), ty: sp.y + (ty - sp.y) * (ns / scale), scale: ns };
  _applyWebTransform();
}

// Hover-to-focus: dim everything not connected to the hovered node. Chosen
// over click (the original ask) because nodes already use click to open the
// edit modal and drag to reposition — hover doesn't conflict with either.
function _connectedIds(type, id) {
  const c = camp();
  const npcIds = new Set(), facIds = new Set();
  if (type === 'faction') facIds.add(id); else npcIds.add(id);
  c.relationships.forEach(rel => {
    const ft = rel.fromType || 'npc', tt = rel.toType || 'npc';
    if (ft === type && rel.fromId === id) (tt === 'faction' ? facIds : npcIds).add(rel.toId);
    if (tt === type && rel.toId === id) (ft === 'faction' ? facIds : npcIds).add(rel.fromId);
  });
  if (type === 'faction') {
    const f = c.factions.find(x => x.id === id);
    (f?.memberIds || []).forEach(nid => npcIds.add(nid));
  } else {
    c.factions.forEach(f => { if ((f.memberIds || []).includes(id)) facIds.add(f.id); });
  }
  return { npcIds, facIds };
}

function _applyWebFocus(type, id) {
  const svg = document.getElementById('rel-web-svg');
  if (!svg) return;
  if (!type) {
    svg.querySelectorAll('.rel-node, .rel-faction-node, .rel-edge, .rel-member-edge').forEach(el => { el.style.opacity = ''; });
    return;
  }
  const { npcIds, facIds } = _connectedIds(type, id);
  const c = camp();
  svg.querySelectorAll('.rel-node').forEach(el => {
    el.style.opacity = npcIds.has(el.dataset.npcId) ? '1' : '0.15';
  });
  svg.querySelectorAll('.rel-faction-node').forEach(el => {
    el.style.opacity = facIds.has(el.dataset.factionId) ? '1' : '0.15';
  });
  svg.querySelectorAll('.rel-edge').forEach(el => {
    const rel = c.relationships.find(r => r.id === el.dataset.relId);
    if (!rel) { el.style.opacity = '0.1'; return; }
    const ft = rel.fromType || 'npc', tt = rel.toType || 'npc';
    const involved = (ft === type && rel.fromId === id) || (tt === type && rel.toId === id);
    el.style.opacity = involved ? '1' : '0.1';
  });
  svg.querySelectorAll('.rel-member-edge').forEach(el => {
    const [fid, nid] = el.id.slice('rel-fm-'.length).split('-');
    const involved = (type === 'faction' && fid === id) || (type === 'npc' && nid === id);
    el.style.opacity = involved ? '0.8' : '0.08';
  });
}

function setupRelationshipWebEvents() {
  const svg = document.getElementById('rel-web-svg');
  if (!svg) return;
  _webTransform = { tx: 0, ty: 0, scale: 1 };

  // Faction node drag + hover-to-focus
  svg.querySelectorAll('.rel-faction-node').forEach(node => {
    node.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      const id = node.dataset.factionId;
      const vp = _screenToViewport(e.clientX, e.clientY, svg);
      const c = camp();
      const pos = c.factionPositions[id] || { x: 450, y: 280 };
      _relDrag = { type: 'faction', id, startX: vp.x, startY: vp.y, origX: pos.x, origY: pos.y, moved: false };
    });
    node.addEventListener('mouseenter', () => _applyWebFocus('faction', node.dataset.factionId));
    node.addEventListener('mouseleave', () => _applyWebFocus(null));
  });

  // NPC node drag + hover-to-focus
  svg.querySelectorAll('.rel-node').forEach(node => {
    node.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      const id = node.dataset.npcId;
      const vp = _screenToViewport(e.clientX, e.clientY, svg);
      const c = camp();
      const pos = c.npcPositions[id] || { x: 200, y: 200 };
      _relDrag = { type: 'npc', id, startX: vp.x, startY: vp.y, origX: pos.x, origY: pos.y, moved: false };
    });
    node.addEventListener('mouseenter', () => _applyWebFocus('npc', node.dataset.npcId));
    node.addEventListener('mouseleave', () => _applyWebFocus(null));
  });

  // Pan — mousedown on SVG background
  svg.addEventListener('mousedown', e => {
    if (e.button !== 0 || _relDrag) return;
    e.preventDefault();
    const sp = _svgPoint(svg, e.clientX, e.clientY);
    _relPan = { startX: sp.x, startY: sp.y, origTx: _webTransform.tx, origTy: _webTransform.ty };
    svg.style.cursor = 'grabbing';
  });

  svg.addEventListener('mousemove', e => {
    if (_relDrag) {
      const vp = _screenToViewport(e.clientX, e.clientY, svg);
      const dx = vp.x - _relDrag.startX, dy = vp.y - _relDrag.startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _relDrag.moved = true;
      const nx = _relDrag.origX + dx, ny = _relDrag.origY + dy;
      const c = camp();

      // Helper: get endpoint position, substituting current drag coords for the moving node
      const _epPos = (id, type, dragging) => {
        if (id === dragging.id && type === dragging.type) return {x:nx, y:ny};
        return type === 'faction' ? (c.factionPositions[id]||{x:0,y:0}) : (c.npcPositions[id]||{x:0,y:0});
      };

      if (_relDrag.type === 'faction') {
        const node = svg.querySelector(`[data-faction-id="${_relDrag.id}"]`);
        if (node) node.setAttribute('transform', `translate(${nx},${ny})`);
        // Update faction member edges (dashed overlay lines)
        const f = c.factions.find(f => f.id === _relDrag.id);
        if (f) {
          (f.memberIds || []).forEach(nid => {
            const line = document.getElementById(`rel-fm-${f.id}-${nid}`);
            if (line) { line.setAttribute('x1', nx); line.setAttribute('y1', ny); }
          });
        }
        // Update any relationship edges with this faction as an endpoint
        c.relationships.forEach(rel => {
          const ft = rel.fromType || 'npc', tt = rel.toType || 'npc';
          if (!(ft === 'faction' && rel.fromId === _relDrag.id) && !(tt === 'faction' && rel.toId === _relDrag.id)) return;
          const pa = _epPos(rel.fromId, ft, _relDrag);
          const pb = _epPos(rel.toId, tt, _relDrag);
          const line = document.getElementById(`rel-line-${rel.id}`);
          const label = document.getElementById(`rel-label-${rel.id}`);
          if (line) { line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y); line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y); }
          if (label) { label.setAttribute('x',(pa.x+pb.x)/2); label.setAttribute('y',(pa.y+pb.y)/2); }
        });
      } else {
        // NPC drag
        const node = svg.querySelector(`[data-npc-id="${_relDrag.id}"]`);
        if (node) node.setAttribute('transform', `translate(${nx},${ny})`);
        // Update relationship edges involving this NPC
        c.relationships.forEach(rel => {
          const ft = rel.fromType || 'npc', tt = rel.toType || 'npc';
          if (rel.fromId !== _relDrag.id && rel.toId !== _relDrag.id) return;
          const pa = _epPos(rel.fromId, ft, _relDrag);
          const pb = _epPos(rel.toId, tt, _relDrag);
          const line = document.getElementById(`rel-line-${rel.id}`);
          const label = document.getElementById(`rel-label-${rel.id}`);
          if (line) { line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y); line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y); }
          if (label) { label.setAttribute('x',(pa.x+pb.x)/2); label.setAttribute('y',(pa.y+pb.y)/2); }
        });
        // Update faction member edges that connect to this NPC
        c.factions.forEach(f => {
          if (!(f.memberIds || []).includes(_relDrag.id)) return;
          const line = document.getElementById(`rel-fm-${f.id}-${_relDrag.id}`);
          if (line) { line.setAttribute('x2', nx); line.setAttribute('y2', ny); }
        });
      }
      return;
    }
    // Pan
    if (_relPan) {
      const sp = _svgPoint(svg, e.clientX, e.clientY);
      _webTransform.tx = _relPan.origTx + (sp.x - _relPan.startX);
      _webTransform.ty = _relPan.origTy + (sp.y - _relPan.startY);
      _applyWebTransform();
    }
  });

  const endInteraction = e => {
    if (_relDrag) {
      const vp = _screenToViewport(e.clientX, e.clientY, svg);
      const dx = vp.x - _relDrag.startX, dy = vp.y - _relDrag.startY;
      if (_relDrag.moved) {
        if (_relDrag.type === 'faction') {
          camp().factionPositions[_relDrag.id] = { x: Math.round(_relDrag.origX + dx), y: Math.round(_relDrag.origY + dy) };
        } else {
          camp().npcPositions[_relDrag.id] = { x: Math.round(_relDrag.origX + dx), y: Math.round(_relDrag.origY + dy) };
        }
        save();
      } else {
        if (_relDrag.type === 'faction') openFactionModal(_relDrag.id);
        else openNPCModal(_relDrag.id);
      }
      _relDrag = null;
    }
    if (_relPan) { _relPan = null; svg.style.cursor = 'grab'; }
  };
  svg.addEventListener('mouseup', endInteraction);
  svg.addEventListener('mouseleave', endInteraction);

  // Scroll to zoom
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const sp = _svgPoint(svg, e.clientX, e.clientY);
    const { tx, ty, scale } = _webTransform;
    const ns = Math.max(0.15, Math.min(4, scale * factor));
    _webTransform = { tx: sp.x + (tx - sp.x) * (ns / scale), ty: sp.y + (ty - sp.y) * (ns / scale), scale: ns };
    _applyWebTransform();
  }, { passive: false });
}

function openSparkModal(presetType, presetId) {

      <div class="form-row">

function _sparkEntity(id, type) {
  const c = camp();
  return type === 'faction' ? c.factions.find(f => f.id === id) : c.npcs.find(n => n.id === id);
}
function _sparkDetail(entity, type) {
  return type === 'faction' ? (entity.description || '') : [entity.role, entity.notes].filter(Boolean).join(' — ');
}

async function generateSparkConnection() {
  const fromVal = document.getElementById('spark-from').value;
  const toVal   = document.getElementById('spark-to').value;
  if (!fromVal || !toVal) { toast('Select two entities.', 'error'); return; }
  const [fromType, fromId] = fromVal.split(':');
  const [toType,   toId]   = toVal.split(':');
  if (fromId === toId && fromType === toType) { toast('Choose two different entities.', 'error'); return; }
  if (!getClaudeKey()) { toast('Claude API key required — add it in Foundry Configure Settings.', 'error'); navigate('settings'); return; }
  if (!(await confirmPaidAction(['claude'], 'Generating a connection with AI'))) return;

  const a = _sparkEntity(fromId, fromType), b = _sparkEntity(toId, toType);
  if (!a || !b) { toast('Could not find the selected entities.', 'error'); return; }

  document.getElementById('spark-overlay')?.remove();
  const loadingEl = document.createElement('div');
  loadingEl.id = 'spark-loading';
  loadingEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px';
  loadingEl.innerHTML = `
    <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite"></div>
    <div style="color:#fff;font-size:1rem;font-weight:600">Thinking of a connection…</div>`;
  document.body.appendChild(loadingEl);

  try {
    const typeList = REL_TYPES.map(r => r.value).join(', ');
    const aDetail = _sparkDetail(a, fromType), bDetail = _sparkDetail(b, toType);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': getClaudeKey(), 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 300,
        messages: [{ role: 'user', content: `You are helping a TTRPG GM improvise a relationship between two things in their campaign. Suggest one surprising but plausible connection.

1. ${a.name} (${fromType})${aDetail?': '+aDetail:''}
2. ${b.name} (${toType})${bDetail?': '+bDetail:''}

Return ONLY valid JSON, no markdown, no explanation:
{ "type": "one of: ${typeList}", "label": "short 2-4 word label for the relationship", "description": "1-2 sentences explaining the connection" }` }]
      })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Could not parse response');
    const result = JSON.parse(match[0]);
    document.getElementById('spark-loading')?.remove();
    showSparkReviewModal(fromType, fromId, toType, toId, result);
  } catch (err) {
    document.getElementById('spark-loading')?.remove();
    toast('Error: ' + (err.message || String(err)), 'error');
  }
}

function showSparkReviewModal(fromType, fromId, toType, toId, result) {
  const a = _sparkEntity(fromId, fromType), b = _sparkEntity(toId, toType);
  const typeOpts = REL_TYPES.map(r => `<option value="${r.value}" ${r.value===result.type?'selected':''}>${r.label}</option>`).join('');
  window._sparkPending = { fromType, fromId, toType, toId };
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'spark-review-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:460px">
      <div class="modal-header"><h3>Suggested Connection</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <p class="text-sm text-dim" style="margin-bottom:14px">${esc(a?.name||'?')} ↔ ${esc(b?.name||'?')}</p>
      <div class="form-group"><label>Relationship type</label><select id="spark-type">${typeOpts}</select></div>
      <div class="form-group"><label>Label</label><input type="text" id="spark-label" value="${esc(result.label||'')}"></div>
      <div class="form-group"><label>Description</label><textarea id="spark-desc" rows="3">${esc(result.description||'')}</textarea></div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Discard</button>
        <button class="btn btn-primary" onclick="approveSparkConnection()">Approve — Add to Web</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function approveSparkConnection() {
  const p = window._sparkPending;
  if (!p) return;
  const type  = document.getElementById('spark-type').value;
  const label = document.getElementById('spark-label').value.trim();
  const notes = document.getElementById('spark-desc').value.trim();
  camp().relationships.push({ id: uid(), fromId: p.fromId, fromType: p.fromType, toId: p.toId, toType: p.toType, type, label, notes });
  window._sparkPending = null;
  save();
  document.getElementById('spark-review-overlay')?.remove();
  toast('Connection added to the Relationship Web.', 'success');
  navigate('web');
}

const THREAD_STATUSES = [
  { value: 'rumor',    label: 'Rumor',    color: '#8866cc' },
  { value: 'active',   label: 'Active',   color: '#4a9966' },
  { value: 'dormant',  label: 'Dormant',  color: '#dd8800' },
  { value: 'resolved', label: 'Resolved', color: '#888888' },
  { value: 'abandoned',label: 'Abandoned',color: '#cc4444' },
];

function threadStatusInfo(v) { return THREAD_STATUSES.find(s => s.value === v) || THREAD_STATUSES[0]; }

function renderPlotThreads() {
  const c = camp();
  const filter = window._threadFilter || 'all';

  const filtered = filter === 'all' ? c.plotThreads : c.plotThreads.filter(t => t.status === filter);
  const counts = {};
  THREAD_STATUSES.forEach(s => { counts[s.value] = c.plotThreads.filter(t => t.status === s.value).length; });

  const filterBtns = [{ value:'all', label:'All', color:'var(--text)' }, ...THREAD_STATUSES].map(s =>
    `<button class="btn ${(filter===s.value)?'btn-primary':'btn-ghost'} btn-sm" onclick="window._threadFilter='${s.value}';render()" style="${filter===s.value&&s.color?`background:${s.color};border-color:${s.color};`:''}">${s.label}${s.value!=='all'&&counts[s.value]?` (${counts[s.value]})`:''}</button>`
  ).join('');

  const threadCards = filtered.map(t => {
    const si = threadStatusInfo(t.status);
    const involvedNpcs = (t.npcIds||[]).map(id => c.npcs.find(n=>n.id===id)).filter(Boolean);
    const avatars = involvedNpcs.slice(0,5).map(n =>
      `<div class="npc-initial" style="width:26px;height:26px;font-size:0.7rem;margin-bottom:0;${n.image?'':`background:rgba(var(--accent-rgb),0.1);`}flex-shrink:0">${n.image?`<img src="${n.image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(n.name[0]||'?').toUpperCase()}</div>`
    ).join('');
    return `
      <div class="card" onclick="openEditThreadModal('${t.id}')" draggable="true" ondragstart="onEntityDragStart(event,'thread','${t.id}')" title="Drag to the macro bar for a one-click jump" style="cursor:pointer;border-left:3px solid ${si.color}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:0.95rem;margin-bottom:4px">${esc(t.title)}</div>
            ${t.description?`<div class="text-sm text-dim" style="line-height:1.5">${esc(t.description.slice(0,120))}${t.description.length>120?'…':''}</div>`:''}
          </div>
          <span style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;border-radius:4px;padding:2px 8px;font-size:0.72rem;font-weight:600;white-space:nowrap">${si.label}</span>
        </div>
        ${(t.clues||[]).length?`<div class="text-xs text-dim" style="margin-top:8px">${t.clues.length} clue${t.clues.length!==1?'s':''}</div>`:''}
        ${avatars?`<div style="display:flex;gap:4px;margin-top:10px;align-items:center">${avatars}${involvedNpcs.length>5?`<span class="text-xs text-dim">+${involvedNpcs.length-5}</span>`:''}</div>`:''}
      </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div><h2>Plot Threads</h2><p class="subtitle">${c.plotThreads.length} thread${c.plotThreads.length!==1?'s':''} · ${counts.active||0} active</p></div>
      <button class="btn btn-primary" onclick="openAddThreadModal()">+ New Thread</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${filterBtns}</div>
    ${filtered.length===0
      ? `<div class="empty-state"><h3>${c.plotThreads.length===0?'No threads yet':'No threads match this filter'}</h3><p>${c.plotThreads.length===0?'Track your storylines, mysteries, and ongoing plots.':''}</p></div>`

      ${isEdit && (c.clocks||[]).filter(ck=>ck.linkedType==='thread'&&ck.linkedId===t.id).length?`
      <div class="form-group">
        <label>Linked Clocks <span class="text-dim text-xs">(managed on the Clocks page)</span></label>
        ${(c.clocks||[]).filter(ck=>ck.linkedType==='thread'&&ck.linkedId===t.id).map(ck=>`
          <div style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer" onclick="this.closest('.modal-overlay').remove();navigate('clocks')">
            ${clockSegmentsHTML(ck, '', false)}
            <span class="text-sm">${esc(ck.label)} <span class="text-dim text-xs">${ck.filled}/${ck.segments}</span></span>
          </div>`).join('')}
      </div>`:''}
      ${c.npcs.length?`<div class="form-group"><label>Involved characters</label><div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px 12px">${npcCheckboxes}</div></div>`:''}
      ${c.locations.length?`<div class="form-group"><label>Involved locations</label><div style="max-height:120px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px 12px">${locationCheckboxes}</div></div>`:''}
      ${c.hooks.length?`<div class="form-group"><label>Related hooks</label><div style="max-height:120px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px 12px">${hookCheckboxes}</div></div>`:''}
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <label style="margin:0">Player clues gathered</label>
          <button class="btn btn-ghost btn-sm" onclick="addThreadClue()">+ Add clue</button>
        </div>
        <div id="thread-clues-list">
          ${(window._threadClues||[]).map((cl,i) => `
            <div style="display:flex;gap:8px;margin-bottom:8px" data-clue-idx="${i}">
              <textarea rows="2" placeholder="Clue text…" oninput="window._threadClues[${i}].text=this.value" style="flex:1;resize:vertical">${esc(cl.text)}</textarea>
              <button class="btn btn-danger btn-sm" style="flex-shrink:0;align-self:flex-start" onclick="removeThreadClue(${i})">✕</button>
            </div>`).join('')}
        </div>
      </div>
      ${isEdit?renderTaggedNotesSection('thread', t.id):''}
      <div class="flex gap-8" style="justify-content:space-between">
        ${isEdit?`<button class="btn btn-danger" onclick="deleteThread('${t.id}')">Delete</button>`:'<span></span>'}
        <div class="flex gap-8">
          <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="saveThread(${isEdit?`'${t.id}'`:'null'})">${isEdit?'Save':'Create'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function addThreadClue() {
  if (!window._threadClues) window._threadClues = [];
  const idx = window._threadClues.length;
  window._threadClues.push({ id: uid(), text: '' });
  const list = document.getElementById('thread-clues-list');
  if (!list) return;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
  div.dataset.clueIdx = idx;
  div.innerHTML = `<textarea rows="2" placeholder="Clue text…" oninput="window._threadClues[${idx}].text=this.value" style="flex:1;resize:vertical"></textarea><button class="btn btn-danger btn-sm" style="flex-shrink:0;align-self:flex-start" onclick="removeThreadClue(${idx})">✕</button>`;
  list.appendChild(div);
  div.querySelector('input')?.focus();
}

function removeThreadClue(idx) {
  window._threadClues.splice(idx, 1);
  // Re-render clues list
  const list = document.getElementById('thread-clues-list');
  if (!list) return;
  list.innerHTML = (window._threadClues||[]).map((cl,i) => `
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <textarea rows="2" placeholder="Clue text…" oninput="window._threadClues[${i}].text=this.value" style="flex:1;resize:vertical">${esc(cl.text)}</textarea>
      <button class="btn btn-danger btn-sm" style="flex-shrink:0;align-self:flex-start" onclick="removeThreadClue(${i})">✕</button>
    </div>`).join('');
}

function saveThread(id) {
  const title = document.getElementById('th-title')?.value.trim();
  if (!title) { toast('Title is required.', 'error'); return; }
  const c = camp();
  const npcIds = [...document.querySelectorAll('#thread-clues-list ~ * input[type=checkbox], .modal input[type=checkbox]')].filter(cb => cb.checked).map(cb => cb.value);
  // Re-collect checked boxes from the modal
  const allChecked = document.querySelectorAll('.modal-overlay input[type=checkbox]:checked');
  const checkedNpcIds = [], checkedLocIds = [], checkedHookIds = [];
  allChecked.forEach(cb => {
    if (c.npcs.find(n=>n.id===cb.value)) checkedNpcIds.push(cb.value);
    else if (c.locations.find(l=>l.id===cb.value)) checkedLocIds.push(cb.value);
    else if (c.hooks.find(h=>h.id===cb.value)) checkedHookIds.push(cb.value);
  });
  const data = {
    title,
    status: document.getElementById('th-status')?.value || 'active',
    description: document.getElementById('th-desc')?.value || '',
    truth: document.getElementById('th-truth')?.value || '',
    npcIds: checkedNpcIds,
    locationIds: checkedLocIds,
    hookIds: checkedHookIds,
    clues: (window._threadClues||[]).filter(cl => cl.text.trim()),
  };
  if (id) {
    const t = c.plotThreads.find(x => x.id === id);
    if (t) Object.assign(t, data);
  } else {
    c.plotThreads.push({ id: uid(), ...data });
  }
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast(id ? 'Thread saved.' : 'Thread created.', 'success');
  render();
}

async function deleteThread(id) {
  if (!(await confirmModal('Delete this plot thread?'))) return;
  const c = camp();
  c.plotThreads = c.plotThreads.filter(t => t.id !== id);
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast('Thread deleted.', 'success');
  render();
}

const FACTION_ATTITUDES = [
  { value: 'allied',  label: 'Allied',  color: '#4a9966' },
  { value: 'neutral', label: 'Neutral', color: '#888888' },
  { value: 'hostile', label: 'Hostile', color: '#cc4444' },
  { value: 'wary',    label: 'Wary',    color: '#dd8800' },
  { value: 'unknown', label: 'Unknown', color: '#8866cc' },
];
const FACTION_STATUSES = [
  { value: 'active',   label: 'Active' },
  { value: 'dormant',  label: 'Dormant' },
  { value: 'defeated', label: 'Defeated' },
];
const FACTION_COLORS = ['#7c93a8','#5c9077','#4a6acc','#8866cc','#c0524f','#cc7744','#44aacc','#888888'];

function renderFactions() {
  const c = camp();
  const cards = c.factions.map(f => {
    const att = FACTION_ATTITUDES.find(a => a.value === f.attitude) || FACTION_ATTITUDES[1];
    const members = (f.memberIds||[]).map(id => c.npcs.find(n => n.id === id)).filter(Boolean);
    const threads  = (f.threadIds||[]).map(id => c.plotThreads.find(t => t.id === id)).filter(Boolean);
    const col = f.color || '#888888';
    const avatars = members.slice(0,5).map(n =>
      `<div class="npc-initial" style="width:26px;height:26px;font-size:0.7rem;margin-bottom:0;flex-shrink:0">${n.image?`<img src="${n.image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(n.name[0]||'?').toUpperCase()}</div>`
    ).join('');
    const statSt = FACTION_STATUSES.find(s=>s.value===(f.status||'active'));
    return `
      <div class="card faction-card" onclick="openFactionModal('${f.id}')" style="border-left:3px solid ${col}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">
          <div>
            <div style="font-weight:600;font-size:0.95rem">${esc(f.name)}</div>
            ${statSt&&statSt.value!=='active'?`<div class="text-xs text-dim" style="margin-top:2px">${statSt.label}</div>`:''}
          </div>
          <span style="background:${att.color}22;color:${att.color};border:1px solid ${att.color}44;border-radius:4px;padding:2px 8px;font-size:0.72rem;font-weight:600;white-space:nowrap;flex-shrink:0">${att.label}</span>
        </div>
        ${f.description?`<div class="text-sm text-dim" style="margin-bottom:10px;line-height:1.5">${esc(f.description.slice(0,110))}${f.description.length>110?'…':''}</div>`:''}
        ${f.goals?`<div class="text-xs" style="margin-bottom:10px"><span class="text-dim">Goals: </span>${esc(f.goals.slice(0,90))}${f.goals.length>90?'…':''}</div>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between">
          ${avatars
            ? `<div style="display:flex;gap:3px;align-items:center">${avatars}${members.length>5?`<span class="text-xs text-dim" style="margin-left:4px">+${members.length-5} more</span>`:''}</div>`
            : `<span class="text-xs text-dim">${members.length} member${members.length!==1?'s':''}</span>`}
          ${threads.length?`<span class="text-xs text-dim">${threads.length} thread${threads.length!==1?'s':''}</span>`:''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div><h2>Factions</h2><p class="subtitle">${c.factions.length} faction${c.factions.length!==1?'s':''}</p></div>
      <div style="display:flex;gap:8px">
        ${c.factions.length>=2?`<button class="btn btn-ghost" onclick="findDuplicateFactions()">Find Duplicates</button>`:''}
        <button class="btn btn-primary" onclick="openAddFactionModal()">+ New Faction</button>
      </div>
    </div>
    ${c.factions.length===0
      ? `<div class="empty-state"><h3>No factions yet</h3><p>Track guilds, noble houses, cults, and other organisations — and their attitude toward the party.</p></div>`
      : `<div class="card-grid">${cards}</div>`}`;
}

function openAddFactionModal() { openFactionModal(null); }

function openFactionModal(id) {
  const c = camp();
  const f = id ? c.factions.find(x => x.id === id) : null;
  const isEdit = !!f;
  const selectedColor = f?.color || FACTION_COLORS[0];
  window._factionColor = selectedColor;

  const attOpts    = FACTION_ATTITUDES.map(a => `<option value="${a.value}" ${(f?.attitude||'neutral')===a.value?'selected':''}>${a.label}</option>`).join('');
  const statusOpts = FACTION_STATUSES.map(s  => `<option value="${s.value}" ${(f?.status||'active')===s.value?'selected':''}>${s.label}</option>`).join('');
  const swatches   = FACTION_COLORS.map(col =>
    `<div class="fc-swatch" onclick="window._factionColor='${col}';document.querySelectorAll('.fc-swatch').forEach(s=>{s.style.outline='none';s.style.outlineOffset='0'});this.style.outline='2px solid white';this.style.outlineOffset='2px'" style="width:22px;height:22px;border-radius:50%;background:${col};cursor:pointer;flex-shrink:0;${col===selectedColor?'outline:2px solid white;outline-offset:2px':''}"></div>`
  ).join('');

  function buildCheckboxTable(items, nameKey, cbClass, selectedIds) {
    if (!items.length) return '<p class="text-xs text-dim">None available.</p>';
    let rows = '';
    for (let i = 0; i < items.length; i += 2) {
      const a = items[i], b = items[i+1];
      const cs = 'padding:5px 0;vertical-align:middle;font-size:0.875rem;color:var(--text)';
      const cbs = 'padding:5px 8px;vertical-align:middle;width:28px;text-align:right';
      rows += `<tr>
        <td style="${cs}">${esc(a[nameKey])}</td>
        <td style="${cbs}"><input type="checkbox" class="${cbClass}" value="${a.id}" ${selectedIds.includes(a.id)?'checked':''} style="cursor:pointer"></td>
        <td style="width:20px"></td>
        <td style="${cs}">${b?esc(b[nameKey]):''}</td>
        <td style="${cbs}">${b?`<input type="checkbox" class="${cbClass}" value="${b.id}" ${selectedIds.includes(b.id)?'checked':''} style="cursor:pointer">`:''}
      </tr>`;
    }
    return `<table style="width:100%;border-collapse:collapse">${rows}</table>`;
  }

  const npcCBs    = buildCheckboxTable(c.npcs,        'name',  'fc-npc-cb',    f?.memberIds||[]);
  const threadCBs = buildCheckboxTable(c.plotThreads,  'title', 'fc-thread-cb', f?.threadIds||[]);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:600px">
      <div class="modal-header"><h3>${isEdit?'Edit':'New'} Faction</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="form-row">
        <div class="form-group" style="flex:2"><label>Name</label><input type="text" id="fc-name" value="${esc(f?.name||'')}" placeholder="The Merchant Guild, House Vethara…"></div>
        <div class="form-group"><label>Color</label><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:6px">${swatches}</div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Attitude toward party</label><select id="fc-attitude">${attOpts}</select></div>
        <div class="form-group"><label>Status</label><select id="fc-status">${statusOpts}</select></div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="fc-desc" rows="2" placeholder="Who are they? Who leads them?">${esc(f?.description||'')}</textarea></div>
      <div class="form-group"><label>Goals <span class="text-dim text-xs">(what do they want?)</span></label><textarea id="fc-goals" rows="2" placeholder="Control the docks, restore the old religion…">${esc(f?.goals||'')}</textarea></div>
      <div class="form-group"><label>GM Secrets <span class="text-dim text-xs">(hidden from players)</span></label><textarea id="fc-secrets" rows="2" placeholder="Hidden agenda, internal conflicts…">${esc(f?.secrets||'')}</textarea></div>
      ${isEdit && (c.clocks||[]).filter(ck=>ck.linkedType==='faction'&&ck.linkedId===f.id).length?`
      <div class="form-group">
        <label>Linked Clocks <span class="text-dim text-xs">(managed on the Clocks page)</span></label>
        ${(c.clocks||[]).filter(ck=>ck.linkedType==='faction'&&ck.linkedId===f.id).map(ck=>`
          <div style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer" onclick="this.closest('.modal-overlay').remove();navigate('clocks')">
            ${clockSegmentsHTML(ck, '', false)}
            <span class="text-sm">${esc(ck.label)} <span class="text-dim text-xs">${ck.filled}/${ck.segments}</span></span>
          </div>`).join('')}
      </div>`:''}
      ${c.npcs.length?`<div class="form-group"><label>Members</label><div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px 12px">${npcCBs}</div></div>`:''}
      ${c.plotThreads.length?`<div class="form-group"><label>Linked Plot Threads</label><div style="max-height:120px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px 12px">${threadCBs}</div></div>`:''}
      ${isEdit?renderTaggedNotesSection('faction', f.id):''}
      <div class="flex gap-8" style="justify-content:space-between">
        ${isEdit?`<button class="btn btn-danger" onclick="deleteFaction('${f.id}')">Delete</button>`:'<span></span>'}
        <div class="flex gap-8">
          <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="saveFaction(${isEdit?`'${f.id}'`:'null'})">${isEdit?'Save':'Create'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveFaction(id) {
  const name = document.getElementById('fc-name')?.value.trim();
  if (!name) { toast('Name is required.', 'error'); return; }
  const c = camp();
  const memberIds = [...document.querySelectorAll('.fc-npc-cb:checked')].map(cb => cb.value);
  const threadIds = [...document.querySelectorAll('.fc-thread-cb:checked')].map(cb => cb.value);
  const data = {
    name,
    description: document.getElementById('fc-desc')?.value || '',
    goals:       document.getElementById('fc-goals')?.value || '',
    secrets:     document.getElementById('fc-secrets')?.value || '',
    attitude:    document.getElementById('fc-attitude')?.value || 'neutral',
    status:      document.getElementById('fc-status')?.value || 'active',
    color:       window._factionColor || FACTION_COLORS[0],
    memberIds,
    threadIds,
  };
  if (id) {
    const f = c.factions.find(x => x.id === id);
    if (f) Object.assign(f, data);
  } else {
    c.factions.push({ id: uid(), ...data });
  }
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast(id ? 'Faction saved.' : 'Faction created.', 'success');
  render();
}

async function deleteFaction(id) {
  if (!(await confirmModal('Delete this faction?'))) return;
  const c = camp();
  c.factions = c.factions.filter(f => f.id !== id);
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast('Faction deleted.', 'success');
  render();
}

const CLOCK_SIZES = [4, 6, 8, 12];

function renderClocks() {
  const c = camp();
  if (!c.clocks) c.clocks = [];
  const cards = c.clocks.map(ck => {
    let linkedName = '';
    if (ck.linkedType === 'faction') linkedName = c.factions.find(f => f.id === ck.linkedId)?.name || '';
    if (ck.linkedType === 'thread') linkedName = c.plotThreads.find(t => t.id === ck.linkedId)?.title || '';
    return `
      <div class="card" onclick="openEditClockModal('${ck.id}')" style="cursor:pointer">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">
          <div style="font-weight:600;font-size:0.95rem">${esc(ck.label)}</div>
          <span class="text-xs text-dim">${ck.filled}/${ck.segments}</span>
        </div>
        ${clockSegmentsHTML(ck, 'tickClock', true)}
        ${linkedName?`<div class="text-xs text-dim" style="margin-top:10px">Linked: ${esc(linkedName)}</div>`:''}
      </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div><h2>Clocks</h2><p class="subtitle">${c.clocks.length} clock${c.clocks.length!==1?'s':''} · background momentum — tick a segment whenever it advances</p></div>
      <button class="btn btn-primary" onclick="openAddClockModal()">+ New Clock</button>
    </div>
    ${c.clocks.length===0
      ? `<div class="empty-state"><h3>No clocks yet</h3><p>Track slow-building threats or plans — a ritual, a rival's patience, an approaching army. Tick a segment whenever it advances, no need to plan out what happens when it fills.</p></div>`
      : `<div class="card-grid">${cards}</div>`}`;
}

function openAddClockModal() { openClockModal(null); }

function openEditClockModal(id) {
  const ck = camp().clocks.find(x => x.id === id);
  if (!ck) return;
  openClockModal(ck);
}

function openClockModal(ck) {
  const c = camp();
  const isEdit = !!ck;
  const selectedColor = ck?.color || FACTION_COLORS[0];
  window._clockColor = selectedColor;

  const sizeOpts = CLOCK_SIZES.map(n => `<option value="${n}" ${(ck?.segments||6)===n?'selected':''}>${n}</option>`).join('');
  const swatches = FACTION_COLORS.map(col =>
    `<div class="fc-swatch" onclick="window._clockColor='${col}';document.querySelectorAll('#clock-swatches .fc-swatch').forEach(s=>{s.style.outline='none';s.style.outlineOffset='0'});this.style.outline='2px solid white';this.style.outlineOffset='2px'" style="width:22px;height:22px;border-radius:50%;background:${col};cursor:pointer;flex-shrink:0;${col===selectedColor?'outline:2px solid white;outline-offset:2px':''}"></div>`
  ).join('');

  const linkVal = ck ? (ck.linkedType ? `${ck.linkedType}:${ck.linkedId}` : '') : '';
  const factionOpts = c.factions.map(f => `<option value="faction:${f.id}" ${linkVal===`faction:${f.id}`?'selected':''}>${esc(f.name)}</option>`).join('');
  const threadOpts = c.plotThreads.map(t => `<option value="thread:${t.id}" ${linkVal===`thread:${t.id}`?'selected':''}>${esc(t.title)}</option>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px">
      <div class="modal-header"><h3>${isEdit?'Edit':'New'} Clock</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="form-group"><label>Label</label><input type="text" id="ck-label" value="${esc(ck?.label||'')}" placeholder="The Ritual, Baron's Patience…"></div>
      <div class="form-row">
        <div class="form-group"><label>Segments</label><select id="ck-segments">${sizeOpts}</select></div>
        <div class="form-group"><label>Color</label><div id="clock-swatches" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:6px">${swatches}</div></div>
      </div>
      <div class="form-group">
        <label>Link to <span class="text-dim text-xs">(optional)</span></label>
        <select id="ck-link">
          <option value="">No link</option>
          ${c.factions.length?`<optgroup label="Factions">${factionOpts}</optgroup>`:''}
          ${c.plotThreads.length?`<optgroup label="Threads">${threadOpts}</optgroup>`:''}
        </select>
      </div>
      <div class="flex gap-8" style="justify-content:space-between">
        ${isEdit?`<button class="btn btn-danger" onclick="deleteClock('${ck.id}')">Delete</button>`:'<span></span>'}
        <div class="flex gap-8">
          <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="saveClock(${isEdit?`'${ck.id}'`:'null'})">${isEdit?'Save':'Create'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveClock(id) {
  const label = document.getElementById('ck-label')?.value.trim();
  if (!label) { toast('Label is required.', 'error'); return; }
  const c = camp();
  const segments = parseInt(document.getElementById('ck-segments')?.value || '6', 10);
  const linkVal = document.getElementById('ck-link')?.value || '';
  const [linkedType, linkedId] = linkVal ? linkVal.split(':') : [null, null];
  const data = {
    label,
    segments,
    color: window._clockColor || FACTION_COLORS[0],
    linkedType: linkedType || null,
    linkedId: linkedId || null,
  };
  if (id) {
    const ck = c.clocks.find(x => x.id === id);
    if (ck) { Object.assign(ck, data); ck.filled = Math.min(ck.filled, segments); }
  } else {
    c.clocks.push({ id: uid(), filled: 0, ...data });
  }
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast(id ? 'Clock updated.' : 'Clock created.', 'success');
  render();
}

async function deleteClock(id) {
  if (!(await confirmModal('Delete this clock?'))) return;
  const c = camp();
  c.clocks = c.clocks.filter(ck => ck.id !== id);
  save();
  document.querySelector('.modal-overlay')?.remove();
  toast('Clock deleted.', 'success');
  render();
}

function tickClock(id, segIndex) {
  const c = camp();
  const ck = c.clocks.find(x => x.id === id);
  if (!ck) return;
  tickClockValue(ck, segIndex);
  save();
  if (view === 'clocks') render();
}

// ═══════════════════════════════════════════════
// SESSION PREP
// ═══════════════════════════════════════════════

function renderSessionPrep() {
  const c = camp();
  const prep      = c.sessionPrep || { notes: '', scenes: [], questions: [] };
  const scenes    = window._prepScenes    || prep.scenes    || [];
  const questions = window._prepQuestions || prep.questions || [];

  const activeThreads     = c.plotThreads.filter(t => t.status === 'active' || t.status === 'dormant');
  const lastSession       = c.sessions[c.sessions.length - 1];
  const lastSessionNPCs   = lastSession ? c.npcs.filter(n => (n.sessions||[]).includes(lastSession.id)) : [];
  const activeFactions    = c.factions.filter(f => (f.status||'active') === 'active');
  const staleEntities     = computeStaleEntities();

  const sceneRows = scenes.map((sc, i) => `
    <div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">
      <input type="checkbox" style="width:auto;margin-top:4px;accent-color:var(--accent)" ${sc.done?'checked':''} onchange="window._prepScenes[${i}].done=this.checked">
      <div style="flex:1">
        <input type="text" value="${esc(sc.title)}" placeholder="Scene title…" oninput="window._prepScenes[${i}].title=this.value" style="${sc.done?'text-decoration:line-through;color:var(--text-dim)':''}">
        <textarea rows="2" placeholder="What happens…" oninput="window._prepScenes[${i}].description=this.value" style="margin-top:6px;resize:vertical">${esc(sc.description||'')}</textarea>
      </div>
      <button class="btn btn-danger btn-sm" style="flex-shrink:0;margin-top:2px" onclick="removePrepScene(${i})">✕</button>
    </div>`).join('');

  const qRows = questions.map((q, i) => `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input type="checkbox" style="width:auto;accent-color:var(--accent)" ${q.done?'checked':''} onchange="window._prepQuestions[${i}].done=this.checked">
      <input type="text" value="${esc(q.text)}" placeholder="Question to resolve before the session…" oninput="window._prepQuestions[${i}].text=this.value" style="flex:1;${q.done?'text-decoration:line-through;color:var(--text-dim)':''}">
      <button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="removePrepQuestion(${i})">✕</button>
    </div>`).join('');

  return `
    <div class="page-header">
      <div><h2>Session Prep</h2><p class="subtitle">Plan your next session</p></div>
      <button class="btn btn-primary" onclick="saveSessionPrep()">Save</button>
    </div>
    <div style="display:grid;grid-template-columns:3fr 2fr;gap:24px;align-items:start">

      <div>
        <div class="card" style="margin-bottom:16px">
          <h3 style="margin-bottom:12px">Plan for Next Session</h3>
          <textarea id="prep-notes" rows="10" placeholder="What happens? Where does the party go? Who shows up? What's the opening scene? What hooks are you pulling on?" style="resize:vertical">${esc(prep.notes||'')}</textarea>
        </div>
        <div class="card">
          <div class="flex-between" style="margin-bottom:14px">
            <h3>Planned Scenes</h3>
            <button class="btn btn-ghost btn-sm" onclick="addPrepScene()">+ Add Scene</button>
          </div>
          <div id="prep-scenes-list">
            ${scenes.length===0?`<p class="text-xs text-dim" style="padding:4px 0">No scenes planned yet.</p>`:sceneRows}
          </div>
        </div>
      </div>

      <div>
        ${staleEntities.length?`
        <div class="card" style="margin-bottom:16px">
          <div class="flex-between" style="margin-bottom:12px">
            <h3>Stale Callbacks</h3>
            <span class="text-xs text-dim">hasn't come up in a while</span>
          </div>
          ${staleEntities.slice(0,8).map(e => {
            const openFn = { npc:'openNPCModal', location:'openLocationModal', thread:'openEditThreadModal', faction:'openFactionModal' }[e.type];
            return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="${openFn}('${e.id}')">
              <span style="width:8px;height:8px;border-radius:50%;background:${e.color};flex-shrink:0;display:inline-block"></span>
              <span class="text-sm" style="font-weight:500;flex:1">${esc(e.name)}</span>
              <span class="text-xs text-dim">${e.sessionsSince} session${e.sessionsSince!==1?'s':''} ago</span>
            </div>`;
          }).join('')}
        </div>`:''}
        <div class="card" style="margin-bottom:16px">
          <div class="flex-between" style="margin-bottom:14px">
            <h3>Open Questions</h3>
            <button class="btn btn-ghost btn-sm" onclick="addPrepQuestion()">+ Add</button>
          </div>
          <div id="prep-questions-list">
            ${questions.length===0?`<p class="text-xs text-dim">Things you need to figure out before the session.</p>`:qRows}
          </div>
        </div>

        ${activeThreads.length?`
        <div class="card" style="margin-bottom:16px">
          <div class="flex-between" style="margin-bottom:12px">
            <h3>Active Threads</h3>
            <button class="btn btn-ghost btn-sm" onclick="navigate('threads')">All →</button>
          </div>
          ${activeThreads.map(t => {
            const si = THREAD_STATUSES.find(s=>s.value===t.status)||THREAD_STATUSES[1];
            return `<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openEditThreadModal('${t.id}')">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="width:8px;height:8px;border-radius:50%;background:${si.color};flex-shrink:0;display:inline-block"></span>
                <span class="text-sm" style="font-weight:500">${esc(t.title)}</span>
              </div>
              ${t.description?`<div class="text-xs text-dim" style="margin-top:3px;padding-left:16px">${esc(t.description.slice(0,80))}${t.description.length>80?'…':''}</div>`:''}
            </div>`;
          }).join('')}
        </div>`:''}

        ${lastSessionNPCs.length?`
        <div class="card" style="margin-bottom:16px">
          <h3 style="margin-bottom:10px">NPCs — Last Session</h3>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${lastSessionNPCs.map(n=>`<span class="npc-chip" onclick="openNPCModal('${n.id}')">${esc(n.name)}</span>`).join('')}
          </div>
        </div>`:''}

        ${activeFactions.length?`
        <div class="card">
          <div class="flex-between" style="margin-bottom:12px">
            <h3>Active Factions</h3>
            <button class="btn btn-ghost btn-sm" onclick="navigate('factions')">All →</button>
          </div>
          ${activeFactions.map(f => {
            const att = FACTION_ATTITUDES.find(a=>a.value===f.attitude)||FACTION_ATTITUDES[1];
            return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openFactionModal('${f.id}')">
              <span style="width:10px;height:10px;border-radius:50%;background:${f.color||'#888'};flex-shrink:0;display:inline-block"></span>
              <span class="text-sm" style="font-weight:500;flex:1">${esc(f.name)}</span>
              <span style="background:${att.color}22;color:${att.color};border:1px solid ${att.color}44;border-radius:4px;padding:1px 7px;font-size:0.68rem;font-weight:600">${att.label}</span>
            </div>`;
          }).join('')}
        </div>`:''}
      </div>
    </div>`;
}

function saveSessionPrep() {
  const c = camp();
  if (!c.sessionPrep) c.sessionPrep = {};
  c.sessionPrep.notes     = document.getElementById('prep-notes')?.value || '';
  c.sessionPrep.scenes    = (window._prepScenes||[]).filter(s=>s.title.trim()||s.description.trim());
  c.sessionPrep.questions = (window._prepQuestions||[]).filter(q=>q.text.trim());
  save();
  toast('Session prep saved.', 'success');
}

function addPrepScene() {
  if (!window._prepScenes) window._prepScenes = JSON.parse(JSON.stringify(camp().sessionPrep?.scenes||[]));
  const i = window._prepScenes.length;
  window._prepScenes.push({ id: uid(), title: '', description: '', done: false });
  const list = document.getElementById('prep-scenes-list');
  if (!list) return;
  const empty = list.querySelector('p');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)';
  div.innerHTML = `
    <input type="checkbox" style="width:auto;margin-top:4px;accent-color:var(--accent)" onchange="window._prepScenes[${i}].done=this.checked">
    <div style="flex:1">
      <input type="text" placeholder="Scene title…" oninput="window._prepScenes[${i}].title=this.value">
      <textarea rows="2" placeholder="What happens…" oninput="window._prepScenes[${i}].description=this.value" style="margin-top:6px;resize:vertical"></textarea>
    </div>
    <button class="btn btn-danger btn-sm" style="flex-shrink:0;margin-top:2px" onclick="removePrepScene(${i})">✕</button>`;
  list.appendChild(div);
  div.querySelector('input[type=text]')?.focus();
}

function removePrepScene(i) {
  if (!window._prepScenes) return;
  window._prepScenes.splice(i, 1);
  const list = document.getElementById('prep-scenes-list');
  if (!list) return;
  list.innerHTML = window._prepScenes.length===0 ? `<p class="text-xs text-dim" style="padding:4px 0">No scenes planned yet.</p>` :
    window._prepScenes.map((sc,idx)=>`
      <div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">
        <input type="checkbox" style="width:auto;margin-top:4px;accent-color:var(--accent)" ${sc.done?'checked':''} onchange="window._prepScenes[${idx}].done=this.checked">
        <div style="flex:1">
          <input type="text" value="${esc(sc.title)}" placeholder="Scene title…" oninput="window._prepScenes[${idx}].title=this.value" style="${sc.done?'text-decoration:line-through;color:var(--text-dim)':''}">
          <textarea rows="2" placeholder="What happens…" oninput="window._prepScenes[${idx}].description=this.value" style="margin-top:6px;resize:vertical">${esc(sc.description||'')}</textarea>
        </div>
        <button class="btn btn-danger btn-sm" style="flex-shrink:0;margin-top:2px" onclick="removePrepScene(${idx})">✕</button>
      </div>`).join('');
}

function addPrepQuestion() {
  if (!window._prepQuestions) window._prepQuestions = JSON.parse(JSON.stringify(camp().sessionPrep?.questions||[]));
  const i = window._prepQuestions.length;
  window._prepQuestions.push({ id: uid(), text: '', done: false });
  const list = document.getElementById('prep-questions-list');
  if (!list) return;
  const empty = list.querySelector('p');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
  div.innerHTML = `
    <input type="checkbox" style="width:auto;accent-color:var(--accent)" onchange="window._prepQuestions[${i}].done=this.checked">
    <input type="text" placeholder="Question to resolve before the session…" oninput="window._prepQuestions[${i}].text=this.value" style="flex:1">
    <button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="removePrepQuestion(${i})">✕</button>`;
  list.appendChild(div);
  div.querySelector('input[type=text]')?.focus();
}

function removePrepQuestion(i) {
  if (!window._prepQuestions) return;
  window._prepQuestions.splice(i, 1);
  const list = document.getElementById('prep-questions-list');
  if (!list) return;
  list.innerHTML = window._prepQuestions.length===0 ? `<p class="text-xs text-dim">Things you need to figure out before the session.</p>` :
    window._prepQuestions.map((q,idx)=>`
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <input type="checkbox" style="width:auto;accent-color:var(--accent)" ${q.done?'checked':''} onchange="window._prepQuestions[${idx}].done=this.checked">
        <input type="text" value="${esc(q.text)}" placeholder="Question…" oninput="window._prepQuestions[${idx}].text=this.value" style="flex:1;${q.done?'text-decoration:line-through;color:var(--text-dim)':''}">
        <button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="removePrepQuestion(${idx})">✕</button>
      </div>`).join('');
}

// ═══════════════════════════════════════════════
// ONBOARDING
// ═══════════════════════════════════════════════

function maybeShowOnboarding() {
  if (state.settings.onboarded) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:560px">
      <div class="modal-header"><h3>Welcome to Untangle</h3></div>
      <p class="text-sm" style="line-height:1.75;margin-bottom:14px">
        Untangle is a campaign tracker for GMs who discover their story at the table.
        Log NPCs, locations, factions, sessions, and plot threads as they emerge — then
        map how they connect and walk into next session knowing exactly where things stand.
      </p>
      <ul class="text-sm text-dim" style="line-height:2;margin:0 0 18px 18px">
        <li>Everything works with no setup — log entries manually any time.</li>
        <li>Paid API keys in Foundry's Configure Settings unlock session transcription (Whisper) and AI extraction (Claude), but they're optional.</li>
        <li>Quick field notes and name rolls are one click away above the macro bar, even when this window is closed.</li>
        <li>All data lives in this browser's storage, mirrored into the Foundry world as a backup. Export a backup occasionally from Foundry's Configure Settings to be extra safe.</li>
      </ul>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-primary" onclick="state.settings.onboarded=true;save();this.closest('.modal-overlay').remove()">Got it, let's go</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

// Called by state.js's storage-event listener whenever another window
// (the widget, or main.js's "Add to Untangle" button) writes new data while
// this window is open, so it doesn't keep showing/overwriting stale state.
function onExternalStateChange() { render(); }

navigate('dashboard');
maybeShowOnboarding();
verifyPatreonToken().then(() => renderNavLinks()); // re-check Patreon entitlement once on load; no-op today (no premium features yet)

// If the Quick Access widget asked us to open a specific clock/NPC/location/
// thread/faction (see openInPlanner() in state.js), jump straight to it.
(function handlePendingNav() {
  const nav = consumePendingNav();
  if (!nav) return;
  const PAGE_BY_TYPE = { npc: 'npcs', location: 'locations', thread: 'threads', faction: 'factions', clock: 'clocks' };
  const OPEN_FN_BY_TYPE = { npc: 'openNPCModal', location: 'openLocationModal', thread: 'openEditThreadModal', faction: 'openFactionModal', clock: 'openEditClockModal' };
  const page = PAGE_BY_TYPE[nav.type];
  if (page) navigate(page);
  const openFn = OPEN_FN_BY_TYPE[nav.type];
  if (openFn && nav.id && typeof window[openFn] === 'function') window[openFn](nav.id);
})();
</script>
